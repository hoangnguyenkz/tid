<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Project</title>

<style>
body {
    background: #000;
    color: #fff;
    font-family: Arial;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    color: #00d9ff;
    padding: 8px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #222;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

.badge {
    padding: 4px 10px;
    border-radius: 5px;
}

.late { background: red; }
.done { background: green; }
.doing { background: orange; }
</style>
</head>

<body>

<h1>TIME LINE PROJECT</h1>

<table id="table">
<thead>
<tr>
<th>Dự án</th>
<th>Hạng mục</th>
<th>%</th>
<th>Deadline</th>
<th>Nhân sự</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_YEMrcZIG5TcRji_fPiaUdaDRg7_6nwuAIJLo1bVhV4SnDFZgNrgFY9LNaQTg2AybQjAN3H7Uyaex/gviz/tq?tqx=out:json&gid=1280059749";

async function load() {
    const res = await fetch(URL);
    const text = await res.text();

    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows;

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    rows.forEach(r => {
        const d = r.c;

        tbody.innerHTML += `
        <tr>
            <td class="project">${d[0]?.v || ""}</td>
            <td>${d[1]?.v || ""}</td>
            <td>${d[2]?.v || 0}%</td>
            <td>${formatDate(d[3]?.v)}</td>
            <td>${d[4]?.v || ""}</td>
            <td>${renderStatus(d[5]?.v)}</td>
        </tr>`;
    });
}

function renderStatus(s) {
    if (s === "late") return '<span class="badge late">QUÁ HẠN</span>';
    if (s === "done") return '<span class="badge done">HOÀN THÀNH</span>';
    return '<span class="badge doing">ĐANG LÀM</span>';
}

function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("vi-VN");
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
