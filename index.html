<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DISTRIBUTOR DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255,255,255,0.10);
            --glass-bg-hover: rgba(255,255,255,0.15);
            --glass-border: rgba(255,255,255,0.22);
            --glass-border-hi: rgba(255,255,255,0.38);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.28), 0 1.5px 0 rgba(255,255,255,0.12) inset;
            --glass-shadow-sm: 0 4px 16px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.10) inset;
            --blur: blur(18px) saturate(1.6);
            --blur-sm: blur(12px) saturate(1.4);

            --accent: #60c8f0;
            --accent-glow: rgba(96,200,240,0.28);
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #ffffff;
            --text-bright: #ffffff;
            --text-dim: rgba(255,255,255,0.45);

            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: linear-gradient(135deg, #0a1628 0%, #0d2240 30%, #0f1e3a 55%, #0a2850 75%, #0d1e38 100%);
            color: var(--text);
            font-family: var(--f-sans);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(96,200,240,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(120,160,255,0.10) 0%, transparent 55%),
                radial-gradient(ellipse 70% 60% at 50% 90%, rgba(60,120,220,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 70%, rgba(96,200,240,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: meshDrift 18s ease-in-out infinite alternate;
        }
        @keyframes meshDrift {
            from { opacity: 0.8; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.04); }
        }

        /* ══ HEADER ══ */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 60px;
            padding: 0 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border-hi);
            box-shadow: 0 2px 24px rgba(0,0,0,0.22), 0 1px 0 rgba(255,255,255,0.10) inset;
            position: relative;
            z-index: 10;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.55;
        }
        .header-logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; color: var(--text-bright); }
        .logo-box {
            width: 30px; height: 30px;
            background: rgba(96,200,240,0.15);
            border: 1.5px solid rgba(96,200,240,0.5);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-weight: 700; font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(96,200,240,0.25) inset, 0 0 8px rgba(96,200,240,0.15);
            backdrop-filter: var(--blur-sm);
        }
        .header-title {
            font-size: 20px; font-weight: 700; letter-spacing: 5px;
            color: transparent;
            background: linear-gradient(90deg, rgba(255,255,255,0.7) 0%, var(--accent) 50%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-transform: uppercase; text-align: center;
            filter: drop-shadow(0 0 12px rgba(96,200,240,0.5));
        }
        .header-right { text-align: right; font-family: var(--f-mono); }
        .header-clock { font-size: 20px; color: var(--text-bright); font-weight: 600; text-shadow: 0 0 12px rgba(96,200,240,0.4); }
        .header-date { font-size: 12px; color: var(--accent); opacity: 0.8; }

        /* ══ LAYOUT: 1 cột dọc ══ */
        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 60px);
            padding: 12px;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        /* Bảng tiến độ - chiếm phần lớn */
        .col-left {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            position: relative;
            min-height: 0;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
        }
        .col-left::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.4) 50%, transparent 95%);
        }

        /* 2 bảng thống kê nằm ngang */
        .stats-row {
            flex: 0 0 200px;
            display: flex;
            gap: 12px;
            min-height: 0;
        }

        .sub-panel {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            box-shadow: var(--glass-shadow-sm);
            position: relative;
        }
        .sub-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 15%, rgba(255,255,255,0.3) 50%, transparent 85%);
        }

        /* ══ PANEL HEADER ══ */
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            padding-bottom: 8px;
            flex-shrink: 0;
        }
        .panel-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; font-weight: 700;
            color: rgba(255,255,255,0.92);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .title-dot {
            width: 7px; height: 7px;
            background: var(--accent);
            transform: rotate(45deg);
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--accent);
        }
        .badge-count {
            font-family: var(--f-mono); font-size: 12px;
            padding: 3px 10px;
            background: rgba(255,201,77,0.18);
            color: var(--gold);
            border: 1px solid rgba(255,201,77,0.35);
            border-radius: 20px;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(255,201,77,0.15);
        }

        /* ══ TABLE ══ */
        .table-wrap { flex: 1; overflow: hidden; min-height: 0; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        th {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            padding: 9px 4px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 1;
            backdrop-filter: blur(4px);
        }

        tbody tr:nth-child(odd) { background: rgba(255,255,255,0.025); }
        tbody tr:nth-child(even) { background: rgba(255,255,255,0.005); }
        tbody tr:hover { background: rgba(96,200,240,0.08) !important; transition: background 0.15s; }

        #p-table td {
            padding: 15px 6px;
            font-size: 19px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ══ STATS ROWS ══ */
        .stat-row td {
            font-size: 14px;
            padding: 8px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stat-name {
            color: rgba(255,255,255,0.85);
            font-weight: 500;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-val {
            width: 42px;
            text-align: right;
            padding-right: 8px !important;
            font-family: var(--f-mono);
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .text-left { text-align: left !important; }
        .gold-bold { color: var(--gold); font-weight: 700; }

        /* Progress bar */
        .bar-container { display: flex; align-items: center; gap: 4px; justify-content: center; }
        .bar-bg {
            width: 45px; height: 7px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(96,200,240,0.6), var(--accent));
            border-radius: 10px;
            box-shadow: 0 0 6px rgba(96,200,240,0.5);
        }

        /* Status badges */
        .st { font-size: 9px; padding: 2px 7px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
        .st-done { background: rgba(61,224,138,0.18); color: var(--green); border: 1px solid rgba(61,224,138,0.35); box-shadow: 0 0 8px rgba(61,224,138,0.15); }
        .st-wip  { background: rgba(96,200,240,0.10); color: var(--accent); border: 1px solid rgba(96,200,240,0.30); }
        .st-late { background: rgba(255,107,107,0.18); color: var(--red); border: 1px solid rgba(255,107,107,0.35); box-shadow: 0 0 8px rgba(255,107,107,0.20); animation: flash 1.4s step-end infinite; }
        @keyframes flash { 0%,100%{opacity:1} 50%{opacity:.6} }

        /* Footer */
        .footer-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(96,200,240,0.7);
            font-family: var(--f-mono);
            padding-top: 8px;
            flex-shrink: 0;
        }

        /* Refresh bar */
        .refresh-line {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), rgba(96,200,240,0.3));
            width: 0;
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 8px var(--accent);
        }
        .refresh-line.animating { animation: run 30s linear forwards; }
        @keyframes run { from { width: 100%; } to { width: 0%; } }

        /* ══ DESKTOP (>= 1024px) ══ */
        @media (min-width: 1024px) {
            .header { height: 70px; padding: 0 28px; }
            .header-logo { font-size: 22px; gap: 12px; }
            .logo-box { width: 40px; height: 40px; font-size: 18px; border-radius: 10px; }
            .header-title { font-size: 28px; letter-spacing: 7px; }
            .header-clock { font-size: 28px; }
            .header-date { font-size: 14px; }
            .container { height: calc(100vh - 70px); padding: 16px; gap: 16px; }
            .col-left { padding: 20px; border-radius: 20px; }
            .stats-row { flex: 0 0 220px; gap: 16px; }
            .sub-panel { padding: 14px; border-radius: 20px; }
            .panel-header { margin-bottom: 14px; padding-bottom: 12px; }
            .panel-title { font-size: 18px; gap: 10px; }
            .title-dot { width: 9px; height: 9px; }
            .badge-count { font-size: 15px; padding: 5px 14px; }
            th { font-size: 15px; padding: 12px 8px; letter-spacing: 0.8px; }
            #p-table td { padding: 17px 10px; font-size: 22px; }
            .bar-bg { width: 80px; height: 10px; }
            .bar-container { gap: 8px; }
            .bar-container span { width: 50px !important; font-size: 18px !important; }
            .st { font-size: 14px; padding: 5px 12px; }
            .footer-info { font-size: 13px; padding-top: 10px; }
            .stat-row td { font-size: 18px; padding: 11px 10px; }
            .stat-val { font-size: 19px; width: 52px; }
        }

        /* ══ MOBILE TAB SYSTEM ══ */
        .tab-bar { display: none; }

        /* ══ MOBILE (<= 767px) ══ */
        @media (max-width: 767px) {
            .header { height: 52px; padding: 0 12px; grid-template-columns: auto 1fr auto; gap: 8px; }
            .header-logo { font-size: 13px; gap: 6px; }
            .logo-box { width: 26px; height: 26px; font-size: 12px; border-radius: 6px; }
            .header-title { font-size: 13px; letter-spacing: 2px; }
            .header-clock { font-size: 15px; }
            .header-date { font-size: 10px; }

            .tab-bar {
                display: flex;
                background: rgba(255,255,255,0.07);
                backdrop-filter: var(--blur-sm);
                border-bottom: 1px solid var(--glass-border);
                flex-shrink: 0;
                position: relative;
                z-index: 5;
            }
            .tab-btn {
                flex: 1; padding: 8px 4px; font-size: 10px; font-weight: 600;
                color: var(--text-dim); background: none; border: none;
                border-bottom: 2px solid transparent; text-transform: uppercase;
                letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; font-family: var(--f-sans);
            }
            .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }

            .container {
                height: calc(100vh - 52px - 34px);
                padding: 8px; gap: 8px; overflow: hidden;
            }

            /* Mobile: ẩn stats-row mặc định, hiện khi tab-active */
            .col-left { display: none; }
            .stats-row { display: none; }

            .col-left.tab-active {
                display: flex; flex: 1; border-radius: 12px; padding: 10px; min-height: 0; height: 100%;
            }
            .stats-row.tab-active {
                display: flex; flex: 0 0 auto; flex-direction: column; gap: 8px;
            }
            .stats-row.tab-active .sub-panel { min-height: 130px; flex: 0 0 auto; border-radius: 12px; }

            th { font-size: 10px; padding: 6px 3px; letter-spacing: 0; }
            #p-table td { padding: 10px 4px; font-size: 13px; }
            .panel-title { font-size: 12px; }
            .badge-count { font-size: 10px; padding: 2px 8px; }
            .bar-bg { width: 32px; height: 6px; }
            .bar-container { gap: 3px; }
            .st { font-size: 8px; padding: 1px 5px; }
            .footer-info { font-size: 10px; padding-top: 6px; }
            .sub-panel { padding: 8px; }
            .panel-header { margin-bottom: 6px; padding-bottom: 6px; }
            .stat-row td { font-size: 12px; padding: 6px 6px; }
            .stat-val { font-size: 13px; }
        }

        /* ══ TABLET (768px - 1023px) ══ */
        @media (min-width: 768px) and (max-width: 1023px) {
            .container { padding: 8px; gap: 8px; }
            .col-left { padding: 12px; border-radius: 14px; }
            .stats-row { flex: 0 0 170px; gap: 8px; }
            .sub-panel { border-radius: 14px; }
            th { font-size: 10px; padding: 7px 3px; }
            #p-table td { padding: 10px 4px; font-size: 14px; }
            .panel-title { font-size: 12px; }
            .header-title { font-size: 16px; letter-spacing: 3px; }
            .header-clock { font-size: 16px; }
            .st { font-size: 8px; padding: 2px 5px; }
            .bar-bg { width: 38px; }
            .stat-row td { font-size: 13px; padding: 7px 8px; }
            .stat-val { font-size: 14px; }
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(96,200,240,0.3); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(96,200,240,0.5); }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div><span>TID CO.LTD</span></div>
    <div class="header-title">PROJECT DISTRIBUTOR DASHBOARD</div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div class="header-date" id="date">--/--/----</div>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('progress')">📋 TIẾN ĐỘ</button>
    <button class="tab-btn" onclick="switchTab('stats')">📊 THỐNG KÊ</button>
</div>

<div class="container">

    <!-- BẢNG TIẾN ĐỘ DỰ ÁN -->
    <div class="col-left tab-active" id="tab-progress">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="badge-count" id="p-count">0 HẠNG MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:22%">DỰ ÁN</th>
                        <th style="width:13%">KHÁCH HÀNG</th>
                        <th style="width:13%">NHÂN SỰ</th>
                        <th style="width:12%">HẠNG MỤC</th>
                        <th style="width:13%">TIẾN ĐỘ</th>
                        <th style="width:15%">DEADLINE</th>
                        <th style="width:12%">T.THÁI</th>
                    </tr>
                </thead>
                <tbody id="p-table"></tbody>
            </table>
        </div>
        <div class="footer-info">
            <div id="p-page">PAGE 1/1</div>
            <div id="p-sync">Đang cập nhật...</div>
        </div>
        <div class="refresh-line" id="line1"></div>
    </div>

    <!-- 2 BẢNG THỐNG KÊ NẰM NGANG -->
    <div class="stats-row" id="tab-stats">
        <div class="sub-panel">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div>THỐNG KÊ DỰ ÁN / NHÂN SỰ (<span id="s-total">0</span>)</div>
            </div>
            <div class="table-wrap">
                <table><tbody id="s-table"></tbody></table>
            </div>
        </div>
        <div class="sub-panel">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div>THỐNG KÊ DỰ ÁN / KHÁCH HÀNG (<span id="c-total">0</span>)</div>
            </div>
            <div class="table-wrap">
                <table><tbody id="c-table"></tbody></table>
            </div>
        </div>
    </div>

</div>

<script>
    const SHEET_ID = "1Vk7_CN7wqi7UyBuQsrmlmgf_a6gjhy5a6Io1Zg-o07g";
    const URL_PROGRESS  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1280059749`;
    const URL_GUARANTEE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Bao%20lanh`;

    let dataP = [], dataG = [], currentPage = 0;
    const ROWS_PER_PAGE = 10;

    setInterval(() => {
        const n = new Date();
        document.getElementById("clock").innerText = n.toLocaleTimeString("vi-VN", {hour12: false});
        document.getElementById("date").innerText  = n.toLocaleDateString("vi-VN");
    }, 1000);

    function switchTab(tab) {
        const progress = document.getElementById("tab-progress");
        const stats    = document.getElementById("tab-stats");
        const btns     = document.querySelectorAll(".tab-btn");
        if (tab === 'progress') {
            progress.classList.add("tab-active"); stats.classList.remove("tab-active");
            btns[0].classList.add("active");      btns[1].classList.remove("active");
        } else {
            stats.classList.add("tab-active");    progress.classList.remove("tab-active");
            btns[1].classList.add("active");      btns[0].classList.remove("active");
        }
    }

    async function fetchData() {
        try {
            const [resP, resG] = await Promise.all([fetch(URL_PROGRESS), fetch(URL_GUARANTEE)]);
            const txtP = await resP.text();
            const txtG = await resG.text();
            dataP = JSON.parse(txtP.substring(txtP.indexOf("{"), txtP.lastIndexOf("}") + 1)).table.rows.slice(4);
            dataG = JSON.parse(txtG.substring(txtG.indexOf("{"), txtG.lastIndexOf("}") + 1)).table.rows.filter(r => r.c && r.c[9]?.v);
            renderAll();
            startProgressLine();
            document.getElementById("p-sync").innerText = "Cập nhật: " + new Date().toLocaleTimeString("vi-VN", {hour12: false});
        } catch(e) { console.error(e); }
    }

    function renderAll() { renderProgress(); renderStats(); }

    function renderProgress() {
        const el = document.getElementById("p-table");
        const totalPages = Math.ceil(dataP.length / ROWS_PER_PAGE);
        const items = dataP.slice(currentPage * ROWS_PER_PAGE, currentPage * ROWS_PER_PAGE + ROWS_PER_PAGE);

        const countItems = dataP.filter(r => r.c && r.c[2]?.v).length;
        document.getElementById("p-count").innerText = `${countItems} HẠNG MỤC`;
        document.getElementById("p-page").innerText  = `PAGE ${currentPage + 1}/${totalPages || 1}`;

        el.innerHTML = items.map(row => {
            const d = row.c;
            const pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
            const isLate = d[7]?.v && parseDate(d[7].v) < new Date() && pct < 100;
            const item = d[2]?.v || "";
            return `<tr>
                <td class="text-left gold-bold" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[1]?.v || "—"}</td>
                <td class="text-left" style="color:rgba(255,255,255,0.85);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[4]?.v || "—"}</td>
                <td style="color:rgba(255,255,255,0.85);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[3]?.v || "—"}</td>
                <td class="text-left" style="color:rgba(255,255,255,0.80);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item}</td>
                <td>${item ? `<div class="bar-container"><span style="width:28px;font-family:var(--f-mono);font-size:13px;text-align:right;color:rgba(255,255,255,0.9);">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>` : ""}</td>
                <td style="font-family:var(--f-mono);font-weight:600;color:rgba(255,255,255,0.9);">${d[7]?.f || "—"}</td>
                <td>${item ? `<span class="st ${pct>=100?'st-done':(isLate?'st-late':'st-wip')}">${pct>=100?'DONE':(isLate?'LATE':'WORKING')}</span>` : ""}</td>
            </tr>`;
        }).join("");
    }

    function renderStats() {
        const staff = {}, cust = {};
        dataP.forEach(r => {
            const c = r.c;
            const s = c[3]?.v;
            if (s && s.trim() && s !== "—") staff[s] = (staff[s] || 0) + 1;
            const cu = c[4]?.v;
            if (cu && cu.trim() && cu !== "—") cust[cu] = (cust[cu] || 0) + 1;
        });

        const rowTpl = (n, v) => `<tr class="stat-row">
            <td class="stat-name">${n}</td>
            <td class="stat-val">${v}</td>
        </tr>`;

        const sortedStaff = Object.entries(staff).sort((a,b) => b[1]-a[1]);
        const sortedCust  = Object.entries(cust).sort((a,b) => b[1]-a[1]);

        document.getElementById("s-total").innerText = sortedStaff.length;
        document.getElementById("c-total").innerText = sortedCust.length;

        document.getElementById("s-table").innerHTML = sortedStaff.length
            ? sortedStaff.map(([n,v]) => rowTpl(n,v)).join("")
            : `<tr><td colspan="2" style="text-align:center;color:var(--text-dim);padding:12px;font-size:14px;">KHÔNG CÓ DỮ LIỆU</td></tr>`;

        document.getElementById("c-table").innerHTML = sortedCust.length
            ? sortedCust.map(([n,v]) => rowTpl(n,v)).join("")
            : `<tr><td colspan="2" style="text-align:center;color:var(--text-dim);padding:12px;font-size:14px;">KHÔNG CÓ DỮ LIỆU</td></tr>`;
    }

    function parseDate(v) {
        if (!v) return null;
        const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(+m[1], +m[2], +m[3]) : null;
    }

    function startProgressLine() {
        const l = document.getElementById("line1");
        l.classList.remove("animating"); void l.offsetWidth; l.classList.add("animating");
    }

    setInterval(() => {
        const total = Math.ceil(dataP.length / ROWS_PER_PAGE);
        if (total > 1) { currentPage = (currentPage + 1) % total; renderProgress(); }
    }, 20000);

    setInterval(fetchData, 30000);
    window.onload = fetchData;
</script>
</body>
</html>
