<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROJECT LED DASHBOARD</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: #00e5ff;
    font-family: "Segoe UI", Arial, sans-serif;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 70px;
    padding: 0 30px;
    font-size: 28px;
    border-bottom: 2px solid #00e5ff;
}

.container {
    display: flex;
    height: calc(100vh - 70px);
}

.section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px;
}

.section:first-child {
    border-right: 2px solid #00e5ff;
}

h2 {
    text-align: center;
    font-size: 24px;
    margin: 5px 0;
}

.table-wrap {
    flex: 1;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

th {
    border-bottom: 2px solid #00e5ff;
    padding: 8px;
    font-size: 18px;
}

td {
    border-bottom: 1px solid #222;
    padding: 8px;
    text-align: center;
    font-size: 18px;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

/* STATUS */
.late { color: red; font-weight: bold; }
.done { color: #00ff00; font-weight: bold; }
.design { color: #00bfff; font-weight: bold; }

.page-info {
    text-align: center;
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<div class="header">
    <div>📊 PROJECT LED DASHBOARD</div>
    <div id="clock"></div>
</div>

<div class="container">

<!-- TIẾN ĐỘ -->
<div class="section">
    <h2>TIẾN ĐỘ DỰ ÁN</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Dự án</th>
                    <th>Hạng mục</th>
                    <th>%</th>
                    <th>Deadline</th>
                    <th>Nhân sự</th>
                    <th>TRẠNG THÁI</th>
                </tr>
            </thead>
            <tbody id="progress"></tbody>
        </table>
    </div>
    <div class="page-info" id="progressPage"></div>
</div>

<!-- BẢO LÃNH -->
<div class="section">
    <h2>THEO DÕI BẢO LÃNH</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Dự án</th>
                    <th>Loại</th>
                    <th>Giá trị</th>
                    <th>Hết hạn</th>
                    <th>TRẠNG THÁI</th>
                </tr>
            </thead>
            <tbody id="guarantee"></tbody>
        </table>
    </div>
    <div class="page-info" id="guaranteePage"></div>
</div>

</div>

<script>
const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";

/* 👉 THAY LINK SHEET BẢO LÃNH */
const GUARANTEE_URL = "";

const PAGE_TIME = 10000;

let progressData = [];
let guaranteeData = [];

let progressPage = 0;
let guaranteePage = 0;

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

/* PARSE */
function parseJSON(text) {
    return JSON.parse(
        text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );
}

/* FETCH */
async function fetchSheet(url) {
    if (!url) return [];

    const res = await fetch(url);
    const text = await res.text();
    const json = parseJSON(text);

    return (json.table.rows || []).slice(4);
}

/* AUTO ROW */
function getRows() {
    const height = document.querySelector(".table-wrap").clientHeight;
    return Math.max(6, Math.floor(height / 42));
}

/* FORMAT % */
function formatPercent(p) {
    let value = Number(p);
    if (value <= 1) value *= 100;
    return Math.round(value) + "%";
}

/* FORMAT DATE */
function formatDate(d) {
    if (!d) return "";
    let date = new Date(d);
    if (isNaN(date)) return d;

    let day = String(date.getDate()).padStart(2, "0");
    let month = String(date.getMonth() + 1).padStart(2, "0");
    let year = date.getFullYear();

    return `${day}/${month}/${year}`;
}

/* LOAD */
async function loadData() {
    progressData = await fetchSheet(PROGRESS_URL);
    guaranteeData = await fetchSheet(GUARANTEE_URL);

    renderProgress();
    renderGuarantee();
}

/* PAGING */
function getPage(data, page) {
    const rows = getRows();
    return data.slice(page * rows, page * rows + rows);
}

/* RENDER PROGRESS */
function renderProgress() {
    const el = document.getElementById("progress");
    const rows = getRows();
    const pageData = getPage(progressData, progressPage);

    el.innerHTML = "";

    pageData.forEach(r => {
        const d = r.c;

        let percentRaw = d[9]?.v || 0;
        let deadlineRaw = d[7]?.v;

        let cls = "design";
        let txt = "ĐANG THIẾT KẾ";

        if (Number(percentRaw) >= 100) {
            cls = "done"; txt = "HOÀN THÀNH";
        } else if (deadlineRaw && new Date(deadlineRaw) < new Date()) {
            cls = "late"; txt = "QUÁ HẠN";
        }

        el.innerHTML += `
        <tr>
            <td class="project">${d[1]?.v || ""}</td>
            <td>${d[2]?.v || ""}</td>
            <td>${formatPercent(percentRaw)}</td>
            <td>${formatDate(deadlineRaw)}</td>
            <td>${d[3]?.v || ""}</td>
            <td class="${cls}">${txt}</td>
        </tr>`;
    });

    document.getElementById("progressPage").innerText =
        `Trang ${progressPage + 1}/${Math.ceil(progressData.length / rows) || 1}`;
}

/* RENDER GUARANTEE */
function renderGuarantee() {
    const el = document.getElementById("guarantee");
    const rows = getRows();
    const pageData = getPage(guaranteeData, guaranteePage);

    el.innerHTML = "";

    pageData.forEach(r => {
        const d = r.c;

        let expire = d[4]?.v;
        let status = "OK";

        if (expire && new Date(expire) < new Date()) {
            status = "HẾT HẠN";
        }

        el.innerHTML += `
        <tr>
            <td class="project">${d[1]?.v || ""}</td>
            <td>${d[2]?.v || ""}</td>
            <td>${Number(d[3]?.v || 0).toLocaleString("vi-VN")}</td>
            <td>${formatDate(expire)}</td>
            <td>${status}</td>
        </tr>`;
    });

    document.getElementById("guaranteePage").innerText =
        `Trang ${guaranteePage + 1}/${Math.ceil(guaranteeData.length / rows) || 1}`;
}

/* AUTO PAGE */
setInterval(() => {
    let rows = getRows();
    progressPage = (progressPage + 1) % (Math.ceil(progressData.length / rows) || 1);
    renderProgress();
}, PAGE_TIME);

setInterval(() => {
    let rows = getRows();
    guaranteePage = (guaranteePage + 1) % (Math.ceil(guaranteeData.length / rows) || 1);
    renderGuarantee();
}, PAGE_TIME + 3000);

/* REFRESH */
setInterval(loadData, 30000);

loadData();
</script>

</body>
</html>
