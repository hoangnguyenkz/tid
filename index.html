<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --accent-dim: #2a7aaa;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --text-dim: #6a90b8;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--f-sans);
            -webkit-font-smoothing: antialiased;
        }

        /* Mặc định trên PC: Không cuộn, khớp khung hình */
        body { overflow: hidden; }

        /* ── HEADER ── */
        .header {
            position: relative;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 64px;
            padding: 0 20px;
            background: var(--bg-header);
            border-bottom: 2px solid var(--border-hi);
            z-index: 10;
        }

        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--text-bright); }
        .logo-box { width: 32px; height: 32px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .header-title { font-size: 18px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; text-align: center; }
        .header-clock { font-family: var(--f-mono); font-size: 20px; color: var(--text-bright); text-align: right; }

        /* ── LAYOUT ── */
        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 64px);
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
            min-height: 0;
        }

        /* Panel trái: Tiến độ (Lớn hơn) */
        .panel:first-child { flex: 1.4; } 

        .panel-top { flex: 0.6; display: flex; flex-direction: column; border-bottom: 2px solid var(--border-hi); margin-bottom: 10px; padding-bottom: 10px; overflow: hidden; }
        .panel-bottom { flex: 0.4; display: flex; gap: 15px; min-height: 0; }
        .sub-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── COMPONENTS ── */
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; border-bottom: 1px solid var(--border-hi); padding-bottom: 5px;
        }
        .panel-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; }
        .title-dot { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); }
        .panel-badge { font-family: var(--f-mono); font-size: 11px; padding: 2px 8px; border: 1px solid var(--border-hi); color: var(--accent); background: rgba(96,200,240,0.1); }

        /* ── TABLE: GIÃN RỘNG HÀNG ── */
        .table-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; height: 100%; }
        th { background: var(--bg-thead); color: var(--accent); font-size: 12px; padding: 12px 8px; text-transform: uppercase; border-bottom: 1px solid var(--border-hi); }
        
        /* Tăng padding để giãn hàng dọc */
        td { padding: 14px 8px; font-size: 14px; border-bottom: 1px solid var(--border); text-align: center; }
        
        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        
        .project-name { font-weight: 700; color: var(--gold); font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }

        /* ── PROGRESS BAR ── */
        .pct-num { font-family: var(--f-mono); font-size: 13px; color: var(--accent); font-weight: 600; }
        .bar-bg { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); transition: width 0.5s; }

        /* ── BADGES ── */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 11px; font-weight: 700; border-radius: 3px; text-transform: uppercase; }
        .b-done { background: var(--green); color: #000; }
        .b-wip { border: 1px solid var(--accent); color: var(--accent); }
        .b-late { background: var(--red); color: #fff; }

        /* ── FOOTER ── */
        .panel-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; }
        .page-dots { display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; background: var(--border-hi); border-radius: 50%; }
        .dot.active { background: var(--accent); transform: scale(1.4); }

        .refresh-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0; }
        .refresh-bar.animating { animation: progress-run 30s linear forwards; }
        @keyframes progress-run { from { width: 100%; } to { width: 0%; } }

        /* ── RESPONSIVE ── */
        @media (max-width: 1023px) {
            body { overflow-y: auto; height: auto; }
            .container { height: auto; display: block; }
            .panel { height: auto; min-height: 500px; border-bottom: 2px solid var(--border-hi); }
            .panel-top { height: auto; min-height: 350px; flex: none; }
            .panel-bottom { flex-direction: column; height: auto; gap: 20px; }
            .sub-panel { min-height: 250px; }
            th, td { font-size: 12px; padding: 10px 4px; }
            .project-name { max-width: 90px; font-size: 13px; }
            .header { grid-template-columns: 1fr 1fr; padding: 0 10px; }
            .header-center { display: none; }
        }

        @media (min-width: 1024px) {
            .container { flex-direction: row; }
            .panel:first-child { border-right: 2px solid var(--border-hi); }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div> TID CO.LTD</div>
    <div class="header-center"><div class="header-title">PROJECT DASHBOARD</div></div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div id="date" style="font-size: 11px; color: var(--text-dim); font-family: var(--f-mono);">--/--/----</div>
    </div>
</div>

<div class="container">
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="panel-badge" id="progress-count">0 HẠNG MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">DỰ ÁN</th>
                        <th style="width: 25%;">HẠNG MỤC</th>
                        <th style="width: 15%;">TIẾN ĐỘ</th>
                        <th style="width: 15%;">DEADLINE</th>
                        <th style="width: 20%;">TRẠNG THÁI</th>
                    </tr>
                </thead>
                <tbody id="progress"></tbody>
            </table>
        </div>
        <div class="panel-footer">
            <div id="progressPage" style="font-size: 11px; font-family: var(--f-mono); color: var(--accent);">PAGE 1/1</div>
            <div class="page-dots" id="progressDots"></div>
        </div>
        <div class="refresh-bar" id="refreshBar1"></div>
    </div>

    <div class="panel">
        <div class="panel-top">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> THEO DÕI BẢO LÃNH</div>
                <div class="panel-badge" id="guarantee-count">0</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40%;">DỰ ÁN</th>
                            <th style="width: 30%;">GIÁ TRỊ</th>
                            <th style="width: 30%;">HẾT HẠN</th>
                        </tr>
                    </thead>
                    <tbody id="guarantee"></tbody>
                </table>
            </div>
        </div>

        <div class="panel-bottom">
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 13px;">TOP NHÂN SỰ</div><div class="panel-badge" id="staff-count">0</div></div>
                <div class="table-wrap"><table><tbody id="staff-list"></tbody></table></div>
            </div>
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 13px;">TOP KHÁCH HÀNG</div><div class="panel-badge" id="customer-count">0</div></div>
                <div class="table-wrap"><table><tbody id="customer-list"></tbody></table></div>
            </div>
        </div>
        <div class="refresh-bar" id="refreshBar2"></div>
    </div>
</div>

<script>
    const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";
    
    const PAGE_TIME = 5000; 
    const REFRESH_TIME = 30000;
    
    // Giảm số dòng mỗi trang một chút để hàng có không gian giãn ra hơn
    const ROWS_PER_PAGE = window.innerWidth < 1024 ? 8 : 12; 

    let rawData = [];
    let currentPage = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("vi-VN", { hour12: false });
        document.getElementById("date").innerText = now.toLocaleDateString("vi-VN").toUpperCase();
    }
    setInterval(updateClock, 1000);

    async function fetchData() {
        try {
            const res = await fetch(PROGRESS_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
            rawData = json.table.rows.slice(4);
            renderAll();
            resetBars();
        } catch (e) { console.error("Data error"); }
    }

    function resetBars() {
        ["refreshBar1", "refreshBar2"].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove("animating");
            void el.offsetWidth;
            el.classList.add("animating");
        });
    }

    function renderAll() {
        renderProgress();
        renderAnalytics();
        renderGuarantees();
    }

    function renderProgress() {
        const el = document.getElementById("progress");
        const totalPages = Math.ceil(rawData.length / ROWS_PER_PAGE) || 1;
        const start = currentPage * ROWS_PER_PAGE;
        const items = rawData.slice(start, start + ROWS_PER_PAGE);

        document.getElementById("progress-count").innerText = `${rawData.length} HẠNG MỤC`;
        el.innerHTML = items.map(row => {
            const d = row.c;
            const project = d[1]?.v || "—";
            const item = d[2]?.v ? d[2].v.trim() : ""; // Nội dung hạng mục
            const deadline = d[7]?.f || "—";
            
            // Logic mới: Nếu item (Hạng mục) trống thì không hiện Tiến độ & Trạng thái
            let progressHtml = "";
            let badgeHtml = "";

            if (item !== "" && item !== "—") {
                let pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
                const isOverdue = d[7]?.v && new Date(parseGSDate(d[7]?.v)) < new Date() && pct < 100;

                progressHtml = `<div class="pct-num">${pct}%</div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>`;
                
                if (pct >= 100) badgeHtml = `<span class="badge b-done">HOÀN TẤT</span>`;
                else if (isOverdue) badgeHtml = `<span class="badge b-late">QUÁ HẠN</span>`;
                else badgeHtml = `<span class="badge b-wip">ĐANG CHẠY</span>`;
            }

            return `<tr>
                <td><div class="project-name">${project}</div></td>
                <td style="text-align:left;">${item || "—"}</td>
                <td>${progressHtml}</td>
                <td style="font-family: var(--f-mono); font-size:13px;">${deadline}</td>
                <td>${badgeHtml}</td>
            </tr>`;
        }).join("");

        document.getElementById("progressPage").innerText = `PAGE ${currentPage + 1}/${totalPages}`;
        updateDots(totalPages);
    }

    function updateDots(total) {
        const container = document.getElementById("progressDots");
        container.innerHTML = "";
        for (let i = 0; i < Math.min(total, 10); i++) {
            const dot = document.createElement("div");
            dot.className = `dot ${i === currentPage ? 'active' : ''}`;
            container.appendChild(dot);
        }
    }

    function renderAnalytics() {
        const staffMap = {}, custMap = {};
        rawData.forEach(row => {
            const s = row.c[3]?.v, c = row.c[4]?.v;
            if (s && s !== "—") staffMap[s] = (staffMap[s] || 0) + 1;
            if (c && c !== "—") custMap[c] = (custMap[c] || 0) + 1;
        });

        const fill = (map, elId, badgeId) => {
            const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, 5);
            document.getElementById(badgeId).innerText = Object.keys(map).length;
            document.getElementById(elId).innerHTML = sorted.map(([name, count]) => 
                `<tr><td style="text-align:left; font-size:13px; padding: 10px 8px;">${name}</td><td style="color:var(--accent); font-weight:bold; padding: 10px 8px;">${count}</td></tr>`
            ).join("");
        };
        fill(staffMap, "staff-list", "staff-count");
        fill(custMap, "customer-list", "customer-count");
    }

    function renderGuarantees() {
        const el = document.getElementById("guarantee");
        el.innerHTML = `<tr><td colspan="3" style="color:var(--text-dim); padding:25px;">CHỜ DỮ LIỆU...</td></tr>`;
    }

    function parseGSDate(gsDate) {
        if (!gsDate || typeof gsDate !== 'string') return null;
        const m = gsDate.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(m[1], m[2], m[3]) : null;
    }

    setInterval(() => {
        const totalPages = Math.ceil(rawData.length / ROWS_PER_PAGE) || 1;
        currentPage = (currentPage + 1) % totalPages;
        renderProgress();
    }, PAGE_TIME);

    setInterval(fetchData, REFRESH_TIME);
    window.onload = fetchData;
</script>

</body>
</html>
