<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--f-sans); overflow: hidden; }

        .header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            height: 55px; padding: 0 20px; background: var(--bg-header); border-bottom: 2px solid var(--border-hi);
        }
        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--text-bright); }
        .logo-box { width: 28px; height: 28px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .header-title { font-size: 18px; font-weight: 700; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
        .header-right { text-align: right; font-family: var(--f-mono); }
        .header-clock { font-size: 18px; color: var(--text-bright); font-weight: 600; }
        .header-date { font-size: 11px; color: var(--accent); }

        .container { display: flex; height: calc(100vh - 55px); padding: 10px; gap: 10px; }
        
        /* Cột trái: 65% - Hiển thị 16 dòng */
        .col-left { flex: 0 0 65%; display: flex; flex-direction: column; border: 1px solid var(--border-hi); background: rgba(13,20,40,0.5); border-radius: 4px; padding: 10px; position: relative; }
        
        /* Cột phải: 35% */
        .col-right { flex: 0 0 calc(35% - 10px); display: flex; flex-direction: column; gap: 10px; }

        /* Mở rộng bảng Bảo lãnh chiếm 70% chiều cao cột phải để hiện đủ dữ liệu */
        .panel-top-right { flex: 0 0 70%; display: flex; flex-direction: column; border: 1px solid var(--border-hi); background: rgba(13,20,40,0.5); border-radius: 4px; padding: 10px; }
        .panel-bottom-right { flex: 1; display: flex; gap: 10px; min-height: 0; }
        .sub-panel { flex: 1; border: 1px solid var(--border-hi); background: rgba(13,20,40,0.5); border-radius: 4px; padding: 10px; display: flex; flex-direction: column; }

        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid var(--border-hi); padding-bottom: 5px; }
        .panel-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; }
        .title-dot { width: 5px; height: 5px; background: var(--accent); transform: rotate(45deg); }
        .badge-count { font-family: var(--f-mono); font-size: 11px; padding: 1px 6px; background: var(--gold); color: #000; border-radius: 2px; font-weight: 700; }

        .table-wrap { flex: 1; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--bg-thead); color: var(--accent); font-size: 10.5px; padding: 8px 4px; text-transform: uppercase; border-bottom: 1px solid var(--border-hi); }
        td { padding: 7px 4px; font-size: 11.5px; border-bottom: 1px solid var(--border); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        
        .text-left { text-align: left; }
        .gold-bold { color: var(--gold); font-weight: 700; }
        .accent-text { color: var(--accent); }
        
        .bar-container { display: flex; align-items: center; gap: 5px; justify-content: center; }
        .bar-bg { width: 50px; height: 5px; background: #1a2a4a; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); }

        .st { font-size: 9px; padding: 2px 5px; border-radius: 2px; font-weight: 700; }
        .st-done { background: var(--green); color: #000; }
        .st-wip { border: 1px solid var(--accent); color: var(--accent); }
        .st-late { background: var(--red); color: #fff; }

        .footer-info { display: flex; justify-content: space-between; font-size: 10px; color: var(--accent); font-family: var(--f-mono); padding-top: 5px; }
        .refresh-line { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); width: 0; }
        .refresh-line.animating { animation: run 30s linear forwards; }
        @keyframes run { from { width: 100%; } to { width: 0%; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div> TID CO.LTD</div>
    <div class="header-title">PROJECT DASHBOARD</div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div class="header-date" id="date">--/--/----</div>
    </div>
</div>

<div class="container">
    <!-- CỘT TRÁI: 16 DÒNG/TRANG -->
    <div class="col-left">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="badge-count" id="p-count">0 HẠNG MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 22%;">DỰ ÁN</th>
                        <th style="width: 18%;">KHÁCH HÀNG</th>
                        <th style="width: 20%;">HẠNG MỤC</th>
                        <th style="width: 15%;">TIẾN ĐỘ</th>
                        <th style="width: 12%;">DEADLINE</th>
                        <th style="width: 13%;">TRẠNG THÁI</th>
                    </tr>
                </thead>
                <tbody id="p-table"></tbody>
            </table>
        </div>
        <div class="footer-info">
            <div id="p-page">PAGE 1/1</div>
            <div id="p-sync">Đang đồng bộ...</div>
        </div>
        <div class="refresh-line" id="line1"></div>
    </div>

    <!-- CỘT PHẢI -->
    <div class="col-right">
        <div class="panel-top-right">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> THEO DÕI BẢO LÃNH</div>
                <div class="badge-count" id="g-count" style="background:var(--accent)">0</div>
            </div>
            <div class="table-wrap" style="overflow-y: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 35%;">DỰ ÁN</th>
                            <th style="width: 25%;">KHÁCH HÀNG</th>
                            <th style="width: 15%;">LOẠI</th>
                            <th style="width: 25%;">GIÁ TRỊ</th>
                        </tr>
                    </thead>
                    <tbody id="g-table"></tbody>
                </table>
            </div>
        </div>

        <div class="panel-bottom-right">
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 11px;">TOP NHÂN SỰ</div></div>
                <div class="table-wrap"><table><tbody id="s-table"></tbody></table></div>
            </div>
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 11px;">TOP KHÁCH HÀNG</div></div>
                <div class="table-wrap"><table><tbody id="c-table"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y";
    const URL_PROGRESS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1280059749`;
    const URL_GUARANTEE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Bao%20lanh`;

    let dataP = [], dataG = [], currentPage = 0;
    const ROWS_PER_PAGE = 16; // Điều kiện 16 dòng 1 trang

    async function fetchData() {
        try {
            const [resP, resG] = await Promise.all([fetch(URL_PROGRESS), fetch(URL_GUARANTEE)]);
            const txtP = await resP.text();
            const txtG = await resG.text();
            
            dataP = JSON.parse(txtP.substring(txtP.indexOf("{"), txtP.lastIndexOf("}") + 1)).table.rows.slice(4);
            dataG = JSON.parse(txtG.substring(txtG.indexOf("{"), txtG.lastIndexOf("}") + 1)).table.rows.filter(r => r.c && r.c[9]?.v);

            renderAll();
            startProgressLine();
            document.getElementById("p-sync").innerText = "Đã cập nhật: " + new Date().toLocaleTimeString();
        } catch (e) { document.getElementById("p-sync").innerText = "Lỗi kết nối!"; }
    }

    function renderAll() {
        renderProgress();
        renderGuarantees();
        renderStats();
    }

    function renderProgress() {
        const el = document.getElementById("p-table");
        const totalPages = Math.ceil(dataP.length / ROWS_PER_PAGE);
        const start = currentPage * ROWS_PER_PAGE;
        const items = dataP.slice(start, start + ROWS_PER_PAGE);

        document.getElementById("p-count").innerText = `${dataP.length} HẠNG MỤC`;
        document.getElementById("p-page").innerText = `PAGE ${currentPage + 1}/${totalPages || 1}`;

        el.innerHTML = items.map(row => {
            const d = row.c;
            const pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
            const isLate = d[7]?.v && new Date(parseDate(d[7].v)) < new Date() && pct < 100;
            return `<tr>
                <td class="text-left gold-bold">${d[1]?.v || "—"}</td>
                <td class="text-left accent-text">${d[4]?.v || "—"}</td>
                <td class="text-left">${d[2]?.v || "—"}</td>
                <td><div class="bar-container"><span style="width:25px">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div></td>
                <td style="font-family:var(--f-mono);">${d[7]?.f || "—"}</td>
                <td><span class="st ${pct>=100?'st-done':(isLate?'st-late':'st-wip')}">${pct>=100?'XONG':(isLate?'TRỄ':'LÀM')}</span></td>
            </tr>`;
        }).join("");
    }

    function renderGuarantees() {
        const el = document.getElementById("g-table");
        document.getElementById("g-count").innerText = dataG.length;
        // Hiển thị tối đa 14 dòng bảo lãnh để không bị tràn
        el.innerHTML = dataG.slice(0, 14).map(row => {
            const d = row.c;
            return `<tr>
                <td class="text-left" style="color:#fff;">${d[9]?.v || "—"}</td>
                <td class="text-left accent-text">${d[10]?.v || "—"}</td>
                <td><span class="st st-wip" style="font-size:8px">${d[13]?.v || "—"}</span></td>
                <td class="gold-bold">${d[12]?.f || "0"}</td>
            </tr>`;
        }).join("");
    }

    function renderStats() {
        const staff = {}, cust = {};
        dataP.forEach(r => {
            const s = r.c[3]?.v, c = r.c[4]?.v;
            if(s && s !== "—") staff[s] = (staff[s] || 0) + 1;
            if(c && c !== "—") cust[c] = (cust[c] || 0) + 1;
        });
        const fill = (map, id) => {
            const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0, 4);
            document.getElementById(id).innerHTML = sorted.map(([n, v]) => 
                `<tr><td class="text-left" style="font-size:10px;">${n}</td><td class="accent-text" style="font-weight:700; width:25px; text-align:right;">${v}</td></tr>`
            ).join("");
        };
        fill(staff, "s-table");
        fill(cust, "c-table");
    }

    function parseDate(v) {
        const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(m[1], m[2], m[3]) : null;
    }

    function startProgressLine() {
        const l = document.getElementById("line1");
        l.classList.remove("animating");
        void l.offsetWidth;
        l.classList.add("animating");
    }

    setInterval(() => {
        const total = Math.ceil(dataP.length / ROWS_PER_PAGE);
        if(total > 1) { currentPage = (currentPage + 1) % total; renderProgress(); }
    }, 10000);

    setInterval(fetchData, 30000);
    setInterval(() => {
        const n = new Date();
        document.getElementById("clock").innerText = n.toLocaleTimeString("vi-VN", {hour12:false});
        document.getElementById("date").innerText = n.toLocaleDateString("vi-VN");
    }, 1000);
    window.onload = fetchData;
</script>
</body>
</html>
