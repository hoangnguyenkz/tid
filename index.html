<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --accent-dim: #2a7aaa;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --orange: #ffaa4d;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --text-dim: #6a90b8;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--f-sans);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ── */
        .header {
            position: relative;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 64px;
            padding: 0 28px;
            background: var(--bg-header);
            border-bottom: 2px solid var(--border-hi);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
            opacity: 0.45;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 1.5px;
        }

        .logo-box {
            width: 36px; height: 36px;
            border: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700;
            color: var(--accent);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow { 0%,100%{ box-shadow:0 0 4px rgba(96,200,240,.3)} 50%{ box-shadow:0 0 14px rgba(96,200,240,.7)} }

        .header-center { text-align: center; }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .header-right { text-align: right; }
        .header-clock {
            font-family: var(--f-mono);
            font-size: 24px;
            font-weight: 500;
            color: var(--text-bright);
        }

        /* ── LAYOUT ── */
        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 64px);
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        .panel.split-panel { flex: 1; }

        .panel-top {
            flex: 0.6;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid var(--border-hi);
            margin-bottom: 10px;
            padding-bottom: 10px;
            overflow: hidden;
        }

        .panel-bottom {
            flex: 0.4;
            display: flex;
            gap: 15px;
        }

        .sub-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── COMPONENTS ── */
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border-hi);
            padding-bottom: 8px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-bright);
            text-transform: uppercase;
        }

        .title-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            transform: rotate(45deg);
        }

        .panel-badge {
            font-family: var(--f-mono);
            font-size: 11px;
            padding: 3px 10px;
            border: 1px solid var(--border-hi);
            color: var(--accent);
            background: rgba(96,200,240,0.1);
        }

        /* ── TABLE ── */
        .table-wrap { flex: 1; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th {
            background: var(--bg-thead);
            color: var(--accent);
            font-size: 12px;
            padding: 10px;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-hi);
        }
        th:first-child, td:first-child { text-align: left; }
        td {
            padding: 10px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            transition: background 0.2s;
        }
        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        
        #progress { transition: opacity 0.4s ease-in-out; }
        .fade-out { opacity: 0; }

        /* ── CELLS ── */
        .project-name { font-weight: 700; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pct-num { font-family: var(--f-mono); color: var(--accent); font-weight: bold; }
        .bar-bg { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); transition: width 1s ease-in-out; }
        .date-val.overdue { color: var(--red); font-weight: bold; }
        .count-val { font-family: var(--f-mono); color: var(--accent); font-weight: bold; font-size: 16px; }

        /* ── BADGES ── */
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; font-size: 11px; font-weight: 700; border-radius: 3px;
        }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
        .b-done { background: var(--green); color: #000; }
        .b-wip { border: 1px solid var(--accent); color: var(--accent); }
        .b-late { background: var(--red); color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* ── FOOTER ── */
        .panel-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 10px; border-top: 1px solid var(--border-hi);
        }
        .page-dots { display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; background: var(--border-hi); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--accent); transform: scale(1.3); box-shadow: 0 0 8px var(--accent); }

        /* ── REFRESH BAR ── */
        .refresh-bar {
            position: absolute; bottom: 0; left: 0; height: 3px;
            background: var(--accent); width: 0;
        }
        .refresh-bar.animating { animation: progress-run 30s linear forwards; }
        @keyframes progress-run { from { width: 100%; } to { width: 0%; } }

        /* ── RESPONSIVE ── */
        @media (min-width: 1024px) { .container { flex-direction: row; } .panel:first-child { border-right: 2px solid var(--border-hi); } }
        @media (max-width: 768px) {
            .header-title { font-size: 14px; letter-spacing: 1px; }
            .header-clock { font-size: 16px; }
            .panel-bottom { flex-direction: column; }
            th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6) { display: none; } /* Ẩn bớt cột trên Mobile */
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-logo"><div class="logo-box">T</div> TID CO.LTD</div>
        <div style="font-family: var(--f-mono); font-size: 10px; color: var(--text-dim);">SYSTEM V2.0</div>
    </div>
    <div class="header-center">
        <div class="header-title">PROJECT DASHBOARD</div>
        <div style="font-family: var(--f-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 2px;">REAL-TIME MONITORING</div>
    </div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div style="font-family: var(--f-mono); font-size: 10px; color: var(--text-dim);" id="date">--/--/----</div>
    </div>
</div>

<div class="container">
    <!-- PANEL TRÁI: TIẾN ĐỘ -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="panel-badge" id="progress-count">0 HẠNG MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 20%;">DỰ ÁN</th>
                        <th style="width: 20%;">HẠNG MỤC</th>
                        <th style="width: 15%;">TIẾN ĐỘ</th>
                        <th style="width: 15%;">DEADLINE</th>
                        <th style="width: 15%;">KHÁCH HÀNG</th>
                        <th style="width: 15%;">TRẠNG THÁI</th>
                    </tr>
                </thead>
                <tbody id="progress"></tbody>
            </table>
        </div>
        <div class="panel-footer">
            <div id="progressPage" style="font-family: var(--f-mono); font-size: 11px;">TRANG 1 / 1</div>
            <div class="page-dots" id="progressDots"></div>
        </div>
        <div class="refresh-bar" id="refreshBar1"></div>
    </div>

    <!-- PANEL PHẢI: BẢO LÃNH & NHÂN SỰ -->
    <div class="panel split-panel">
        <div class="panel-top">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> THEO DÕI BẢO LÃNH</div>
                <div class="panel-badge" id="guarantee-count">0 BẢO LÃNH</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>DỰ ÁN</th>
                            <th>LOẠI</th>
                            <th>GIÁ TRỊ</th>
                            <th>HẾT HẠN</th>
                        </tr>
                    </thead>
                    <tbody id="guarantee"></tbody>
                </table>
            </div>
        </div>

        <div class="panel-bottom">
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 13px;">TOP NHÂN SỰ</div><div class="panel-badge" id="staff-count">0</div></div>
                <div class="table-wrap">
                    <table>
                        <tbody id="staff-list"></tbody>
                    </table>
                </div>
            </div>
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 13px;">TOP KHÁCH HÀNG</div><div class="panel-badge" id="customer-count">0</div></div>
                <div class="table-wrap">
                    <table>
                        <tbody id="customer-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="refresh-bar" id="refreshBar2"></div>
    </div>
</div>

<script>
    const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";
    const ROWS_PER_PAGE = 12;
    const PAGE_TIME = 8000; 
    const REFRESH_TIME = 30000;

    let rawData = [];
    let currentPage = 0;

    // ── CLOCK ──
    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("vi-VN", { hour12: false });
        document.getElementById("date").innerText = now.toLocaleDateString("vi-VN", { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' }).toUpperCase();
    }
    setInterval(updateClock, 1000);

    // ── DATA FETCHING ──
    async function fetchData() {
        try {
            const res = await fetch(PROGRESS_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
            rawData = json.table.rows.slice(4); // Bỏ 4 dòng đầu theo cấu trúc sheet của bạn
            
            currentPage = 0;
            renderAll();
            resetBars();
        } catch (e) {
            console.error("Lỗi tải dữ liệu:", e);
        }
    }

    function resetBars() {
        ["refreshBar1", "refreshBar2"].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove("animating");
            void el.offsetWidth;
            el.classList.add("animating");
        });
    }

    // ── RENDERING ──
    function renderAll() {
        renderProgress();
        renderAnalytics();
        renderGuarantees(); // Bạn có thể thêm logic lọc bảo lãnh riêng ở đây
    }

    function renderProgress() {
        const el = document.getElementById("progress");
        const totalPages = Math.ceil(rawData.length / ROWS_PER_PAGE) || 1;
        const start = currentPage * ROWS_PER_PAGE;
        const items = rawData.slice(start, start + ROWS_PER_PAGE);

        el.classList.add("fade-out");

        setTimeout(() => {
            document.getElementById("progress-count").innerText = `${rawData.length} HẠNG MỤC`;
            el.innerHTML = items.map(row => {
                const d = row.c;
                const project = d[1]?.v || "—";
                const item = d[2]?.v || "—";
                const person = d[3]?.v || "—";
                const customer = d[4]?.v || "—";
                const deadline = d[7]?.f || "—";
                let pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));

                const isOverdue = d[7]?.v && new Date(parseGSDate(d[7]?.v)) < new Date() && pct < 100;

                let badgeHtml = `<span class="badge b-wip"><span class="badge-dot"></span>ĐANG CHẠY</span>`;
                if (pct >= 100) badgeHtml = `<span class="badge b-done"><span class="badge-dot"></span>HOÀN TẤT</span>`;
                else if (isOverdue) badgeHtml = `<span class="badge b-late"><span class="badge-dot"></span>QUÁ HẠN</span>`;

                return `<tr>
                    <td><div class="project-name">${project}</div></td>
                    <td>${item}</td>
                    <td>
                        <div class="pct-num">${pct}%</div>
                        <div class="bar-bg"><div class="bar-fill" style="width: ${pct}%"></div></div>
                    </td>
                    <td class="date-val ${isOverdue ? 'overdue' : ''}">${deadline}</td>
                    <td>${customer}</td>
                    <td>${badgeHtml}</td>
                </tr>`;
            }).join("");

            document.getElementById("progressPage").innerText = `TRANG ${currentPage + 1} / ${totalPages}`;
            updateDots(totalPages);
            el.classList.remove("fade-out");
        }, 400);
    }

    function updateDots(total) {
        const container = document.getElementById("progressDots");
        container.innerHTML = "";
        for (let i = 0; i < Math.min(total, 10); i++) {
            const dot = document.createElement("div");
            dot.className = `dot ${i === currentPage ? 'active' : ''}`;
            container.appendChild(dot);
        }
    }

    function renderAnalytics() {
        const staffMap = {}, custMap = {};
        rawData.forEach(row => {
            const s = row.c[3]?.v, c = row.c[4]?.v;
            if (s && s !== "—") staffMap[s] = (staffMap[s] || 0) + 1;
            if (c && c !== "—") custMap[c] = (custMap[c] || 0) + 1;
        });

        const fillTable = (map, elId, badgeId) => {
            const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, 5);
            document.getElementById(badgeId).innerText = Object.keys(map).length;
            document.getElementById(elId).innerHTML = sorted.map(([name, count]) => 
                `<tr><td style="font-size:12px">${name}</td><td class="count-val">${count}</td></tr>`
            ).join("");
        };

        fillTable(staffMap, "staff-list", "staff-count");
        fillTable(custMap, "customer-list", "customer-count");
    }

    function renderGuarantees() {
        // Mock dữ liệu bảo lãnh hoặc lọc từ sheet chính nếu có cột phân loại
        const el = document.getElementById("guarantee");
        el.innerHTML = `<tr><td colspan="4" style="color:var(--text-dim); padding:20px;">DỮ LIỆU ĐANG ĐƯỢC ĐỒNG BỘ...</td></tr>`;
    }

    function parseGSDate(gsDate) {
        if (!gsDate || typeof gsDate !== 'string') return null;
        const m = gsDate.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(m[1], m[2], m[3]) : null;
    }

    // ── TIMERS ──
    setInterval(() => {
        const totalPages = Math.ceil(rawData.length / ROWS_PER_PAGE) || 1;
        currentPage = (currentPage + 1) % totalPages;
        renderProgress();
    }, PAGE_TIME);

    setInterval(fetchData, REFRESH_TIME);
    
    window.onload = () => {
        updateClock();
        fetchData();
    };
</script>

</body>
</html>
