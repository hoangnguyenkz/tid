<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROJECT FLIGHT BOARD</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #00e5ff;
    font-family: "Consolas", "Segoe UI", monospace;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    font-size: 32px;
    border-bottom: 3px solid #00e5ff;
    letter-spacing: 2px;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 80px);
}

.section {
    flex: 1;
    padding: 15px;
}

.section:first-child {
    border-right: 3px solid #00e5ff;
}

/* TITLE */
h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 10px;
    color: #fff;
}

/* TABLE */
.table-wrap {
    height: calc(100% - 40px);
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

/* HEADER ROW */
th {
    background: #001f2f;
    border: 1px solid #00e5ff;
    padding: 10px;
    font-size: 18px;
    text-transform: uppercase;
}

/* BODY */
td {
    border: 1px solid #00e5ff33;
    padding: 10px;
    font-size: 18px;
    text-align: center;
}

/* PROJECT NAME */
.project {
    color: #ffd600;
    font-weight: bold;
}

/* STATUS BADGE */
.status {
    padding: 5px 10px;
    border-radius: 4px;
    font-weight: bold;
    display: inline-block;
    min-width: 120px;
}

.done {
    background: #00ff00;
    color: black;
}

.late {
    background: red;
    color: white;
    animation: blink 1s infinite;
}

.design {
    background: #00bfff;
    color: black;
}

@keyframes blink {
    50% { opacity: 0.4; }
}

/* PAGE INFO */
.page-info {
    text-align: center;
    margin-top: 5px;
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<div class="header">
    <div>✈ PROJECT CONTROL BOARD</div>
    <div id="clock"></div>
</div>

<div class="container">

<!-- LEFT -->
<div class="section">
    <h2>TIẾN ĐỘ DỰ ÁN</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Dự án</th>
                    <th>Hạng mục</th>
                    <th>%</th>
                    <th>Deadline</th>
                    <th>Nhân sự</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="progress"></tbody>
        </table>
    </div>
    <div class="page-info" id="progressPage"></div>
</div>

<!-- RIGHT -->
<div class="section">
    <h2>THEO DÕI BẢO LÃNH</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Dự án</th>
                    <th>Loại</th>
                    <th>Giá trị</th>
                    <th>Hết hạn</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="guarantee"></tbody>
        </table>
    </div>
    <div class="page-info" id="guaranteePage"></div>
</div>

</div>

<script>
const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";
const GUARANTEE_URL = "";

const PAGE_TIME = 10000;

let progressData = [];
let guaranteeData = [];

let progressPage = 0;
let guaranteePage = 0;

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

/* PARSE */
function parseJSON(text) {
    return JSON.parse(
        text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );
}

/* FETCH */
async function fetchSheet(url) {
    if (!url) return [];

    const res = await fetch(url);
    const text = await res.text();
    const json = parseJSON(text);

    return (json.table.rows || []).slice(4);
}

/* FORMAT */
function formatPercent(p) {
    let v = Number(p);
    if (v <= 1) v *= 100;
    return Math.round(v) + "%";
}

function formatDate(d) {
    if (!d) return "";
    let date = new Date(d);
    if (isNaN(date)) return d;
    return `${String(date.getDate()).padStart(2,"0")}/${String(date.getMonth()+1).padStart(2,"0")}/${date.getFullYear()}`;
}

/* ROW */
function getRows() {
    const height = document.querySelector(".table-wrap").clientHeight;
    return Math.max(6, Math.floor(height / 48));
}

/* LOAD */
async function loadData() {
    progressData = await fetchSheet(PROGRESS_URL);
    guaranteeData = await fetchSheet(GUARANTEE_URL);

    renderProgress();
    renderGuarantee();
}

/* PAGING */
function getPage(data, page) {
    const rows = getRows();
    return data.slice(page * rows, page * rows + rows);
}

/* RENDER PROGRESS */
function renderProgress() {
    const el = document.getElementById("progress");
    const rows = getRows();
    const pageData = getPage(progressData, progressPage);

    el.innerHTML = "";

    pageData.forEach(r => {
        const d = r.c;

        let item = d[2]?.v || "";
        let percent = d[9]?.v || 0;
        let deadline = d[7]?.v;

        let status = "";
        if (item) {
            let cls = "design";
            let txt = "ĐANG THIẾT KẾ";

            if (Number(percent) >= 100) {
                cls = "done"; txt = "HOÀN THÀNH";
            } else if (deadline && new Date(deadline) < new Date()) {
                cls = "late"; txt = "QUÁ HẠN";
            }

            status = `<span class="status ${cls}">${txt}</span>`;
        }

        el.innerHTML += `
        <tr>
            <td class="project">${d[1]?.v || ""}</td>
            <td>${item}</td>
            <td>${formatPercent(percent)}</td>
            <td>${formatDate(deadline)}</td>
            <td>${d[3]?.v || ""}</td>
            <td>${status}</td>
        </tr>`;
    });

    document.getElementById("progressPage").innerText =
        `Trang ${progressPage + 1}/${Math.ceil(progressData.length / rows) || 1}`;
}

/* RENDER GUARANTEE */
function renderGuarantee() {
    const el = document.getElementById("guarantee");
    el.innerHTML = "";
}

/* AUTO PAGE */
setInterval(() => {
    let rows = getRows();
    progressPage = (progressPage + 1) % (Math.ceil(progressData.length / rows) || 1);
    renderProgress();
}, PAGE_TIME);

/* REFRESH */
setInterval(loadData, 30000);

loadData();
</script>

</body>
</html>
