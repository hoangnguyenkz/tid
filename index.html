<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME LINE PROJECT TID</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --header-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-accent: #f1c40f;
            --row-even: #111111;
            --row-odd: #000000;
            --status-green: #2ecc71;
            --status-orange: #e67e22;
            --status-red: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-transform: uppercase;
        }

        .controls {
            height: 50px;
            padding: 0 20px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #444;
        }

        .main-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        #sync-status { font-size: 0.7rem; color: #00d4ff; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            flex-grow: 1;
            gap: 2px;
            background-color: #333;
            overflow: hidden;
        }

        .board-column { display: flex; flex-direction: column; background: var(--bg-color); overflow: hidden; }
        .split-column { display: grid; grid-template-rows: 1fr 1fr; gap: 2px; background-color: #333; }

        .board-title-area {
            background-color: var(--header-bg);
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #444;
            position: relative;
        }

        .board-title { color: var(--text-accent); font-size: 0.9rem; font-weight: bold; }
        .page-info { position: absolute; right: 10px; color: #666; font-size: 0.7rem; }

        .data-header { 
            display: grid; background-color: #222; color: #00d4ff; 
            font-weight: bold; font-size: 0.7rem; height: 30px; align-items: center; padding: 0 8px;
        }
        
        .data-list { flex-grow: 1; display: flex; flex-direction: column; }
        .data-row {
            display: grid; align-items: center; padding: 0 8px;
            font-size: 0.8rem; border-bottom: 1px solid #222;
        }
        
        .data-list .data-row:nth-child(odd) { background-color: var(--row-odd); }
        .data-list .data-row:nth-child(even) { background-color: var(--row-even); }

        /* Cấu trúc cột */
        .tiendo-grid { grid-template-columns: 40px 1.2fr 1fr 1fr 50px 90px 90px 100px; }
        .baolanh-grid { grid-template-columns: 40px 1.2fr 1fr 1fr 100px 100px; }

        .col-name { color: var(--text-accent); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-tag {
            padding: 2px 4px; border-radius: 3px; font-size: 0.65rem; text-align: center; font-weight: bold;
            border: 1px solid currentColor;
        }

        #clock { text-align: right; font-family: monospace; color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <div id="sync-status">ĐANG KHỞI TẠO...</div>
        <div class="main-title">TIME LINE PROJECT TID</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="dashboard-grid">
        <!-- BẢNG TIẾN ĐỘ -->
        <div class="board-column">
            <div class="board-title-area">
                <div class="board-title">THEO DÕI TIẾN ĐỘ</div>
                <div class="page-info" id="pageTiendo">1/1</div>
            </div>
            <div class="data-header tiendo-grid">
                <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>HẠNG MỤC</div><div>%</div><div>DEADLINE</div><div>NHÂN SỰ</div><div>TRẠNG THÁI</div>
            </div>
            <div id="tiendoList" class="data-list"></div>
        </div>

        <div class="split-column">
            <!-- BẢNG BẢO LÃNH -->
            <div class="board-column">
                <div class="board-title-area">
                    <div class="board-title">THEO DÕI BẢO LÃNH</div>
                    <div class="page-info" id="pageBaolanh">1/1</div>
                </div>
                <div class="data-header baolanh-grid">
                    <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>HẠNG MỤC</div><div>GIÁ TRỊ</div><div>TRẠNG THÁI</div>
                </div>
                <div id="baolanhList" class="data-list"></div>
            </div>

            <!-- THỐNG KÊ NHÂN SỰ -->
            <div class="board-column">
                <div class="board-title-area"><div class="board-title">THỐNG KÊ TỔNG HỢP</div></div>
                <div id="summaryList" class="data-list" style="padding: 10px; font-size: 0.85rem; line-height: 2;"></div>
            </div>
        </div>
    </div>

    <script>
        const FILE_URL = "https://onedrive.live.com/download?resid=B1DC83BD9D47FD20!135&authkey=AHy5P0OnSuVSKayXq-r_p79A";
        // Proxy mạnh mẽ hơn để vượt lỗi kết nối
        const PROXY = "https://api.allorigins.win/raw?url=";

        let db = { tiendo: [], baolanh: [] };
        let pages = { tiendo: 0, baolanh: 0 };

        async function fetchData() {
            try {
                document.getElementById('sync-status').innerText = "ĐANG ĐỒNG BỘ...";
                const res = await fetch(PROXY + encodeURIComponent(FILE_URL));
                if (!res.ok) throw new Error();
                
                const buf = await res.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:true});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:""});
                
                parseData(data);
                document.getElementById('sync-status').innerText = "CẬP NHẬT: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('sync-status').innerText = "LỖI KẾT NỐI - ĐANG THỬ LẠI...";
                setTimeout(fetchData, 10000);
            }
        }

        function parseData(rows) {
            db.tiendo = []; db.baolanh = [];
            const staffMap = {};

            rows.slice(2).forEach(r => {
                if(r[1]) {
                    db.tiendo.push({stt:r[0], name:r[1], cust:r[2], item:r[3], p:r[4], dl:r[5], staff:r[6], st:r[7]});
                    if(r[6]) {
                        r[6].split(',').forEach(s => {
                            const name = s.trim();
                            if(name) staffMap[name] = (staffMap[name] || 0) + 1;
                        });
                    }
                }
                if(r[9]) db.baolanh.push({stt:r[8], name:r[9], cust:r[10], item:r[11], val:r[13], st:r[14]});
            });

            // Hiển thị thống kê nhân sự
            let summaryHtml = "<strong>NHÂN SỰ ĐANG PHỤ TRÁCH:</strong><br>";
            Object.entries(staffMap).sort((a,b)=>b[1]-a[1]).forEach(([name, count]) => {
                summaryHtml += `- ${name}: ${count} Dự án<br>`;
            });
            document.getElementById('summaryList').innerHTML = summaryHtml;

            render();
        }

        function render() {
            const renderTable = (id, data, page, size, gridClass, template) => {
                const start = page * size;
                const slice = data.slice(start, start + size);
                document.getElementById(id).innerHTML = slice.map(template).join('');
            };

            // Render bảng Tiến độ (12 dòng/trang)
            renderTable('tiendoList', db.tiendo, pages.tiendo, 12, 'tiendo-grid', r => `
                <div class="data-row tiendo-grid">
                    <div style="color:#666">${r.stt}</div>
                    <div class="col-name">${r.name}</div>
                    <div>${r.cust}</div>
                    <div style="font-size:0.7rem">${r.item}</div>
                    <div style="color:#f1c40f">${Math.round(r.p*100)||0}%</div>
                    <div style="color:#00d4ff">${r.dl instanceof Date ? r.dl.toLocaleDateString('vi-VN') : r.dl}</div>
                    <div style="color:#2ecc71">${r.staff}</div>
                    <div><span class="status-tag" style="color:${getStatusColor(r.st)}">${r.st}</span></div>
                </div>
            `);

            // Render bảng Bảo lãnh (6 dòng/trang)
            renderTable('baolanhList', db.baolanh, pages.baolanh, 6, 'baolanh-grid', r => `
                <div class="data-row baolanh-grid">
                    <div style="color:#666">${r.stt}</div>
                    <div class="col-name">${r.name}</div>
                    <div>${r.cust}</div>
                    <div>${r.item}</div>
                    <div style="text-align:right; color:#e74c3c">${r.val.toLocaleString()}</div>
                    <div><span class="status-tag" style="color:${getStatusColor(r.st)}">${r.st}</span></div>
                </div>
            `);

            document.getElementById('pageTiendo').innerText = `${pages.tiendo + 1}/${Math.ceil(db.tiendo.length/12) || 1}`;
            document.getElementById('pageBaolanh').innerText = `${pages.baolanh + 1}/${Math.ceil(db.baolanh.length/6) || 1}`;
        }

        function getStatusColor(st) {
            if(!st) return "#fff";
            const s = st.toUpperCase();
            if(s.includes("XONG") || s.includes("HOÀN")) return "#2ecc71";
            if(s.includes("CHẬM") || s.includes("GẤP")) return "#e74c3c";
            return "#f1c40f";
        }

        // Chuyển trang tự động
        setInterval(() => {
            const maxT = Math.ceil(db.tiendo.length / 12);
            const maxB = Math.ceil(db.baolanh.length / 6);
            pages.tiendo = (pages.tiendo + 1) % (maxT || 1);
            pages.baolanh = (pages.baolanh + 1) % (maxB || 1);
            render();
        }, 8000);

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        fetchData();
        setInterval(fetchData, 300000); // Tải lại mỗi 5 phút
    </script>
</body>
</html>
