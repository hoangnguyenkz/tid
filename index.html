<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROJECT DASHBOARD</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00e5ff;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    font-size: 28px;
    font-weight: bold;
    border-bottom: 2px solid #00e5ff;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 70px);
}

.section {
    width: 50%;
    padding: 20px;
    box-sizing: border-box;
}

.section:first-child {
    border-right: 2px solid #00e5ff;
}

h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 10px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 20px;
}

th {
    border-bottom: 2px solid #00e5ff;
    padding: 10px;
}

td {
    border-bottom: 1px solid #222;
    padding: 10px;
    text-align: center;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

/* STATUS */
.late { color: red; animation: blink 1s infinite; }
.done { color: #00ff00; }
.doing { color: orange; }

@keyframes blink {
    50% { opacity: 0; }
}

/* FOOTER */
.page {
    text-align: center;
    font-size: 16px;
    color: #888;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">
    <div>📊 PROJECT DASHBOARD</div>
    <div id="clock"></div>
</div>

<div class="container">

<!-- TIẾN ĐỘ -->
<div class="section">
    <h2>TIẾN ĐỘ DỰ ÁN</h2>
    <table>
        <thead>
            <tr>
                <th>Dự án</th>
                <th>Hạng mục</th>
                <th>%</th>
                <th>Deadline</th>
                <th>Nhân sự</th>
                <th>Trạng thái</th>
            </tr>
        </thead>
        <tbody id="progress"></tbody>
    </table>
    <div class="page" id="progressPage"></div>
</div>

<!-- BẢO LÃNH -->
<div class="section">
    <h2>THEO DÕI BẢO LÃNH</h2>
    <table>
        <thead>
            <tr>
                <th>Dự án</th>
                <th>Loại</th>
                <th>Giá trị</th>
                <th>Hết hạn</th>
                <th>Trạng thái</th>
            </tr>
        </thead>
        <tbody id="guarantee"></tbody>
    </table>
    <div class="page" id="guaranteePage"></div>
</div>

</div>

<script>
/* ===== CONFIG ===== */
const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";

/* 👉 thay bằng sheet bảo lãnh nếu có */
const GUARANTEE_URL = "";

/* PAGING */
const ROWS = 8;
const TIME = 10000;

/* STATE */
let progressData = [];
let guaranteeData = [];

let progressPage = 0;
let guaranteePage = 0;

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

/* PARSE */
function parseJSON(text) {
    return JSON.parse(
        text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );
}

/* FETCH */
async function fetchSheet(url) {
    const res = await fetch(url);
    const text = await res.text();
    const json = parseJSON(text);
    return (json.table.rows || []).slice(7);
}

/* LOAD DATA */
async function loadData() {
    progressData = await fetchSheet(PROGRESS_URL);

    if (GUARANTEE_URL) {
        guaranteeData = await fetchSheet(GUARANTEE_URL);
    }

    renderProgress();
    renderGuarantee();
}

/* PAGINATION */
function getPage(data, page) {
    return data.slice(page * ROWS, page * ROWS + ROWS);
}

/* RENDER PROGRESS */
function renderProgress() {
    const el = document.getElementById("progress");
    const pageData = getPage(progressData, progressPage);

    el.innerHTML = "";

    pageData.forEach(r => {
        const d = r.c;

        let project = d[1]?.v || "";
        let item    = d[2]?.v || "";
        let percent = d[9]?.v || 0;
        let deadline= d[7]?.v || "";
        let staff   = d[3]?.v || "";

        let cls = "doing";
        let txt = "ĐANG LÀM";

        if (percent >= 100) {
            cls = "done";
            txt = "HOÀN THÀNH";
        }

        if (deadline && new Date(deadline) < new Date() && percent < 100) {
            cls = "late";
            txt = "QUÁ HẠN";
        }

        el.innerHTML += `
        <tr>
            <td class="project">${project}</td>
            <td>${item}</td>
            <td>${percent}%</td>
            <td>${formatDate(deadline)}</td>
            <td>${staff}</td>
            <td class="${cls}">${txt}</td>
        </tr>`;
    });

    updatePage("progressPage", progressPage, progressData.length);
}

/* RENDER GUARANTEE */
function renderGuarantee() {
    const el = document.getElementById("guarantee");
    const pageData = getPage(guaranteeData, guaranteePage);

    el.innerHTML = "";

    pageData.forEach(r => {
        const d = r.c;

        let project = d[1]?.v || "";
        let type    = d[2]?.v || "";
        let value   = d[3]?.v || 0;
        let expire  = d[4]?.v || "";

        let status = "OK";

        if (expire && new Date(expire) < new Date()) {
            status = "HẾT HẠN";
        }

        el.innerHTML += `
        <tr>
            <td class="project">${project}</td>
            <td>${type}</td>
            <td>${formatMoney(value)}</td>
            <td>${formatDate(expire)}</td>
            <td>${status}</td>
        </tr>`;
    });

    updatePage("guaranteePage", guaranteePage, guaranteeData.length);
}

/* PAGE INFO */
function updatePage(id, page, total) {
    const totalPages = Math.ceil(total / ROWS) || 1;
    document.getElementById(id).innerText =
        `Trang ${page + 1} / ${totalPages}`;
}

/* AUTO PAGE */
setInterval(() => {
    if (progressData.length) {
        progressPage = (progressPage + 1) % Math.ceil(progressData.length / ROWS);
        renderProgress();
    }
}, TIME);

setInterval(() => {
    if (guaranteeData.length) {
        guaranteePage = (guaranteePage + 1) % Math.ceil(guaranteeData.length / ROWS);
        renderGuarantee();
    }
}, TIME + 3000); // lệch thời gian để không lật cùng lúc

/* AUTO REFRESH */
setInterval(loadData, 30000);

/* FORMAT */
function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("vi-VN");
}

function formatMoney(n) {
    if (!n) return "0";
    return Number(n).toLocaleString("vi-VN") + " đ";
}

/* INIT */
loadData();
</script>

</body>
</html>
