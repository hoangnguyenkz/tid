<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PROJECT DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --bg-header: #0d1428;
  --bg-thead: #111d38;
  --row-a: #0e1830;
  --row-b: #0b1326;
  --border: #1e3358;
  --border-hi: #2e4f88;
  --accent: #60c8f0;
  --accent-dim: #2a7aaa;
  --gold: #ffc94d;
  --green: #3de08a;
  --red: #ff6b6b;
  --orange: #ffaa4d;
  --text: #d8eaf8;
  --text-bright: #ffffff;
  --text-dim: #6a90b8;
  --f-sans: 'IBM Plex Sans', sans-serif;
  --f-mono: 'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ── HEADER ── */
.header {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: auto;
  min-height: 50px;
  padding: 8px 12px;
  background: var(--bg-header);
  border-bottom: 2px solid var(--border-hi);
  gap: 8px;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
  opacity: 0.45;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1px;
  min-width: 0;
  overflow: hidden;
}
.logo-box {
  width: 28px; height: 28px;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  color: var(--accent);
  animation: glow 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes glow { 0%,100%{ box-shadow:0 0 4px rgba(96,200,240,.3)} 50%{ box-shadow:0 0 14px rgba(96,200,240,.7)} }
.header-sub {
  font-family: var(--f-mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  margin-top: 2px;
  white-space: nowrap;
}
.header-center { 
  text-align: center;
  min-width: 0;
  flex: 1;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-tagline {
  font-family: var(--f-mono);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-top: 2px;
}
.header-right { 
  text-align: right;
  min-width: 0;
}
.header-clock {
  font-family: var(--f-mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--text-bright);
  letter-spacing: 1px;
  white-space: nowrap;
}
.header-date {
  font-family: var(--f-mono);
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 2px;
  white-space: nowrap;
}

/* ── LAYOUT ── */
.container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 50px);
  overflow: hidden;
  gap: 0;
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px 10px;
  overflow: hidden;
  position: relative;
  border-bottom: 2px solid var(--border-hi);
}

.panel:first-child { 
  flex: 1.2;
}

.panel.split-panel {
  flex: 0.8;
}

.panel-top {
  flex: 0.55;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid var(--border-hi);
  margin-bottom: 8px;
  padding-bottom: 8px;
}

.panel-bottom {
  flex: 0.45;
  overflow: hidden;
  display: flex;
  gap: 8px;
  flex-direction: column;
}

.sub-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* ── PANEL HEADER ── */
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border-hi);
  gap: 8px;
  min-height: 0;
  flex-wrap: wrap;
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  color: var(--text-bright);
  text-transform: uppercase;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}

.panel-title.small {
  font-size: 11px;
  letter-spacing: 0.5px;
}

.title-dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 2px;
  transform: rotate(45deg);
  flex-shrink: 0;
}

.panel-badge {
  font-family: var(--f-mono);
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid var(--border-hi);
  color: var(--accent);
  background: rgba(96,200,240,.08);
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── TABLE ── */
.table-wrap { 
  flex: 1; 
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 12px;
}

thead tr { background: var(--bg-thead); }

th {
  padding: 8px 6px;
  font-family: var(--f-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  color: var(--accent);
  text-transform: uppercase;
  text-align: center;
  border-bottom: 2px solid var(--border-hi);
  white-space: nowrap;
}

th:first-child { text-align: left; }

tbody tr:nth-child(odd) { background: var(--row-a); }
tbody tr:nth-child(even) { background: var(--row-b); }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  height: 34px;
}

tbody tr:hover { background: rgba(96,200,240,.09) !important; }

td {
  padding: 6px;
  text-align: center;
  font-size: 12px;
  font-weight: 400;
  color: var(--text);
  vertical-align: middle;
  word-break: break-word;
  overflow: hidden;
}

td:first-child { text-align: left; }

/* ── CELLS ── */
.project-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.item-val, .customer-val, .person-val {
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.pct-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  height: 100%;
}

.pct-num {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}

.bar-bg {
  width: 50px; 
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
}

.date-val {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  display: block;
}

.date-val.overdue { 
  color: var(--red); 
  font-weight: 600; 
}

.type-val { 
  font-size: 11px; 
  color: var(--text-dim);
}

.value-val {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--gold);
  white-space: nowrap;
  display: block;
}

.count-val {
  font-family: var(--f-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
}

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.2px;
  border-radius: 3px;
  white-space: nowrap;
  text-transform: uppercase;
}

.badge-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Badges */
.b-done { color:#061810; background:var(--green); }
.b-done .badge-dot { background:#061810; }
.b-late { color:#fff; background:var(--red); animation: flash 1.4s step-end infinite; }
.b-late .badge-dot { background:#fff; animation: blink 1.4s step-end infinite; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.78} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.b-wip { color:var(--accent); background:rgba(96,200,240,.12); border:1px solid var(--accent); }
.b-wip .badge-dot { background:var(--accent); animation:pdot 2s ease-in-out infinite; }
@keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── FOOTER ── */
.panel-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border-hi);
  gap: 8px;
  font-size: 10px;
}

.page-info {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.page-dots { 
  display: flex; 
  gap: 4px; 
  align-items: center;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border-hi);
  transition: background .3s, transform .3s;
}

.dot.active {
  background: var(--accent);
  transform: scale(1.2);
}

/* ── STATES ── */
.empty-state, .loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 50px;
  color: var(--text-dim);
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.5px;
  gap: 6px;
}

.empty-state { 
  border: 1px dashed var(--border-hi); 
  border-radius: 3px; 
}

.ld span {
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 2px;
  animation: ld 1.2s ease-in-out infinite;
}

.ld span:nth-child(2) { animation-delay: 0.2s; }
.ld span:nth-child(3) { animation-delay: 0.4s; }

@keyframes ld {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* ── REFRESH BAR ── */
.refresh-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  width: 0;
}

.refresh-bar.animating { 
  animation: shrink 30s linear forwards; 
}

@keyframes shrink {
  from { width: 100%; opacity: 0.8; }
  to { width: 0%; opacity: 0.2; }
}

/* ── TABLET & DESKTOP (≥768px) ── */
@media (min-width: 768px) {
  .container {
    flex-direction: row;
    gap: 0;
  }

  .panel {
    border-bottom: none;
    border-right: 2px solid var(--border-hi);
    padding: 10px 12px;
  }

  .panel:last-child {
    border-right: none;
  }

  .panel:first-child { 
    flex: 1;
    border-right: 2px solid var(--border-hi);
  }

  .panel.split-panel {
    flex: 1;
  }

  .panel-bottom {
    flex-direction: row;
    gap: 10px;
  }

  .panel-top {
    flex: 0.6;
    margin-bottom: 10px;
    padding-bottom: 10px;
  }

  .panel-bottom {
    flex: 0.4;
  }

  th {
    padding: 10px 8px;
    font-size: 12px;
  }

  td {
    padding: 8px;
    font-size: 13px;
    height: 40px;
  }

  tbody tr {
    height: 40px;
  }

  .header-title {
    font-size: 18px;
  }

  .header-clock {
    font-size: 18px;
  }

  .panel-title {
    font-size: 14px;
  }

  .pct-num {
    font-size: 12px;
  }

  .bar-bg {
    width: 60px;
    height: 5px;
  }

  .count-val {
    font-size: 14px;
  }

  .badge {
    font-size: 10px;
    padding: 3px 8px;
  }

  .badge-dot {
    width: 5px;
    height: 5px;
  }
}

/* ── DESKTOP (≥1024px) ── */
@media (min-width: 1024px) {
  .panel {
    padding: 14px 16px;
  }

  .header {
    padding: 10px 16px;
  }

  th {
    padding: 12px 10px;
    font-size: 13px;
  }

  td {
    padding: 10px;
    font-size: 14px;
    height: 44px;
  }

  tbody tr {
    height: 44px;
  }

  .panel-header {
    margin-bottom: 12px;
    padding-bottom: 12px;
  }

  .panel-title {
    font-size: 15px;
  }

  .pct-num {
    font-size: 13px;
  }

  .bar-bg {
    width: 70px;
    height: 6px;
  }

  .count-val {
    font-size: 15px;
  }
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-logo">
      <div class="logo-box">T</div>
      <span>TID CORP</span>
    </div>
    <div class="header-sub">SYSTEM v2.0</div>
  </div>
  <div class="header-center">
    <div class="header-title">DASHBOARD</div>
    <div class="header-tagline">REAL-TIME</div>
  </div>
  <div class="header-right">
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-date" id="date">--/--/----</div>
  </div>
</div>

<div class="container">
  <!-- TIẾN ĐỘ -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title"><div class="title-dot"></div>TIẾN ĐỘ DỰ ÁN</div>
      <div class="panel-badge" id="progress-count">— MỤC</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:18%">DỰ ÁN</th>
          <th style="width:15%">HẠNG MỤC</th>
          <th style="width:10%">%</th>
          <th style="width:12%">DEADLINE</th>
          <th style="width:12%">KH</th>
          <th style="width:12%">NS</th>
          <th style="width:12%">TRẠNG THÁI</th>
        </tr></thead>
        <tbody id="progress">
          <tr><td colspan="7"><div class="loading-state">TẢI <span class="ld"><span></span><span></span><span></span></span></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="panel-footer">
      <div class="page-info" id="progressPage">1/1</div>
      <div class="page-dots" id="progressDots"></div>
    </div>
    <div class="refresh-bar" id="refreshBar1"></div>
  </div>

  <!-- BẢO LÃNH + NHÂN SỰ + KHÁCH HÀNG -->
  <div class="panel split-panel">
    <!-- TOP: THEO DÕI BẢO LÃNH -->
    <div class="panel-top">
      <div class="panel-header">
        <div class="panel-title"><div class="title-dot"></div>BẢO LÃNH</div>
        <div class="panel-badge" id="guarantee-count">— BL</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:35%">DỰ ÁN</th>
            <th style="width:22%">LOẠI</th>
            <th style="width:22%">GIÁ TRỊ</th>
            <th style="width:21%">HẾT HẠN</th>
          </tr></thead>
          <tbody id="guarantee">
            <tr><td colspan="4"><div class="loading-state">TẢI <span class="ld"><span></span><span></span><span></span></span></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- BOTTOM: NHÂN SỰ + KHÁCH HÀNG -->
    <div class="panel-bottom">
      <!-- DANH SÁCH NHÂN SỰ -->
      <div class="sub-panel">
        <div class="panel-header">
          <div class="panel-title small"><div class="title-dot"></div>NHÂN SỰ</div>
          <div class="panel-badge" id="staff-count">— NS</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="width:65%">TÊN</th>
              <th style="width:35%">SỐ</th>
            </tr></thead>
            <tbody id="staff-list">
              <tr><td colspan="2"><div class="empty-state">KHÔNG CÓ</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- DANH SÁCH KHÁCH HÀNG -->
      <div class="sub-panel">
        <div class="panel-header">
          <div class="panel-title small"><div class="title-dot"></div>KHÁCH HÀNG</div>
          <div class="panel-badge" id="customer-count">— KH</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="width:65%">TÊN</th>
              <th style="width:35%">SỐ</th>
            </tr></thead>
            <tbody id="customer-list">
              <tr><td colspan="2"><div class="empty-state">KHÔNG CÓ</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="refresh-bar" id="refreshBar2"></div>
  </div>
</div>

<script>
const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";
const GUARANTEE_URL = "";
const PAGE_TIME = 10000;
const REFRESH_TIME = 30000;

let progressData = [];
let guaranteeData = [];
let progressPage = 0;

function tickClock() {
  const n = new Date(), p = v => String(v).padStart(2,"0");
  document.getElementById("clock").innerText = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById("date").innerText = n.toLocaleDateString("vi-VN",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"}).toUpperCase();
}
setInterval(tickClock,1000); tickClock();

function parseGViz(t) { return JSON.parse(t.substring(t.indexOf("{"),t.lastIndexOf("}")+1)); }
function fmtDate(v) { if(!v)return"—"; const d=new Date(v); return isNaN(d)?v:`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`; }
function fmtMoney(v) { if(!v)return"—"; return typeof v==="number"?`${Math.round(v/1000000)}M`:v; }

function parseGoogleSheetDate(dateValue) {
  if (!dateValue) return null;
  
  if (typeof dateValue === 'string' && dateValue.includes('Date(')) {
    const match = dateValue.match(/Date\((\d+),(\d+),(\d+)/);
    if (match) {
      const year = parseInt(match[1]);
      const month = parseInt(match[2]);
      const day = parseInt(match[3]);
      return new Date(year, month, day, 0, 0, 0);
    }
  }
  
  if (typeof dateValue === 'string') {
    const ddmmMatch = dateValue.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (ddmmMatch) {
      const day = parseInt(ddmmMatch[1]);
      const month = parseInt(ddmmMatch[2]) - 1;
      const year = parseInt(ddmmMatch[3]);
      return new Date(year, month, day, 0, 0, 0);
    }
  }
  
  if (dateValue instanceof Date && !isNaN(dateValue)) {
    return dateValue;
  }
  
  return null;
}

function isOverdue(dateValue) {
  const deadline = parseGoogleSheetDate(dateValue);
  if (!deadline || isNaN(deadline)) return false;
  
  deadline.setHours(0, 0, 0, 0);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  return deadline < today;
}

function rowsPerPage() {
  const w = document.querySelector(".table-wrap");
  if (!w) return 5;
  const height = w.clientHeight;
  return Math.max(3, Math.floor((height - 30) / 34));
}

async function fetchSheet(url) {
  if(!url) return [];
  const r = await fetch(url), t = await r.text();
  return (parseGViz(t).table.rows||[]).slice(4);
}

function badge(cls,label){
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${label}</span>`;
}

function renderProgress(){
  const el = document.getElementById("progress");
  const rows = rowsPerPage();
  const total = Math.ceil(progressData.length / rows) || 1;
  const page = progressData.slice(progressPage * rows, progressPage * rows + rows);

  document.getElementById("progress-count").innerText = `${progressData.length} MỤC`;

  if (!progressData.length) {
    el.innerHTML = `<tr><td colspan="7"><div class="empty-state">KHÔNG CÓ</div></td></tr>`;
    return;
  }

  el.innerHTML = page.map(r => {
    const d = r.c;
    const project = d[1]?.v || "";
    const item = d[2]?.v || "";
    const customer = d[4]?.v || "—";
    const person = d[3]?.v || "—";
    
    const deadlineCell = d[7];
    const deadlineValue = deadlineCell?.v;
    const deadlineDisplay = deadlineCell?.f || deadlineCell?.v || "—";

    let pct = Number(d[9]?.v || 0);
    if (pct > 0 && pct <= 1) pct *= 100;
    pct = Math.round(pct);

    const overdue = isOverdue(deadlineValue);

    let bdg = "";
    if (item) {
      if (pct === 100) {
        bdg = badge("b-done", "HT");
      } else if (overdue) {
        bdg = badge("b-late", "QH");
      } else {
        bdg = badge("b-wip", "ĐT");
      }
    }

    return `<tr>
      <td><div class="project-name" title="${project}">${project}</div></td>
      <td><span class="item-val" title="${item}">${item}</span></td>
      <td>${item ? `<div class="pct-wrap"><span class="pct-num">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%"></div></div></div>` : "—"}
      </td>
      <td><span class="date-val${overdue ? " overdue":""}" title="${deadlineDisplay}">${deadlineDisplay}</span></td>
      <td><span class="customer-val" title="${customer}">${customer}</span></td>
      <td><span class="person-val" title="${person}">${person}</span></td>
      <td>${bdg}</td>
    </tr>`;
  }).join("");

  document.getElementById("progressPage").innerText = `${progressPage+1}/${total}`;
  
  renderStaffList();
  renderCustomerList();
}

function renderStaffList(){
  const el = document.getElementById("staff-list");
  
  const staffCount = {};
  progressData.forEach(r => {
    const person = r.c[3]?.v;
    if (person && person !== "—" && person.trim()) {
      staffCount[person] = (staffCount[person] || 0) + 1;
    }
  });

  const staffArray = Object.entries(staffCount)
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => b.count - a.count);

  document.getElementById("staff-count").innerText = `${staffArray.length} NS`;

  if (!staffArray.length) {
    el.innerHTML = `<tr><td colspan="2"><div class="empty-state">KHÔNG CÓ</div></td></tr>`;
    return;
  }

  el.innerHTML = staffArray.map(staff => `
    <tr>
      <td><span class="person-val" title="${staff.name}">${staff.name}</span></td>
      <td><span class="count-val">${staff.count}</span></td>
    </tr>
  `).join("");
}

function renderCustomerList(){
  const el = document.getElementById("customer-list");
  
  const customerCount = {};
  progressData.forEach(r => {
    const customer = r.c[4]?.v;
    if (customer && customer !== "—" && customer.trim()) {
      customerCount[customer] = (customerCount[customer] || 0) + 1;
    }
  });

  const customerArray = Object.entries(customerCount)
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => b.count - a.count);

  document.getElementById("customer-count").innerText = `${customerArray.length} KH`;

  if (!customerArray.length) {
    el.innerHTML = `<tr><td colspan="2"><div class="empty-state">KHÔNG CÓ</div></td></tr>`;
    return;
  }

  el.innerHTML = customerArray.map(customer => `
    <tr>
      <td><span class="customer-val" title="${customer.name}">${customer.name}</span></td>
      <td><span class="count-val">${customer.count}</span></td>
    </tr>
  `).join("");
}

function renderGuarantee(){
  const el=document.getElementById("guarantee");
  
  if(!guaranteeData.length){
    el.innerHTML=`<tr><td colspan="4"><div class="empty-state">KHÔNG CÓ</div></td></tr>`;
  } else {
    el.innerHTML=guaranteeData.map(r=>{
      const d=r.c;
      const project=d[0]?.v||"", type=d[1]?.v||"—", value=d[2]?.v, expiryRaw=d[3]?.v;
      return `<tr>
        <td><div class="project-name" title="${project}">${project}</div></td>
        <td><span class="type-val" title="${type}">${type}</span></td>
        <td><span class="value-val" title="${fmtMoney(value)}">${fmtMoney(value)}</span></td>
        <td><span class="date-val" title="${fmtDate(expiryRaw)}">${fmtDate(expiryRaw)}</span></td>
      </tr>`;
    }).join("");
  }
  
  document.getElementById("guarantee-count").innerText=`${guaranteeData.length} BL`;
}

async function loadData(){
  progressData = await fetchSheet(PROGRESS_URL).catch(()=>[]);
  guaranteeData = await fetchSheet(GUARANTEE_URL).catch(()=>[]);
  renderProgress();
  renderGuarantee();
  ["refreshBar1", "refreshBar2"].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("animating"); void el.offsetWidth; el.classList.add("animating");
  });
}

setInterval(()=>{
  const rows=rowsPerPage();
  progressPage =(progressPage +1)%(Math.ceil(progressData.length /rows)||1);
  renderProgress();
}, PAGE_TIME);

setInterval(loadData, REFRESH_TIME);
loadData();
</script>
</body>
</html>
