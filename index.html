<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME LINE PROJECT TID</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --header-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-accent: #f1c40f;
            --cyan: #00d4ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* Thanh điều khiển */
        .controls {
            height: 60px;
            padding: 0 20px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #333;
        }

        .main-title { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; }

        /* Bố cục chính */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 5px;
            padding: 10px;
        }

        @media (min-width: 1024px) {
            .dashboard-grid { 
                grid-template-columns: 1.2fr 0.8fr; 
                height: calc(100vh - 80px); 
            }
        }

        .board-column {
            background: #111;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .board-title-area {
            background: var(--header-bg);
            padding: 15px;
            color: var(--text-accent);
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        /* Dòng dữ liệu */
        .row-common {
            display: grid;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #222;
            font-size: 0.85rem;
        }

        .tiendo-row { 
            grid-template-columns: 40px 1.5fr 1fr 60px 100px 90px; 
            gap: 10px;
        }

        @media (max-width: 767px) {
            .tiendo-row {
                grid-template-columns: 1fr 80px;
                grid-template-areas: "name percent" "cust status" "deadline staff";
            }
            .data-header { display: none; }
            .col-name { grid-area: name; color: var(--text-accent); font-weight: bold; }
            .col-percent { grid-area: percent; text-align: right; color: var(--cyan); }
        }

        .data-header { background: #1a1a1a; color: var(--cyan); font-weight: bold; }
        #clock-time { color: var(--cyan); font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="main-title">PROJECT TID</div>
        <div id="clock-container"><span id="clock-time">--:--:--</span></div>
        <input type="file" id="uploadExcel">
    </div>

    <div class="dashboard-grid">
        <div class="board-column">
            <div class="board-title-area">TIẾN ĐỘ DỰ ÁN <span id="totalTiendo"></span></div>
            <div class="row-common data-header tiendo-row">
                <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>%</div><div>DEADLINE</div><div>TRẠNG THÁI</div>
            </div>
            <div id="tiendoList"></div>
        </div>

        <div class="board-column">
            <div class="board-title-area">BẢO LÃNH <span id="totalBaolanh"></span></div>
            <div id="baolanhList"></div>
        </div>
    </div>

    <script>
        document.getElementById('uploadExcel').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const wb = XLSX.read(data, {type: 'array', cellDates: true});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                processData(rawData);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function processData(rawData) {
            const tiendoBody = document.getElementById('tiendoList');
            tiendoBody.innerHTML = '';
            let count = 0;

            // Bắt đầu từ dòng có dữ liệu (thường là dòng 3 trong Excel của bạn)
            for (let i = 2; i < rawData.length; i++) {
                let r = rawData[i];
                if (!r[1]) continue; // Bỏ qua nếu tên dự án trống

                // Xử lý cột % (Cột E - Index 4)
                let pRaw = r[4];
                let pVal = 0;
                if (typeof pRaw === 'number') {
                    pVal = pRaw <= 1 ? pRaw * 100 : pRaw;
                } else {
                    pVal = parseFloat(String(pRaw).replace('%', '')) || 0;
                }

                // LỌC: Chỉ hiện nếu phần trăm < 100
                if (pVal < 100) {
                    count++;
                    const deadline = r[5] instanceof Date ? r[5].toLocaleDateString('vi-VN') : r[5];
                    
                    tiendoBody.innerHTML += `
                        <div class="row-common tiendo-row">
                            <div style="color:#555">${r[0]}</div>
                            <div class="col-name">${r[1]}</div>
                            <div class="col-cust">${r[2]}</div>
                            <div class="col-percent" style="color:${pVal > 80 ? '#2ecc71' : 'var(--cyan)'}">${Math.round(pVal)}%</div>
                            <div class="col-deadline">${deadline}</div>
                            <div style="font-size:0.7rem">${r[7] || ''}</div>
                        </div>
                    `;
                }
            }
            document.getElementById('totalTiendo').innerText = `(${count})`;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('vi-VN');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
