<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--f-sans); overflow: hidden; -webkit-user-select: none; user-select: none; }

        .header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            height: 60px; padding: 0 20px; background: var(--bg-header); border-bottom: 2px solid var(--border-hi);
            position: relative; z-index: 10;
        }
        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--text-bright); }
        .logo-box { width: 30px; height: 30px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .header-title { font-size: 20px; font-weight: 700; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }
        .header-right { text-align: right; font-family: var(--f-mono); }
        .header-clock { font-size: 20px; color: var(--text-bright); font-weight: 600; }
        .header-date { font-size: 12px; color: var(--accent); }

        .container { 
            display: flex; 
            height: calc(100vh - 60px); 
            padding: 12px; 
            gap: 12px; 
            flex-direction: row;
        }
        
        .col-left { 
            flex: 0 0 65%; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-hi); 
            background: rgba(13,20,40,0.5); 
            border-radius: 4px; 
            padding: 15px; 
            position: relative;
            min-width: 0;
        }
        .col-right { 
            flex: 0 0 calc(35% - 12px); 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            min-width: 0;
        }

        .panel-top-right { 
            flex: 0 0 68%; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-hi); 
            background: rgba(13,20,40,0.5); 
            border-radius: 4px; 
            padding: 12px; 
            overflow: hidden;
            min-width: 0;
        }
        .panel-bottom-right { 
            flex: 1; 
            display: flex; 
            gap: 12px; 
            min-height: 0;
            min-width: 0;
        }
        .sub-panel { 
            flex: 1; 
            border: 1px solid var(--border-hi); 
            background: rgba(13,20,40,0.5); 
            border-radius: 4px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .panel-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            border-bottom: 1px solid var(--border-hi); 
            padding-bottom: 8px;
            flex-shrink: 0;
            gap: 8px;
        }
        .panel-title { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-bright); 
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .title-dot { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); flex-shrink: 0; }
        .badge-count { font-family: var(--f-mono); font-size: 12px; padding: 2px 10px; background: var(--gold); color: #000; border-radius: 2px; font-weight: 700; white-space: nowrap; }

        .table-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; display: flex; flex-direction: column; }
        thead { flex-shrink: 0; }
        tbody { flex: 1; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        th { background: var(--bg-thead); color: var(--accent); font-size: 11px; padding: 10px 4px; text-transform: uppercase; border-bottom: 1px solid var(--border-hi); display: table; width: 100%; table-layout: fixed; }
        
        tr { display: table; width: 100%; table-layout: fixed; }
        #p-table tr, #g-table tr { border-bottom: 1px solid var(--border); }
        #p-table td { padding: 14px 6px; font-size: 13px; font-weight: 500; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: table-cell; }
        #g-table td { padding: 8px 4px; font-size: 11px; text-align: center; display: table-cell; }
        #s-table tr, #c-table tr { border-bottom: 1px solid var(--border); }
        #s-table td, #c-table td { padding: 10px 8px; font-size: 11px; display: table-cell; }

        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        
        .text-left { text-align: left !important; }
        .gold-bold { color: var(--gold); font-weight: 700; }
        .accent-text { color: var(--accent); }
        
        .bar-container { display: flex; align-items: center; gap: 5px; justify-content: center; }
        .bar-bg { width: 45px; height: 8px; background: #1a2a4a; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .bar-fill { height: 100%; background: var(--accent); }

        .st { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 700; white-space: nowrap; }
        .st-done { background: var(--green); color: #000; }
        .st-wip { border: 1px solid var(--accent); color: var(--accent); }
        .st-late { background: var(--red); color: #fff; }

        .footer-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--accent); font-family: var(--f-mono); padding-top: 10px; flex-shrink: 0; gap: 10px; }
        .refresh-line { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0; }
        .refresh-line.animating { animation: run 30s linear forwards; }
        @keyframes run { from { width: 100%; } to { width: 0%; } }

        /* ── TABLET (768px - 1024px) ── */
        @media (max-width: 1024px) and (min-width: 768px) {
            .container { padding: 10px; gap: 10px; }
            .col-left { flex: 0 0 60%; padding: 12px; }
            .col-right { flex: 0 0 calc(40% - 10px); }
            .panel-header { margin-bottom: 10px; padding-bottom: 6px; }
            .panel-title { font-size: 12px; }
            .badge-count { font-size: 11px; padding: 2px 8px; }
            #p-table td { padding: 10px 4px; font-size: 11px; }
            #g-table td { padding: 6px 3px; font-size: 10px; }
            #s-table td, #c-table td { padding: 8px 6px; font-size: 10px; }
        }

        /* ── MOBILE (< 768px) ── */
        @media (max-width: 767px) {
            .header { 
                height: 50px; 
                padding: 0 12px; 
            }
            .header-logo { 
                font-size: 13px; 
                gap: 6px; 
            }
            .logo-box { 
                width: 24px; 
                height: 24px; 
                font-size: 12px; 
            }
            .header-title { 
                font-size: 14px; 
                letter-spacing: 2px; 
            }
            .header-clock { 
                font-size: 14px; 
            }
            .header-date { 
                font-size: 10px; 
            }

            .container { 
                flex-direction: column; 
                height: calc(100vh - 50px); 
                padding: 8px; 
                gap: 8px; 
            }

            .col-left { 
                flex: 0 0 55%; 
                padding: 10px;
                border-radius: 3px;
            }
            .col-right { 
                flex: 0 0 calc(45% - 8px); 
                gap: 8px;
            }

            .panel-top-right { 
                flex: 0 0 48%; 
                padding: 8px;
                border-radius: 3px;
            }
            .panel-bottom-right { 
                flex: 0 0 52%; 
                gap: 8px;
            }
            .sub-panel { 
                flex: 1; 
                padding: 8px;
                border-radius: 3px;
            }

            .panel-header { 
                margin-bottom: 8px; 
                padding-bottom: 6px;
                gap: 6px;
            }
            .panel-title { 
                font-size: 11px;
            }
            .panel-title.small { 
                font-size: 10px;
            }
            .badge-count { 
                font-size: 10px; 
                padding: 2px 6px;
            }

            th { 
                font-size: 9px; 
                padding: 8px 2px;
            }
            
            #p-table td { 
                padding: 10px 3px; 
                font-size: 10px;
            }
            #g-table td { 
                padding: 6px 2px; 
                font-size: 9px;
            }
            #s-table td, #c-table td { 
                padding: 8px 4px; 
                font-size: 10px;
            }

            .bar-bg { 
                width: 35px; 
                height: 6px;
            }

            .footer-info { 
                font-size: 9px; 
                padding-top: 8px;
            }
        }

        /* ── MOBILE NHỎ (< 480px) ── */
        @media (max-width: 479px) {
            .header { 
                height: 45px; 
                padding: 0 10px;
            }
            .header-logo { 
                font-size: 12px;
            }
            .logo-box { 
                width: 22px; 
                height: 22px;
            }
            .header-title { 
                font-size: 12px; 
                letter-spacing: 1px;
            }

            .container { 
                padding: 6px; 
                gap: 6px;
            }

            .col-left { 
                padding: 8px;
            }
            .col-right { 
                gap: 6px;
            }
            .panel-top-right, .sub-panel { 
                padding: 6px;
            }
            .panel-bottom-right { 
                gap: 6px;
            }

            .panel-header { 
                margin-bottom: 6px; 
                padding-bottom: 4px;
            }
            .panel-title { 
                font-size: 10px;
            }
            .badge-count { 
                font-size: 9px; 
                padding: 1px 5px;
            }

            th { 
                font-size: 8px; 
                padding: 6px 1px;
            }
            
            #p-table td { 
                padding: 8px 2px; 
                font-size: 9px;
            }
            #g-table td { 
                padding: 5px 1px; 
                font-size: 8px;
            }
            #s-table td, #c-table td { 
                padding: 6px 3px; 
                font-size: 9px;
            }

            .bar-bg { 
                width: 30px; 
                height: 5px;
            }

            .footer-info { 
                font-size: 8px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div> TID CO.LTD</div>
    <div class="header-title">PROJECT DASHBOARD</div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div class="header-date" id="date">--/--/----</div>
    </div>
</div>

<div class="container">
    <div class="col-left">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="badge-count" id="p-count">0 MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 18%;">DỰ ÁN</th>
                        <th style="width: 16%;">KH</th>
                        <th style="width: 15%;">NS</th>
                        <th style="width: 18%;">HẠNG MỤC</th>
                        <th style="width: 14%;">%</th>
                        <th style="width: 10%;">DEADLINE</th>
                        <th style="width: 9%;">THÁI</th>
                    </tr>
                </thead>
                <tbody id="p-table"></tbody>
            </table>
        </div>
        <div class="footer-info">
            <div id="p-page">PAGE 1/1</div>
            <div id="p-sync">Cập nhật...</div>
        </div>
        <div class="refresh-line" id="line1"></div>
    </div>

    <div class="col-right">
        <div class="panel-top-right">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> BẢO LÃNH</div>
                <div id="g-total-badge" class="badge-count" style="background:var(--accent); font-size: 11px;">0</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 32%;">DỰ ÁN</th>
                            <th style="width: 20%;">KH</th>
                            <th style="width: 12%;">LOẠI</th>
                            <th style="width: 18%;">GIÁ TRỊ</th>
                            <th style="width: 18%;">HẾT HẠN</th>
                        </tr>
                    </thead>
                    <tbody id="g-table"></tbody>
                </table>
            </div>
        </div>

        <div class="panel-bottom-right">
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 11px;">NHÂN SỰ (<span id="s-total">0</span>)</div></div>
                <div class="table-wrap"><table><tbody id="s-table"></tbody></table></div>
            </div>
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 11px;">KHÁCH HÀNG (<span id="c-total">0</span>)</div></div>
                <div class="table-wrap"><table><tbody id="c-table"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y";
    const URL_PROGRESS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1280059749`;
    const URL_GUARANTEE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Bao%20lanh`;

    let dataP = [], dataG = [], currentPage = 0;
    const ROWS_PER_PAGE = 16; 

    async function fetchData() {
        try {
            const [resP, resG] = await Promise.all([fetch(URL_PROGRESS), fetch(URL_GUARANTEE)]);
            const txtP = await resP.text();
            const txtG = await resG.text();
            
            dataP = JSON.parse(txtP.substring(txtP.indexOf("{"), txtP.lastIndexOf("}") + 1)).table.rows.slice(4);
            dataG = JSON.parse(txtG.substring(txtG.indexOf("{"), txtG.lastIndexOf("}") + 1)).table.rows.filter(r => r.c && r.c[9]?.v);

            renderAll();
            startProgressLine();
            document.getElementById("p-sync").innerText = "Cập nhật: " + new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function renderAll() {
        renderProgress();
        renderGuarantees();
        renderStats();
    }

    function renderProgress() {
        const el = document.getElementById("p-table");
        const totalPages = Math.ceil(dataP.length / ROWS_PER_PAGE);
        const start = currentPage * ROWS_PER_PAGE;
        const items = dataP.slice(start, start + ROWS_PER_PAGE);

        document.getElementById("p-count").innerText = `${dataP.length} MỤC`;
        document.getElementById("p-page").innerText = `PAGE ${currentPage + 1}/${totalPages || 1}`;

        el.innerHTML = items.map(row => {
            const d = row.c;
            const pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
            const isLate = d[7]?.v && parseDate(d[7].v) < new Date() && pct < 100;
            return `<tr>
                <td class="text-left gold-bold">${d[1]?.v || "—"}</td>
                <td class="text-left accent-text">${d[4]?.v || "—"}</td>
                <td style="color:var(--text-bright); font-size:10px;">${d[3]?.v || "—"}</td>
                <td class="text-left" style="color:var(--text); font-size:10px;">${d[2]?.v || "—"}</td>
                <td><div class="bar-container"><span style="width:28px; font-family:var(--f-mono); font-size:10px;">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div></td>
                <td style="font-family:var(--f-mono); color:var(--accent); font-size:9px;">${d[7]?.f || "—"}</td>
                <td><span class="st ${pct>=100?'st-done':(isLate?'st-late':'st-wip')}">${pct>=100?'OK':(isLate?'TRỄ':'CHẠY')}</span></td>
            </tr>`;
        }).join("");
    }

    function renderGuarantees() {
        const el = document.getElementById("g-table");
        let totalVal = 0;

        el.innerHTML = dataG.slice(0, 16).map(row => {
            const d = row.c;
            let valRaw = d[12]?.v;
            let valNum = 0;
            if (typeof valRaw === 'number') valNum = valRaw;
            else if (typeof valRaw === 'string') valNum = parseFloat(valRaw.replace(/[^0-9.-]+/g, "")) || 0;
            totalVal += valNum;

            return `<tr>
                <td class="text-left" style="color:#fff; font-weight:600;">${d[9]?.v || "—"}</td>
                <td class="text-left accent-text">${d[10]?.v || "—"}</td>
                <td><span class="st st-wip" style="font-size:8px;">${d[13]?.v || "—"}</span></td>
                <td class="gold-bold">${d[12]?.f || d[12]?.v || "0"}</td>
                <td style="color:var(--red); font-family:var(--f-mono);">${d[7]?.f || "—"}</td>
            </tr>`;
        }).join("");

        document.getElementById("g-total-badge").innerText = totalVal.toLocaleString('vi-VN');
    }

    function renderStats() {
        const staff = {}, cust = {};
        
        dataP.forEach(r => {
            const c = r.c;
            const s = c[3]?.v;
            if(s && s.trim() && s !== "—") {
                staff[s] = (staff[s] || 0) + 1;
            }
            const customerVal = c[4]?.v;
            if(customerVal && customerVal.trim() && customerVal !== "—") {
                cust[customerVal] = (cust[customerVal] || 0) + 1;
            }
        });

        const fillStaff = (map, id) => {
            const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]);
            document.getElementById("s-total").innerText = Object.keys(map).length;
            document.getElementById(id).innerHTML = sorted.slice(0, 4).map(([n, v]) => 
                `<tr><td class="text-left">${n}</td><td class="accent-text" style="font-weight:700; text-align:right;">${v}</td></tr>`
            ).join("") || `<tr><td colspan="2" style="text-align:center; color:var(--text-dim); padding:10px;">-</td></tr>`;
        };

        const fillCustomer = (map, id) => {
            const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]);
            document.getElementById("c-total").innerText = Object.keys(map).length;
            document.getElementById(id).innerHTML = sorted.slice(0, 4).map(([n, v]) => 
                `<tr><td class="text-left">${n}</td><td class="accent-text" style="font-weight:700; text-align:right;">${v}</td></tr>`
            ).join("") || `<tr><td colspan="2" style="text-align:center; color:var(--text-dim); padding:10px;">-</td></tr>`;
        };

        fillStaff(staff, "s-table");
        fillCustomer(cust, "c-table");
    }

    function parseDate(v) {
        if(!v) return null;
        const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(m[1], m[2], m[3]) : null;
    }

    function startProgressLine() {
        const l = document.getElementById("line1");
        l.classList.remove("animating");
        void l.offsetWidth;
        l.classList.add("animating");
    }

    setInterval(() => {
        const total = Math.ceil(dataP.length / ROWS_PER_PAGE);
        if(total > 1) { currentPage = (currentPage + 1) % total; renderProgress(); }
    }, 10000);

    setInterval(fetchData, 30000);
    setInterval(() => {
        const n = new Date();
        document.getElementById("clock").innerText = n.toLocaleTimeString("vi-VN", {hour12:false});
        document.getElementById("date").innerText = n.toLocaleDateString("vi-VN");
    }, 1000);
    window.onload = fetchData;
</script>
</body>
</html>
