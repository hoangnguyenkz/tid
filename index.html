<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME LINE PROJECT TID</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --header-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-accent: #f1c40f;
            --row-even: #111111;
            --row-odd: #000000;
            --status-green: #2ecc71;
            --status-red: #e74c3c;
            --blue-neon: #00d4ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-transform: uppercase;
        }

        .top-bar {
            height: 50px;
            padding: 0 20px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #444;
        }

        .main-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        #clock { font-family: monospace; font-size: 1.4rem; color: var(--blue-neon); font-weight: bold; }
        #sync-status { font-size: 0.7rem; color: var(--blue-neon); }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            flex-grow: 1;
            gap: 2px;
            background-color: #333;
        }

        .column { display: flex; flex-direction: column; background: var(--bg-color); overflow: hidden; }
        .right-split { display: grid; grid-template-rows: 1fr 1fr; gap: 2px; background-color: #333; }

        .board-header {
            background-color: var(--header-bg);
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #444;
            position: relative;
        }

        .board-title { color: var(--text-accent); font-size: 0.9rem; font-weight: bold; }
        .page-info { position: absolute; right: 10px; color: #666; font-size: 0.7rem; }

        .table-header {
            display: grid; background-color: #222; color: var(--blue-neon);
            font-weight: bold; font-size: 0.7rem; height: 30px; align-items: center; padding: 0 10px;
        }

        .data-list { flex-grow: 1; display: flex; flex-direction: column; }
        .data-row {
            display: grid; align-items: center; padding: 0 10px;
            font-size: 0.8rem; height: calc(100% / 12);
            border-bottom: 1px solid #222;
        }
        
        .right-split .data-row { height: calc(100% / 6); }

        .tiendo-cols { grid-template-columns: 40px 1.2fr 1fr 1fr 50px 90px 90px 100px; }
        .baolanh-cols { grid-template-columns: 40px 1.2fr 1fr 1fr 100px 100px; }

        .col-project { color: var(--text-accent); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge {
            padding: 2px 4px; border-radius: 3px; font-size: 0.65rem; text-align: center; font-weight: bold;
            border: 1px solid currentColor;
        }

        .summary-box { padding: 15px; line-height: 1.8; color: #ccc; }
        .summary-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="sync-status">ĐANG TẢI...</div>
        <div class="main-title">TIME LINE PROJECT TID</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="dashboard-container">
        <div class="column">
            <div class="board-header">
                <div class="board-title">THEO DÕI TIẾN ĐỘ</div>
                <div class="page-info" id="p-tiendo">1/1</div>
            </div>
            <div class="table-header tiendo-cols">
                <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>HẠNG MỤC</div><div>%</div><div>DEADLINE</div><div>NHÂN SỰ</div><div>TRẠNG THÁI</div>
            </div>
            <div id="list-tiendo" class="data-list"></div>
        </div>

        <div class="column right-split">
            <div class="column">
                <div class="board-header">
                    <div class="board-title">THEO DÕI BẢO LÃNH</div>
                    <div class="page-info" id="p-baolanh">1/1</div>
                </div>
                <div class="table-header baolanh-cols">
                    <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>HẠNG MỤC</div><div>GIÁ TRỊ</div><div>TRẠNG THÁI</div>
                </div>
                <div id="list-baolanh" class="data-list"></div>
            </div>
            <div class="column">
                <div class="board-header"><div class="board-title">NHÂN SỰ PHỤ TRÁCH</div></div>
                <div id="summary-staff" class="summary-box"></div>
            </div>
        </div>
    </div>

    <script>
        // Link Google Sheets của bạn
        const GS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRihkN3STIzLwe2-eSHQMVRLX2cOLKorzGFR5_fm5Si1D94wmrfpt9NrD-YxsVC1iOOWgxTS8Ni0SmC/pub?output=ods";

        let db = { tiendo: [], baolanh: [] };
        let page = { tiendo: 0, baolanh: 0 };

        async function loadData() {
            try {
                const res = await fetch(GS_URL);
                const ab = await res.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(ab), {type: 'array', cellDates: true});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});
                
                parse(data);
                document.getElementById('sync-status').innerText = "CẬP NHẬT: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('sync-status').innerText = "LỖI KẾT NỐI - ĐANG THỬ LẠI...";
                setTimeout(loadData, 5000);
            }
        }

        function parse(rows) {
            db.tiendo = []; db.baolanh = [];
            let staff = {};

            rows.slice(2).forEach(r => {
                if(r[1]) {
                    db.tiendo.push({stt:r[0], name:r[1], cust:r[2], item:r[3], p:r[4], dl:r[5], staff:r[6], st:r[7]});
                    if(r[6]) r[6].split(',').forEach(s => { let n = s.trim(); if(n) staff[n] = (staff[n]||0)+1; });
                }
                if(r[9]) db.baolanh.push({stt:r[8], name:r[9], cust:r[10], item:r[11], val:r[13], st:r[14]});
            });

            let sHtml = "";
            Object.entries(staff).sort((a,b)=>b[1]-a[1]).forEach(([n, c]) => {
                sHtml += `<div class="summary-item"><span>${n}</span><span style="color:var(--blue-neon)">${c} Dự án</span></div>`;
            });
            document.getElementById('summary-staff').innerHTML = sHtml;
            render();
        }

        function render() {
            const draw = (id, data, p, size, cols, template) => {
                const slice = data.slice(p * size, (p + 1) * size);
                document.getElementById(id).innerHTML = slice.map(template).join('');
            };

            draw('list-tiendo', db.tiendo, page.tiendo, 12, '', r => `
                <div class="data-row tiendo-cols">
                    <div style="color:#666">${r.stt}</div>
                    <div class="col-project">${r.name}</div>
                    <div>${r.cust}</div>
                    <div style="font-size:0.7rem">${r.item}</div>
                    <div style="color:var(--text-accent); text-align:center">${Math.round(r.p*100)||0}%</div>
                    <div style="color:var(--blue-neon)">${r.dl instanceof Date ? r.dl.toLocaleDateString('vi-VN') : r.dl}</div>
                    <div style="color:#2ecc71">${r.staff}</div>
                    <div><span class="status-badge" style="color:${getColor(r.st)}">${r.st}</span></div>
                </div>
            `);

            draw('list-baolanh', db.baolanh, page.baolanh, 6, '', r => `
                <div class="data-row baolanh-cols">
                    <div style="color:#666">${r.stt}</div>
                    <div class="col-project">${r.name}</div>
                    <div>${r.cust}</div>
                    <div>${r.item}</div>
                    <div style="text-align:right; color:var(--status-red)">${r.val.toLocaleString()}</div>
                    <div><span class="status-badge" style="color:${getColor(r.st)}">${r.st}</span></div>
                </div>
            `);

            document.getElementById('p-tiendo').innerText = `${page.tiendo + 1}/${Math.ceil(db.tiendo.length/12)||1}`;
            document.getElementById('p-baolanh').innerText = `${page.baolanh + 1}/${Math.ceil(db.baolanh.length/6)||1}`;
        }

        function getColor(st) {
            if(!st) return "#fff";
            const s = st.toString().toUpperCase();
            if(s.includes("XONG") || s.includes("HOÀN")) return "var(--status-green)";
            if(s.includes("CHẬM") || s.includes("GẤP")) return "var(--status-red)";
            return "var(--text-accent)";
        }

        setInterval(() => {
            page.tiendo = (page.tiendo + 1) % (Math.ceil(db.tiendo.length/12)||1);
            page.baolanh = (page.baolanh + 1) % (Math.ceil(db.baolanh.length/6)||1);
            render();
        }, 8000);

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN'); }, 1000);
        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
