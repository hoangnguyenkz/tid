<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --text-dim: #6a90b8;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--f-sans);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        /* ══ HEADER ══ */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 60px;
            padding: 0 20px;
            background: var(--bg-header);
            border-bottom: 2px solid var(--border-hi);
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
            opacity: 0.4;
        }
        .header-logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; color: var(--text-bright); }
        .logo-box {
            width: 30px; height: 30px;
            border: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-weight: 700; font-size: 14px;
            flex-shrink: 0;
        }
        .header-title { font-size: 20px; font-weight: 700; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; text-align: center; }
        .header-right { text-align: right; font-family: var(--f-mono); }
        .header-clock { font-size: 20px; color: var(--text-bright); font-weight: 600; }
        .header-date { font-size: 12px; color: var(--accent); }

        /* ══ DESKTOP LAYOUT ══ */
        .container {
            display: flex;
            height: calc(100vh - 60px);
            padding: 12px;
            gap: 12px;
        }

        .col-left {
            flex: 0 0 65%;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-hi);
            background: rgba(13,20,40,0.5);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            min-height: 0;
        }

        .col-right {
            flex: 0 0 calc(35% - 12px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        .panel-top-right {
            flex: 0 0 58%;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-hi);
            background: rgba(13,20,40,0.5);
            border-radius: 4px;
            padding: 12px;
            min-height: 0;
        }

        .panel-bottom-right {
            flex: 1;
            display: flex;
            gap: 12px;
            min-height: 0;
        }

        .sub-panel {
            flex: 1;
            border: 1px solid var(--border-hi);
            background: rgba(13,20,40,0.5);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* ══ PANEL HEADER ══ */
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-hi);
            padding-bottom: 8px;
            flex-shrink: 0;
        }
        .panel-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; }
        .title-dot { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); flex-shrink: 0; }
        .badge-count { font-family: var(--f-mono); font-size: 12px; padding: 2px 10px; background: var(--gold); color: #000; border-radius: 2px; font-weight: 700; white-space: nowrap; }

        /* ══ TABLE ══ */
        .table-wrap { flex: 1; overflow: hidden; min-height: 0; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        th {
            background: var(--bg-thead);
            color: var(--accent);
            font-size: 11px;
            padding: 8px 4px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-hi);
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        tbody tr:hover { background: rgba(96,200,240,0.08) !important; }

        #p-table td {
            padding: 12px 6px;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #g-table td {
            padding: 8px 4px;
            font-size: 11px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .text-left { text-align: left !important; }
        .gold-bold { color: var(--gold); font-weight: 700; }
        .accent-text { color: var(--accent); }

        /* Progress bar */
        .bar-container { display: flex; align-items: center; gap: 4px; justify-content: center; }
        .bar-bg { width: 45px; height: 7px; background: #1a2a4a; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #2a7aaa, var(--accent)); border-radius: 4px; }

        /* Status badges */
        .st { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 700; white-space: nowrap; }
        .st-done { background: var(--green); color: #000; }
        .st-wip { border: 1px solid var(--accent); color: var(--accent); }
        .st-late { background: var(--red); color: #fff; animation: flash 1.4s step-end infinite; }
        @keyframes flash { 0%,100%{opacity:1} 50%{opacity:.7} }
        @keyframes flash-red { 0%,100%{color:#ff6b6b;} 50%{color:transparent;} }

        /* Footer */
        .footer-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--accent);
            font-family: var(--f-mono);
            padding-top: 8px;
            flex-shrink: 0;
        }

        /* Refresh bar */
        .refresh-line { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0; border-radius: 0 2px 2px 0; }
        .refresh-line.animating { animation: run 30s linear forwards; }
        @keyframes run { from { width: 100%; } to { width: 0%; } }

        /* ══ DESKTOP (≥ 1024px) ══ */
        @media (min-width: 1024px) {
            .header { height: 70px; padding: 0 28px; }
            .header-logo { font-size: 22px; gap: 12px; }
            .logo-box { width: 40px; height: 40px; font-size: 18px; }
            .header-title { font-size: 28px; letter-spacing: 7px; }
            .header-clock { font-size: 28px; }
            .header-date { font-size: 14px; }
            .container { height: calc(100vh - 70px); padding: 16px; gap: 16px; }
            .col-left { padding: 20px; }
            .col-right { gap: 16px; }
            .panel-top-right { padding: 16px; }
            .sub-panel { padding: 14px; }
            .panel-header { margin-bottom: 14px; padding-bottom: 12px; }
            .panel-title { font-size: 18px; gap: 10px; }
            .title-dot { width: 9px; height: 9px; }
            .badge-count { font-size: 15px; padding: 4px 14px; }
            th { font-size: 14px; padding: 12px 8px; letter-spacing: 0.8px; }
            #p-table td { padding: 14px 8px; font-size: 16px; }
            #g-table td { padding: 11px 6px; font-size: 14px; }
            .bar-bg { width: 64px; height: 9px; }
            .bar-container { gap: 6px; }
            .bar-container span { width: 40px !important; font-size: 14px !important; }
            .st { font-size: 12px; padding: 4px 10px; border-radius: 4px; }
            .footer-info { font-size: 13px; padding-top: 10px; }
        }

        /* ══ MOBILE TAB SYSTEM ══ */
        .tab-bar { display: none; }

        /* ══ MOBILE (≤ 767px) ══ */
        @media (max-width: 767px) {
            .header {
                height: 52px;
                padding: 0 12px;
                grid-template-columns: auto 1fr auto;
                gap: 8px;
            }
            .header-logo { font-size: 13px; gap: 6px; }
            .logo-box { width: 26px; height: 26px; font-size: 12px; }
            .header-title { font-size: 13px; letter-spacing: 2px; }
            .header-clock { font-size: 15px; }
            .header-date { font-size: 10px; }

            /* Tab navigation bar */
            .tab-bar {
                display: flex;
                background: var(--bg-header);
                border-bottom: 1px solid var(--border-hi);
                flex-shrink: 0;
            }
            .tab-btn {
                flex: 1;
                padding: 8px 4px;
                font-size: 10px;
                font-weight: 600;
                color: var(--text-dim);
                background: none;
                border: none;
                border-bottom: 2px solid transparent;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                cursor: pointer;
                transition: all 0.2s;
                font-family: var(--f-sans);
            }
            .tab-btn.active {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }

            /* Mobile container */
            .container {
                flex-direction: column;
                height: calc(100vh - 52px - 34px); /* header + tab */
                padding: 0;
                gap: 0;
                overflow: hidden;
            }

            /* All cols hidden by default on mobile */
            .col-left,
            .col-right,
            .panel-top-right,
            .panel-bottom-right {
                display: none;
            }

            /* Active tab shown */
            .col-left.tab-active,
            .col-right.tab-active {
                display: flex;
                flex-direction: column;
                flex: 1;
                border: none;
                border-radius: 0;
                padding: 10px;
                min-height: 0;
                height: 100%;
            }

            .col-right.tab-active {
                gap: 10px;
                overflow-y: auto;
            }

            /* On mobile col-right tab: show all sub-sections stacked */
            .col-right.tab-active .panel-top-right {
                display: flex;
                flex: 0 0 auto;
                border-radius: 4px;
                padding: 10px;
                min-height: 180px;
            }
            .col-right.tab-active .panel-bottom-right {
                display: flex;
                flex-direction: column;
                gap: 8px;
                flex: 0 0 auto;
            }
            .col-right.tab-active .sub-panel {
                min-height: 130px;
                flex: 0 0 auto;
            }

            /* Mobile table sizing */
            th { font-size: 9px; padding: 6px 3px; letter-spacing: 0; }

            #p-table td {
                padding: 9px 4px;
                font-size: 11px;
            }
            #g-table td {
                padding: 6px 3px;
                font-size: 10px;
            }

            .panel-title { font-size: 12px; }
            .badge-count { font-size: 10px; padding: 2px 7px; }

            .bar-bg { width: 32px; height: 6px; }
            .bar-container { gap: 3px; }

            .st { font-size: 8px; padding: 1px 4px; }

            .footer-info { font-size: 10px; padding-top: 6px; }

            .sub-panel { padding: 8px; }
            .panel-header { margin-bottom: 6px; padding-bottom: 6px; }
        }

        /* ══ TABLET (768px - 1023px) ══ */
        @media (min-width: 768px) and (max-width: 1023px) {
            .container { padding: 8px; gap: 8px; }
            .col-left { flex: 0 0 60%; padding: 12px; }
            .col-right { flex: 0 0 calc(40% - 8px); }
            .panel-top-right { flex: 0 0 55%; padding: 10px; }

            th { font-size: 10px; padding: 7px 3px; }
            #p-table td { padding: 9px 4px; font-size: 12px; }
            #g-table td { padding: 7px 3px; font-size: 10px; }

            .panel-title { font-size: 12px; }
            .header-title { font-size: 16px; letter-spacing: 3px; }
            .header-clock { font-size: 16px; }
            .st { font-size: 8px; padding: 2px 5px; }
            .bar-bg { width: 38px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div><span class="hide-xs">TID CO.LTD</span></div>
    <div class="header-title">PROJECT DASHBOARD</div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div class="header-date" id="date">--/--/----</div>
    </div>
</div>

<!-- Tab bar chỉ hiện trên mobile -->
<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('left')">📋 TIẾN ĐỘ</button>
    <button class="tab-btn" onclick="switchTab('right')">🏦 BẢO LÃNH & THỐNG KÊ</button>
</div>

<div class="container">
    <!-- CỘT TRÁI: TIẾN ĐỘ DỰ ÁN -->
    <div class="col-left tab-active" id="tab-left">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="badge-count" id="p-count">0 HẠNG MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:17%">DỰ ÁN</th>
                        <th style="width:15%">KHÁCH HÀNG</th>
                        <th style="width:13%">NHÂN SỰ</th>
                        <th style="width:18%">HẠNG MỤC</th>
                        <th style="width:13%">TIẾN ĐỘ</th>
                        <th style="width:12%">DEADLINE</th>
                        <th style="width:12%">T.THÁI</th>
                    </tr>
                </thead>
                <tbody id="p-table"></tbody>
            </table>
        </div>
        <div class="footer-info">
            <div id="p-page">PAGE 1/1</div>
            <div id="p-sync">Đang cập nhật...</div>
        </div>
        <div class="refresh-line" id="line1"></div>
    </div>

    <!-- CỘT PHẢI: BẢO LÃNH + NHÂN SỰ + KHÁCH HÀNG -->
    <div class="col-right" id="tab-right">

        <!-- THEO DÕI BẢO LÃNH -->
        <div class="panel-top-right">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> THEO DÕI BẢO LÃNH</div>
                <div id="g-total-badge" class="badge-count" style="background:var(--accent); color:#000;">0</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:30%">DỰ ÁN</th>
                            <th style="width:20%">KHÁCH HÀNG</th>
                            <th style="width:12%">LOẠI</th>
                            <th style="width:20%">GIÁ TRỊ</th>
                            <th style="width:18%">HẾT HẠN</th>
                        </tr>
                    </thead>
                    <tbody id="g-table"></tbody>
                </table>
            </div>
            <div class="footer-info">
                <div id="g-page">PAGE 1/1</div>
                <div id="g-total-val">Tổng: 0</div>
            </div>
        </div>

        <!-- THỐNG KÊ NHÂN SỰ + KHÁCH HÀNG -->
        <div class="panel-bottom-right">
            <div class="sub-panel">
                <div class="panel-header">
                    <div class="panel-title" style="font-size:11px"><div class="title-dot"></div>THỐNG KÊ DỰ ÁN/NHÂN SỰ (<span id="s-total">0</span>)</div>
                </div>
                <div class="table-wrap">
                    <table><tbody id="s-table"></tbody></table>
                </div>
            </div>
            <div class="sub-panel">
                <div class="panel-header">
                    <div class="panel-title" style="font-size:11px"><div class="title-dot"></div>THỐNG KÊ DỰ ÁN/ KHÁCH HÀNG (<span id="c-total">0</span>)</div>
                </div>
                <div class="table-wrap">
                    <table><tbody id="c-table"></tbody></table>
                </div>
            </div>
        </div>

    </div><!-- /col-right -->
</div><!-- /container -->

<script>
    const SHEET_ID = "1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y";
    const URL_PROGRESS  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1280059749`;
    const URL_GUARANTEE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Bao%20lanh`;

    let dataP = [], dataG = [], currentPage = 0, currentGPage = 0;
    const ROWS_PER_PAGE = 16;
    const G_ROWS_PER_PAGE = 8;

    /* ── CLOCK ── */
    setInterval(() => {
        const n = new Date();
        document.getElementById("clock").innerText = n.toLocaleTimeString("vi-VN", {hour12: false});
        document.getElementById("date").innerText  = n.toLocaleDateString("vi-VN");
    }, 1000);

    /* ── TAB SWITCH (mobile) ── */
    function switchTab(tab) {
        const left  = document.getElementById("tab-left");
        const right = document.getElementById("tab-right");
        const btns  = document.querySelectorAll(".tab-btn");

        if (tab === 'left') {
            left.classList.add("tab-active");
            right.classList.remove("tab-active");
            btns[0].classList.add("active");
            btns[1].classList.remove("active");
        } else {
            right.classList.add("tab-active");
            left.classList.remove("tab-active");
            btns[1].classList.add("active");
            btns[0].classList.remove("active");
        }
    }

    /* ── FETCH ── */
    async function fetchData() {
        try {
            const [resP, resG] = await Promise.all([fetch(URL_PROGRESS), fetch(URL_GUARANTEE)]);
            const txtP = await resP.text();
            const txtG = await resG.text();

            dataP = JSON.parse(txtP.substring(txtP.indexOf("{"), txtP.lastIndexOf("}") + 1)).table.rows.slice(4);
            dataG = JSON.parse(txtG.substring(txtG.indexOf("{"), txtG.lastIndexOf("}") + 1)).table.rows.filter(r => r.c && r.c[9]?.v);

            renderAll();
            startProgressLine();
            document.getElementById("p-sync").innerText = "Cập nhật: " + new Date().toLocaleTimeString("vi-VN", {hour12: false});
        } catch(e) { console.error(e); }
    }

    function renderAll() {
        renderProgress();
        renderGuarantees();
        renderStats();
    }

    /* ── RENDER PROGRESS ── */
    function renderProgress() {
        const el = document.getElementById("p-table");
        const totalPages = Math.ceil(dataP.length / ROWS_PER_PAGE);
        const start = currentPage * ROWS_PER_PAGE;
        const items = dataP.slice(start, start + ROWS_PER_PAGE);

        document.getElementById("p-count").innerText = `${dataP.length} HẠNG MỤC`;
        document.getElementById("p-page").innerText  = `PAGE ${currentPage + 1}/${totalPages || 1}`;

        el.innerHTML = items.map(row => {
            const d = row.c;
            const pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
            const isLate = d[7]?.v && parseDate(d[7].v) < new Date() && pct < 100;
            const item = d[2]?.v || "";

            return `<tr>
                <td class="text-left gold-bold" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[1]?.v || "—"}</td>
                <td class="text-left accent-text" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[4]?.v || "—"}</td>
                <td style="color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[3]?.v || "—"}</td>
                <td class="text-left" style="color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item}</td>
                <td>${item ? `<div class="bar-container"><span style="width:28px;font-family:var(--f-mono);font-size:10px;text-align:right">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>` : ""}</td>
                <td style="font-family:var(--f-mono);color:var(--accent);font-size:11px;">${d[7]?.f || "—"}</td>
                <td>${item ? `<span class="st ${pct>=100?'st-done':(isLate?'st-late':'st-wip')}">${pct>=100?'DONE':(isLate?'LATE':'WORKING')}</span>` : ""}</td>
            </tr>`;
        }).join("");
    }

    /* ── RENDER GUARANTEE ── */
    function renderGuarantees() {
        const el = document.getElementById("g-table");
        const totalPages = Math.ceil(dataG.length / G_ROWS_PER_PAGE);
        const start = currentGPage * G_ROWS_PER_PAGE;
        const items = dataG.slice(start, start + G_ROWS_PER_PAGE);

        // tính tổng toàn bộ
        let totalVal = 0;
        dataG.forEach(row => {
            const d = row.c;
            let valRaw = d[12]?.v;
            if (typeof valRaw === 'number') totalVal += valRaw;
            else if (typeof valRaw === 'string') totalVal += parseFloat(valRaw.replace(/[^0-9.-]+/g,"")) || 0;
        });

        const today = new Date(); today.setHours(0,0,0,0);

        el.innerHTML = items.map(row => {
            const d = row.c;
            const expDate = parseDate(d[7]?.v);
            let daysLeft = null;
            if (expDate) { const e = new Date(expDate); e.setHours(0,0,0,0); daysLeft = Math.ceil((e - today) / 86400000); }
            const nearExpiry = daysLeft !== null && daysLeft <= 10;
            const dateStyle = nearExpiry
                ? "color:#ff6b6b;font-family:var(--f-mono);white-space:nowrap;animation:flash-red 1.4s step-end infinite;font-weight:700;"
                : "color:#fff;font-family:var(--f-mono);white-space:nowrap;";
            return `<tr>
                <td class="text-left" style="color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[9]?.v || "—"}</td>
                <td class="text-left accent-text" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[10]?.v || "—"}</td>
                <td><span class="st st-wip" style="font-size:8px;">${d[13]?.v || "—"}</span></td>
                <td class="gold-bold" style="white-space:nowrap;">${d[12]?.f || d[12]?.v || "0"}</td>
                <td style="${dateStyle}">${d[7]?.f || "—"}</td>
            </tr>`;
        }).join("");

        document.getElementById("g-total-badge").innerText = totalVal.toLocaleString('vi-VN');
        document.getElementById("g-page").innerText = `PAGE ${currentGPage + 1}/${totalPages || 1}`;
        document.getElementById("g-total-val").innerText = `Tổng: ${totalVal.toLocaleString('vi-VN')} đ`;
    }

    /* ── RENDER STATS ── */
    function renderStats() {
        const staff = {}, cust = {};

        dataP.forEach(r => {
            const c = r.c;
            const s = c[3]?.v;
            if (s && s.trim() && s !== "—") staff[s] = (staff[s] || 0) + 1;
            const cu = c[4]?.v;
            if (cu && cu.trim() && cu !== "—") cust[cu] = (cust[cu] || 0) + 1;
        });

        const rowTpl = (n, v) =>
            `<tr>
                <td class="text-left" style="font-size:11px;padding:7px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${n}</td>
                <td class="accent-text" style="font-weight:700;width:36px;text-align:right;padding-right:8px;font-family:var(--f-mono);">${v}</td>
            </tr>`;

        const sortedStaff = Object.entries(staff).sort((a,b) => b[1]-a[1]);
        const sortedCust  = Object.entries(cust).sort((a,b) => b[1]-a[1]);

        document.getElementById("s-total").innerText = sortedStaff.length;
        document.getElementById("c-total").innerText = sortedCust.length;

        document.getElementById("s-table").innerHTML = sortedStaff.length
            ? sortedStaff.map(([n,v]) => rowTpl(n,v)).join("")
            : `<tr><td colspan="2" style="text-align:center;color:var(--text-dim);padding:12px;font-size:11px;">KHÔNG CÓ DỮ LIỆU</td></tr>`;

        document.getElementById("c-table").innerHTML = sortedCust.length
            ? sortedCust.map(([n,v]) => rowTpl(n,v)).join("")
            : `<tr><td colspan="2" style="text-align:center;color:var(--text-dim);padding:12px;font-size:11px;">KHÔNG CÓ DỮ LIỆU</td></tr>`;
    }

    /* ── HELPERS ── */
    function parseDate(v) {
        if (!v) return null;
        const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(+m[1], +m[2], +m[3]) : null;
    }

    function startProgressLine() {
        const l = document.getElementById("line1");
        l.classList.remove("animating");
        void l.offsetWidth;
        l.classList.add("animating");
    }

    /* ── AUTO PAGE ── */
    setInterval(() => {
        const total = Math.ceil(dataP.length / ROWS_PER_PAGE);
        if (total > 1) { currentPage = (currentPage + 1) % total; renderProgress(); }
        const gTotal = Math.ceil(dataG.length / G_ROWS_PER_PAGE);
        if (gTotal > 1) { currentGPage = (currentGPage + 1) % gTotal; renderGuarantees(); }
    }, 15000);

    /* ── AUTO REFRESH ── */
    setInterval(fetchData, 30000);

    window.onload = fetchData;
</script>
</body>
</html>
