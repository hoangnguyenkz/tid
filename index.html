<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LED DASHBOARD</title>

<style>
:root {
    --base-font: 20;
}

body {
    margin: 0;
    background: black;
    color: #00e5ff;
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
}

/* SCALE SYSTEM */
.wrapper {
    transform-origin: top left;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    font-size: calc(var(--base-font) * 1.6px);
    border-bottom: 2px solid #00e5ff;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 80px);
}

.section {
    width: 50%;
    padding: 20px;
    box-sizing: border-box;
}

.section:first-child {
    border-right: 2px solid #00e5ff;
}

h2 {
    text-align: center;
    font-size: calc(var(--base-font) * 1.4px);
}

/* TABLE */
.table-wrap {
    position: relative;
    height: 100%;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: calc(var(--base-font) * 1px);
}

th {
    border-bottom: 2px solid #00e5ff;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #222;
    text-align: center;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

/* STATUS */
.late { color: red; animation: blink 1s infinite; }
.done { color: #00ff00; }
.doing { color: orange; }

@keyframes blink {
    50% { opacity: 0; }
}

/* ANIMATION */
.page {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    transition: all 0.6s ease;
}

.fade-out {
    opacity: 0;
    transform: translateY(-20px);
}

.fade-in {
    opacity: 1;
    transform: translateY(0);
}

.page-info {
    text-align: center;
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

<div class="header">
    <div>📊 PROJECT LED DASHBOARD</div>
    <div id="clock"></div>
</div>

<div class="container">

<!-- PROGRESS -->
<div class="section">
    <h2>TIẾN ĐỘ DỰ ÁN</h2>
    <div class="table-wrap">
        <div id="progressPage" class="page"></div>
    </div>
    <div class="page-info" id="progressInfo"></div>
</div>

<!-- GUARANTEE -->
<div class="section">
    <h2>BẢO LÃNH</h2>
    <div class="table-wrap">
        <div id="guaranteePage" class="page"></div>
    </div>
    <div class="page-info" id="guaranteeInfo"></div>
</div>

</div>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";

let data = [];
let page1 = 0, page2 = 0;

/* SCALE */
function scaleUI() {
    const baseWidth = 1920;
    const scale = window.innerWidth / baseWidth;
    document.getElementById("wrapper").style.transform = `scale(${scale})`;
}
window.addEventListener("resize", scaleUI);
scaleUI();

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

/* PARSE */
function parseJSON(text) {
    return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
}

/* FETCH */
async function loadData() {
    const res = await fetch(URL);
    const text = await res.text();
    const json = parseJSON(text);

    data = (json.table.rows || []).slice(7);
    render();
}

/* AUTO ROW */
function getRows() {
    return Math.floor((window.innerHeight - 200) / 50);
}

/* BUILD TABLE */
function buildTable(rows) {
    let html = "<table><thead><tr>\
<th>Dự án</th><th>Hạng mục</th><th>%</th><th>Deadline</th><th>Nhân sự</th><th>TT</th>\
</tr></thead><tbody>";

    rows.forEach(r => {
        const d = r.c;
        let p = d[9]?.v || 0;
        let deadline = d[7]?.v;

        let cls = "doing", txt = "ĐANG LÀM";
        if (p >= 100) { cls = "done"; txt = "DONE"; }
        if (deadline && new Date(deadline) < new Date() && p < 100) {
            cls = "late"; txt = "LATE";
        }

        html += `<tr>
        <td class="project">${d[1]?.v || ""}</td>
        <td>${d[2]?.v || ""}</td>
        <td>${p}%</td>
        <td>${formatDate(deadline)}</td>
        <td>${d[3]?.v || ""}</td>
        <td class="${cls}">${txt}</td>
        </tr>`;
    });

    return html + "</tbody></table>";
}

/* RENDER PAGE */
function renderPage(containerId, pageIndex) {
    const rows = getRows();
    const start = pageIndex * rows;
    const pageData = data.slice(start, start + rows);

    const container = document.getElementById(containerId);

    container.classList.add("fade-out");

    setTimeout(() => {
        container.innerHTML = buildTable(pageData);
        container.classList.remove("fade-out");
        container.classList.add("fade-in");
    }, 300);

    return Math.ceil(data.length / rows);
}

/* MAIN RENDER */
function render() {
    const total1 = renderPage("progressPage", page1);
    document.getElementById("progressInfo").innerText = `Trang ${page1+1}/${total1}`;
}

/* AUTO PAGE */
setInterval(() => {
    const rows = getRows();
    const total = Math.ceil(data.length / rows);

    page1 = (page1 + 1) % total;
    render();
}, 10000);

/* FORMAT */
function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("vi-VN");
}

/* INIT */
loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
