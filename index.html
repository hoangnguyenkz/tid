<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --accent-dim: #2a7aaa;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --text-dim: #6a90b8;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--f-sans); -webkit-font-smoothing: antialiased; }
        body { overflow: hidden; }

        /* ── HEADER ── */
        .header {
            position: relative;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 70px;
            padding: 0 20px;
            background: var(--bg-header);
            border-bottom: 2px solid var(--border-hi);
            z-index: 10;
        }
        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--text-bright); }
        .logo-box { width: 32px; height: 32px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .header-center { text-align: center; }
        .header-title { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .header-clock { font-family: var(--f-mono); font-size: 22px; color: var(--text-bright); line-height: 1; font-weight: 500; }
        .header-date { font-family: var(--f-mono); font-size: 13px; color: var(--accent); margin-top: 4px; letter-spacing: 1px; }

        /* ── LAYOUT ── */
        .container { display: flex; flex-direction: column; height: calc(100vh - 70px); }
        .panel { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; min-height: 0; }
        .panel:first-child { flex: 1.4; } 
        .panel-top { flex: 0.7; display: flex; flex-direction: column; border-bottom: 2px solid var(--border-hi); margin-bottom: 10px; padding-bottom: 10px; overflow: hidden; }
        .panel-bottom { flex: 0.3; display: flex; gap: 15px; min-height: 0; }
        .sub-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── COMPONENTS ── */
        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border-hi); padding-bottom: 5px; }
        .panel-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; }
        .title-dot { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); }
        .panel-badge-highlight { font-family: var(--f-mono); font-size: 13px; font-weight: 700; padding: 4px 12px; border: 1px solid var(--gold); color: var(--bg); background: var(--gold); border-radius: 4px; letter-spacing: 1px; }
        .panel-badge { font-family: var(--f-mono); font-size: 11px; padding: 2px 8px; border: 1px solid var(--border-hi); color: var(--accent); background: rgba(96,200,240,0.1); }

        /* ── TABLE ── */
        .table-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--bg-thead); color: var(--accent); font-size: 11px; padding: 10px 6px; text-transform: uppercase; border-bottom: 1px solid var(--border-hi); }
        td { padding: 10px 6px; font-size: 12.5px; border-bottom: 1px solid var(--border); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        
        .text-left { text-align: left; }
        .val-num { font-family: var(--f-mono); color: var(--gold); font-weight: 600; }
        .date-text { font-family: var(--f-mono); color: var(--text-bright); }
        .type-badge { font-size: 10px; padding: 2px 5px; background: var(--border-hi); border-radius: 3px; color: var(--accent); font-weight: 600; }

        .refresh-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0; }
        .refresh-bar.animating { animation: progress-run 30s linear forwards; }
        @keyframes progress-run { from { width: 100%; } to { width: 0%; } }

        @media (max-width: 1023px) {
            body { overflow-y: auto; height: auto; }
            .container { height: auto; display: block; }
            .panel-bottom { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div> TID CO.LTD</div>
    <div class="header-center"><div class="header-title">PROJECT DASHBOARD</div></div>
    <div class="header-right"><div class="header-clock" id="clock">00:00:00</div><div class="header-date" id="date">--/--/----</div></div>
</div>

<div class="container">
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="panel-badge-highlight" id="progress-count">0 HẠNG MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 18%;">DỰ ÁN</th>
                        <th style="width: 18%;">KHÁCH HÀNG</th>
                        <th style="width: 24%;">HẠNG MỤC</th>
                        <th style="width: 13%;">TIẾN ĐỘ</th>
                        <th style="width: 13%;">DEADLINE</th>
                        <th style="width: 14%;">TRẠNG THÁI</th>
                    </tr>
                </thead>
                <tbody id="progress"></tbody>
            </table>
        </div>
        <div class="refresh-bar" id="refreshBar1"></div>
    </div>

    <div class="panel">
        <!-- Bảng Theo dõi Bảo lãnh đã cập nhật cột -->
        <div class="panel-top">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> THEO DÕI BẢO LÃNH</div>
                <div class="panel-badge" id="guarantee-count">0</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 25%;">DỰ ÁN</th>
                            <th style="width: 20%;">KHÁCH HÀNG</th>
                            <th style="width: 12%;">LOẠI BL</th>
                            <th style="width: 23%;">GIÁ TRỊ</th>
                            <th style="width: 20%;">HẾT HẠN</th>
                        </tr>
                    </thead>
                    <tbody id="guarantee-list"></tbody>
                </table>
            </div>
        </div>

        <div class="panel-bottom">
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 13px;">TOP NHÂN SỰ</div><div class="panel-badge" id="staff-count">0</div></div>
                <div class="table-wrap"><table><tbody id="staff-list"></tbody></table></div>
            </div>
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 13px;">TOP KHÁCH HÀNG</div><div class="panel-badge" id="customer-count">0</div></div>
                <div class="table-wrap"><table><tbody id="customer-list"></tbody></table></div>
            </div>
        </div>
        <div class="refresh-bar" id="refreshBar2"></div>
    </div>
</div>

<script>
    const SHEET_ID = "1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y";
    const PROGRESS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1280059749`;
    // Kết nối sheet Bảo lãnh
    const GUARANTEE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Bao%20lanh`;

    const REFRESH_TIME = 30000;
    let progressData = [];
    let guaranteeData = [];

    async function fetchData() {
        try {
            // Fetch Tiến độ
            const resP = await fetch(PROGRESS_URL);
            const textP = await resP.text();
            const jsonP = JSON.parse(textP.substring(textP.indexOf("{"), textP.lastIndexOf("}") + 1));
            progressData = jsonP.table.rows.slice(4);

            // Fetch Bảo lãnh
            const resG = await fetch(GUARANTEE_URL);
            const textG = await resG.text();
            const jsonG = JSON.parse(textG.substring(textG.indexOf("{"), textG.lastIndexOf("}") + 1));
            guaranteeData = jsonG.table.rows;

            renderAll();
            resetBars();
        } catch (e) { console.error("Data error", e); }
    }

    function renderAll() {
        renderProgress();
        renderAnalytics();
        renderGuarantees();
    }

    function renderProgress() {
        const el = document.getElementById("progress");
        const items = progressData.slice(0, 12); 
        document.getElementById("progress-count").innerText = `${progressData.length} HẠNG MỤC`;
        
        el.innerHTML = items.map(row => {
            const d = row.c;
            const project = d[1]?.v || "—";
            const customer = d[4]?.v || "—";
            const item = d[2]?.v || "—";
            const pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
            const deadline = d[7]?.f || "—";
            return `<tr>
                <td class="text-left" style="color:var(--gold); font-weight:700;">${project}</td>
                <td class="text-left" style="color:var(--accent);">${customer}</td>
                <td class="text-left">${item}</td>
                <td><div class="val-num">${pct}%</div></td>
                <td class="date-text">${deadline}</td>
                <td><span class="type-badge">${pct >= 100 ? 'DONE' : 'WIP'}</span></td>
            </tr>`;
        }).join("");
    }

    function renderGuarantees() {
        const el = document.getElementById("guarantee-list");
        // Lọc dữ liệu bảo lãnh: J(9), K(10), N(13), M(12), H(7)
        const validRows = guaranteeData.filter(row => row.c && row.c[9]?.v); 
        document.getElementById("guarantee-count").innerText = validRows.length;

        el.innerHTML = validRows.slice(0, 8).map(row => {
            const d = row.c;
            return `<tr>
                <td class="text-left" style="color:var(--text-bright); font-weight:600;">${d[9]?.v || "—"}</td>
                <td class="text-left">${d[10]?.v || "—"}</td>
                <td><span class="type-badge">${d[13]?.v || "—"}</span></td>
                <td class="val-num">${d[12]?.f || d[12]?.v || "0"}</td>
                <td class="date-text" style="color:var(--accent);">${d[7]?.f || d[7]?.v || "—"}</td>
            </tr>`;
        }).join("");
    }

    function renderAnalytics() {
        const staffMap = {}, custMap = {};
        progressData.forEach(row => {
            const staff = row.c[3]?.v, cust = row.c[4]?.v;
            if (staff && staff !== "—") staffMap[staff] = (staffMap[staff] || 0) + 1;
            if (cust && cust !== "—") custMap[cust] = (custMap[cust] || 0) + 1;
        });

        const fill = (map, elId, badgeId) => {
            const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, 5);
            document.getElementById(badgeId).innerText = Object.keys(map).length;
            document.getElementById(elId).innerHTML = sorted.map(([name, count]) => 
                `<tr><td class="text-left" style="padding:6px 10px;">${name}</td><td style="color:var(--accent); font-weight:700; text-align:right; padding-right:10px;">${count}</td></tr>`
            ).join("");
        };
        fill(staffMap, "staff-list", "staff-count");
        fill(custMap, "customer-list", "customer-count");
    }

    function resetBars() {
        ["refreshBar1", "refreshBar2"].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove("animating");
            void el.offsetWidth;
            el.classList.add("animating");
        });
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("vi-VN", { hour12: false });
        document.getElementById("date").innerText = now.toLocaleDateString("vi-VN");
    }

    setInterval(updateClock, 1000);
    setInterval(fetchData, REFRESH_TIME);
    window.onload = fetchData;
</script>
</body>
</html>
