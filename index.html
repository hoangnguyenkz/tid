<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROJECT BOARD</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00e5ff;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    font-size: 32px;
    font-weight: bold;
    border-bottom: 2px solid #00e5ff;
}

/* TABLE */
.container {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 24px;
}

th {
    border-bottom: 2px solid #00e5ff;
    padding: 12px;
}

td {
    border-bottom: 1px solid #222;
    padding: 12px;
    text-align: center;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

/* STATUS */
.late {
    color: red;
    font-weight: bold;
    animation: blink 1s infinite;
}

.done {
    color: #00ff00;
    font-weight: bold;
}

.doing {
    color: orange;
    font-weight: bold;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* PAGE INFO */
.footer {
    text-align: center;
    font-size: 18px;
    padding: 10px;
    color: #888;
}
</style>
</head>

<body>

<div class="header">
    <div>📊 PROJECT STATUS</div>
    <div id="clock"></div>
</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>Dự án</th>
                <th>Hạng mục</th>
                <th>%</th>
                <th>Deadline</th>
                <th>Nhân sự</th>
                <th>Trạng thái</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div class="footer" id="pageInfo"></div>

<script>
/* ===== CONFIG ===== */
const URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";

const ROWS_PER_PAGE = 10;   // số dòng mỗi trang
const PAGE_TIME = 10000;    // 10 giây lật trang

/* STATE */
let data = [];
let page = 0;

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

/* PARSE */
function parseJSON(text) {
    return JSON.parse(
        text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );
}

/* FETCH */
async function loadData() {
    const res = await fetch(URL);
    const text = await res.text();
    const json = parseJSON(text);

    // bỏ 7 dòng đầu
    data = (json.table.rows || []).slice(7);

    render();
}

/* PAGINATION */
function getPageData() {
    const start = page * ROWS_PER_PAGE;
    return data.slice(start, start + ROWS_PER_PAGE);
}

/* RENDER */
function render() {
    const tbody = document.getElementById("tbody");
    const pageData = getPageData();

    tbody.innerHTML = "";

    pageData.forEach(r => {
        const d = r.c;

        let project = d[1]?.v || ""; // B
        let item    = d[2]?.v || ""; // C
        let percent = d[9]?.v || 0;  // J
        let deadline= d[7]?.v || ""; // H
        let staff   = d[3]?.v || ""; // D

        let cls = "doing";
        let txt = "ĐANG LÀM";

        if (percent >= 100) {
            cls = "done";
            txt = "HOÀN THÀNH";
        }

        if (deadline && new Date(deadline) < new Date() && percent < 100) {
            cls = "late";
            txt = "QUÁ HẠN";
        }

        tbody.innerHTML += `
        <tr>
            <td class="project">${project}</td>
            <td>${item}</td>
            <td>${percent}%</td>
            <td>${formatDate(deadline)}</td>
            <td>${staff}</td>
            <td class="${cls}">${txt}</td>
        </tr>`;
    });

    updatePageInfo();
}

/* PAGE INFO */
function updatePageInfo() {
    const totalPages = Math.ceil(data.length / ROWS_PER_PAGE);
    document.getElementById("pageInfo").innerText =
        `Trang ${page + 1} / ${totalPages}`;
}

/* AUTO PAGE */
setInterval(() => {
    if (!data.length) return;

    page++;
    if (page * ROWS_PER_PAGE >= data.length) {
        page = 0;
    }

    render();
}, PAGE_TIME);

/* AUTO REFRESH */
setInterval(loadData, 30000);

/* FORMAT */
function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("vi-VN");
}

/* INIT */
loadData();
</script>

</body>
</html>
