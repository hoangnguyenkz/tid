<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROJECT DASHBOARD</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00e5ff;
    font-family: "Segoe UI", Arial, sans-serif;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    font-size: 28px;
    font-weight: bold;
    border-bottom: 2px solid #00e5ff;
}

.container {
    display: flex;
    height: calc(100vh - 70px);
}

.section {
    width: 50%;
    padding: 20px;
    box-sizing: border-box;
}

.section:first-child {
    border-right: 2px solid #00e5ff;
}

h2 {
    text-align: center;
    font-size: 26px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 20px;
}

th {
    border-bottom: 2px solid #00e5ff;
    padding: 10px;
}

td {
    border-bottom: 1px solid #222;
    padding: 10px;
    text-align: center;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

.late { color: red; animation: blink 1s infinite; }
.done { color: #00ff00; }
.doing { color: orange; }

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="header">
    <div>📊 PROJECT DASHBOARD</div>
    <div id="clock"></div>
</div>

<div class="container">

<div class="section">
<h2>TIẾN ĐỘ DỰ ÁN</h2>
<table>
<thead>
<tr>
<th>Dự án</th>
<th>Hạng mục</th>
<th>%</th>
<th>Deadline</th>
<th>Nhân sự</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="progress"></tbody>
</table>
</div>

<div class="section">
<h2>CÔNG NỢ DỰ ÁN</h2>
<table>
<thead>
<tr>
<th>Dự án</th>
<th>HĐ</th>
<th>Giá trị</th>
<th>Đã thu</th>
<th>Còn lại</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="debt"></tbody>
</table>
</div>

</div>

<script>
const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";

setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

function parseJSON(text) {
    return JSON.parse(
        text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );
}

async function fetchSheet(url) {
    const res = await fetch(url);
    const text = await res.text();
    const json = parseJSON(text);

    return (json.table.rows || []).slice(7);
}

async function loadProgress() {
    const rows = await fetchSheet(PROGRESS_URL);
    const el = document.getElementById("progress");

    el.innerHTML = "";

    rows.forEach(r => {
        const d = r.c;

        let project = d[1]?.v || "";   // B
        let item    = d[2]?.v || "";   // C
        let percent = d[9]?.v || 0;    // J
        let deadline= d[7]?.v || "";   // H
        let staff   = d[3]?.v || "";   // D

        let cls = "doing";
        let txt = "ĐANG LÀM";

        if (percent >= 100) {
            cls = "done";
            txt = "HOÀN THÀNH";
        }

        // tự tính quá hạn
        if (deadline && new Date(deadline) < new Date() && percent < 100) {
            cls = "late";
            txt = "QUÁ HẠN";
        }

        el.innerHTML += `
        <tr>
            <td class="project">${project}</td>
            <td>${item}</td>
            <td>${percent}%</td>
            <td>${formatDate(deadline)}</td>
            <td>${staff}</td>
            <td class="${cls}">${txt}</td>
        </tr>`;
    });
}

function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("vi-VN");
}

loadProgress();
setInterval(loadProgress, 30000);
</script>

</body>
</html>
