<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME LINE PROJECT TID</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --header-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-accent: #f1c40f;
            --row-even: #111111;
            --status-green: #2ecc71;
            --status-red: #e74c3c;
            --blue-neon: #00d4ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-transform: uppercase;
        }

        .top-bar {
            height: 50px;
            padding: 0 20px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #444;
        }

        .main-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        #clock { font-family: monospace; font-size: 1.4rem; color: var(--blue-neon); font-weight: bold; }
        #sync-status { font-size: 0.7rem; color: var(--blue-neon); font-weight: bold; }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1.25fr 0.75fr;
            flex-grow: 1;
            gap: 2px;
            background-color: #333;
        }

        .column { display: flex; flex-direction: column; background: var(--bg-color); overflow: hidden; }
        .right-split { display: grid; grid-template-rows: 1fr 1fr; gap: 2px; background-color: #333; }

        .board-header {
            background-color: var(--header-bg);
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #444;
            position: relative;
        }

        .board-title { color: var(--text-accent); font-size: 0.85rem; font-weight: bold; }
        .page-info { position: absolute; right: 10px; color: #666; font-size: 0.7rem; }

        .table-header {
            display: grid; background-color: #222; color: var(--blue-neon);
            font-weight: bold; font-size: 0.7rem; height: 30px; align-items: center; padding: 0 10px;
        }

        .data-list { flex-grow: 1; display: flex; flex-direction: column; }
        .data-row {
            display: grid; align-items: center; padding: 0 10px;
            font-size: 0.8rem; height: calc(100% / 12);
            border-bottom: 1px solid #222;
        }
        
        .right-split .data-row { height: calc(100% / 6); }

        /* Cấu hình cột linh hoạt */
        .tiendo-cols { grid-template-columns: 35px 1.2fr 1fr 1fr 45px 85px 85px 95px; }
        .baolanh-cols { grid-template-columns: 35px 1.2fr 1fr 0.9fr 100px 90px; }

        .col-project { color: var(--text-accent); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge {
            padding: 2px 4px; border-radius: 3px; font-size: 0.65rem; text-align: center; font-weight: bold;
            border: 1px solid currentColor;
        }

        .summary-box { padding: 10px; line-height: 1.6; color: #ccc; font-size: 0.85rem; }
        .summary-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 2px 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="sync-status">ĐANG TẢI...</div>
        <div class="main-title">TIME LINE PROJECT TID</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="dashboard-container">
        <!-- BẢNG TIẾN ĐỘ -->
        <div class="column">
            <div class="board-header">
                <div class="board-title">THEO DÕI TIẾN ĐỘ THI CÔNG</div>
                <div class="page-info" id="p-tiendo">1/1</div>
            </div>
            <div class="table-header tiendo-cols">
                <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>HẠNG MỤC</div><div>%</div><div>DEADLINE</div><div>NHÂN SỰ</div><div>TRẠNG THÁI</div>
            </div>
            <div id="list-tiendo" class="data-list"></div>
        </div>

        <div class="column right-split">
            <!-- BẢNG BẢO LÃNH -->
            <div class="column">
                <div class="board-header">
                    <div class="board-title">THEO DÕI BẢO LÃNH / CÔNG NỢ</div>
                    <div class="page-info" id="p-baolanh">1/1</div>
                </div>
                <div class="table-header baolanh-cols">
                    <div>STT</div><div>DỰ ÁN</div><div>KHÁCH HÀNG</div><div>HẠNG MỤC</div><div>GIÁ TRỊ</div><div>TRẠNG THÁI</div>
                </div>
                <div id="list-baolanh" class="data-list"></div>
            </div>

            <!-- THỐNG KÊ NHÂN SỰ -->
            <div class="column">
                <div class="board-header">
                    <div class="board-title">NHÂN SỰ PHỤ TRÁCH</div>
                </div>
                <div id="summary-staff" class="summary-box"></div>
            </div>
        </div>
    </div>

    <script>
        // SỬ DỤNG LINK CSV ĐỂ ĐẠT ĐỘ ỔN ĐỊNH CAO NHẤT
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRihkN3STIzLwe2-eSHQMVRLX2cOLKorzGFR5_fm5Si1D94wmrfpt9NrD-YxsVC1iOOWgxTS8Ni0SmC/pub?output=csv";

        let db = { tiendo: [], baolanh: [] };
        let page = { tiendo: 0, baolanh: 0 };

        async function loadData() {
            try {
                // Thêm timestamp để tránh cache trình duyệt
                const response = await fetch(`${CSV_URL}&cache=${new Date().getTime()}`);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    complete: function(results) {
                        parse(results.data);
                        document.getElementById('sync-status').innerText = "CẬP NHẬT: " + new Date().toLocaleTimeString('vi-VN');
                    },
                    error: function() { throw new Error(); }
                });
            } catch (e) {
                document.getElementById('sync-status').innerText = "LỖI KẾT NỐI - ĐANG THỬ LẠI...";
                setTimeout(loadData, 10000);
            }
        }

        function parse(rows) {
    db.tiendo = []; db.baolanh = [];
    let staff = {};

    // Duyệt dữ liệu từ dòng thứ 3 (Index 2)
    rows.slice(2).forEach(r => {
        // --- BẢNG TIẾN ĐỘ (Cột A đến H) ---
        // r[0]: STT, r[1]: Dự án, r[2]: Khách hàng, r[3]: Hạng mục, 
        // r[4]: %, r[5]: Deadline, r[6]: Nhân sự, r[7]: Trạng thái
        if(r[1] && r[1].trim() !== "") {
            db.tiendo.push({
                stt: r[0], 
                name: r[1], 
                cust: r[2], 
                item: r[3], 
                p: r[4], 
                dl: r[5], 
                staff: r[6], 
                st: r[7]
            });
            
            // Thống kê nhân sự
            if(r[6]) {
                r[6].split(',').forEach(s => { 
                    let n = s.trim(); if(n) staff[n] = (staff[n]||0)+1; 
                });
            }
        }

        // --- BẢNG BẢO LÃNH (Cột I đến O) ---
        // r[8]: STT, r[9]: Dự án, r[10]: Khách hàng, r[11]: Hạng mục, 
        // r[12]: Loại BL, r[13]: Giá trị, r[14]: Trạng thái
        if(r[9] && r[9].trim() !== "") {
            db.baolanh.push({
                stt: r[8], 
                name: r[9], 
                cust: r[10], 
                item: r[11], 
                val: r[13], 
                st: r[14]
            });
        }
    });

    // Cập nhật bảng nhân sự phụ trách
    let sHtml = "";
    Object.entries(staff).sort((a,b)=>b[1]-a[1]).forEach(([n, c]) => {
        sHtml += `<div class="summary-item"><span>${n}</span><span style="color:var(--blue-neon)">${c} Dự án</span></div>`;
    });
    document.getElementById('summary-staff').innerHTML = sHtml;
    
    render();
}

        function render() {
            const draw = (id, data, p, size, template) => {
                const slice = data.slice(p * size, (p + 1) * size);
                document.getElementById(id).innerHTML = slice.map(template).join('');
            };

            // Bảng Tiến Độ
            draw('list-tiendo', db.tiendo, page.tiendo, 12, r => `
                <div class="data-row tiendo-cols">
                    <div style="color:#666">${r.stt}</div>
                    <div class="col-project">${r.name}</div>
                    <div style="font-size:0.75rem">${r.cust}</div>
                    <div style="font-size:0.7rem">${r.item}</div>
                    <div style="color:var(--text-accent); text-align:center">${r.p}</div>
                    <div style="color:var(--blue-neon)">${r.dl}</div>
                    <div style="color:#2ecc71; font-weight:bold">${r.staff}</div>
                    <div><span class="status-badge" style="color:${getColor(r.st)}">${r.st}</span></div>
                </div>
            `);

            // Bảng Bảo Lãnh
            draw('list-baolanh', db.baolanh, page.baolanh, 6, r => `
                <div class="data-row baolanh-cols">
                    <div style="color:#666">${r.stt}</div>
                    <div class="col-project">${r.name}</div>
                    <div style="font-size:0.75rem">${r.cust}</div>
                    <div style="font-size:0.7rem">${r.item}</div>
                    <div style="text-align:right; color:var(--status-red); font-weight:bold">${r.val}</div>
                    <div><span class="status-badge" style="color:${getColor(r.st)}">${r.st}</span></div>
                </div>
            `);

            document.getElementById('p-tiendo').innerText = `${page.tiendo + 1}/${Math.ceil(db.tiendo.length/12)||1}`;
            document.getElementById('p-baolanh').innerText = `${page.baolanh + 1}/${Math.ceil(db.baolanh.length/6)||1}`;
        }

        function getColor(st) {
            if(!st) return "#fff";
            const s = st.toString().toUpperCase();
            if(s.includes("XONG") || s.includes("QUYẾT")) return "var(--status-green)";
            if(s.includes("CHẬM") || s.includes("QUÁ")) return "var(--status-red)";
            return "var(--text-accent)";
        }

        // Tự động chuyển trang
        setInterval(() => {
            page.tiendo = (page.tiendo + 1) % (Math.ceil(db.tiendo.length/12)||1);
            page.baolanh = (page.baolanh + 1) % (Math.ceil(db.baolanh.length/6)||1);
            render();
        }, 8000);

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN'); }, 1000);
        
        loadData();
        setInterval(loadData, 300000); // Tải lại dữ liệu sau mỗi 5 phút
    </script>
</body>
</html>
