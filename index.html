<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:          #0a0f1e;
  --bg-header:   #0d1428;
  --bg-thead:    #111d38;
  --row-a:       #0e1830;
  --row-b:       #0b1326;
  --border:      #1e3358;
  --border-hi:   #2e4f88;
  --accent:      #60c8f0;
  --accent-dim:  #2a7aaa;
  --gold:        #ffc94d;
  --green:       #3de08a;
  --red:         #ff6b6b;
  --orange:      #ffaa4d;
  --text:        #d8eaf8;
  --text-bright: #ffffff;
  --text-dim:    #6a90b8;
  --f-sans:      'IBM Plex Sans', sans-serif;
  --f-mono:      'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 64px;
  padding: 0 28px;
  background: var(--bg-header);
  border-bottom: 2px solid var(--border-hi);
}
.header::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
  opacity: 0.45;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1.5px;
}
.logo-box {
  width: 36px; height: 36px;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  color: var(--accent);
  animation: glow 3s ease-in-out infinite;
}
@keyframes glow { 0%,100%{ box-shadow:0 0 4px rgba(96,200,240,.3)} 50%{ box-shadow:0 0 14px rgba(96,200,240,.7)} }
.header-sub {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  margin-top: 3px;
}

.header-center { text-align: center; }
.header-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 5px;
  color: var(--accent);
  text-transform: uppercase;
}
.header-tagline {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 3px;
  margin-top: 2px;
}

.header-right { text-align: right; }
.header-clock {
  font-family: var(--f-mono);
  font-size: 24px;
  font-weight: 500;
  color: var(--text-bright);
  letter-spacing: 2px;
}
.header-date {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── LAYOUT ── */
.container {
  display: flex;
  height: calc(100vh - 64px);
}
.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 14px 18px 10px;
  overflow: hidden;
  position: relative;
}
.panel:first-child { border-right: 2px solid var(--border-hi); }

/* ── PANEL HEADER ── */
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-hi);
}
.panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--text-bright);
  text-transform: uppercase;
}
.title-dot {
  width: 9px; height: 9px;
  background: var(--accent);
  border-radius: 2px;
  transform: rotate(45deg);
}
.panel-badge {
  font-family: var(--f-mono);
  font-size: 12px;
  padding: 4px 12px;
  border: 1px solid var(--border-hi);
  color: var(--accent);
  background: rgba(96,200,240,.08);
  border-radius: 3px;
}

/* ── TABLE ── */
.table-wrap { flex: 1; overflow: hidden; }

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead tr { background: var(--bg-thead); }

th {
  padding: 10px 12px;
  font-family: var(--f-sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.8px;
  color: var(--accent);
  text-transform: uppercase;
  text-align: center;
  border-bottom: 2px solid var(--border-hi);
}
th:first-child { text-align: left; }

tbody tr:nth-child(odd)  { background: var(--row-a); }
tbody tr:nth-child(even) { background: var(--row-b); }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
tbody tr:hover { background: rgba(96,200,240,.09) !important; }

td {
  padding: 11px 12px;
  text-align: center;
  font-size: 16px;
  font-weight: 400;
  color: var(--text);
  vertical-align: middle;
}
td:first-child { text-align: left; }

/* ── CELLS ── */
.project-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-val {
  font-size: 15px;
  color: var(--text);
}
.pct-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.pct-num {
  font-family: var(--f-mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--accent);
}
.bar-bg {
  width: 72px; height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
}
.date-val {
  font-family: var(--f-mono);
  font-size: 15px;
  color: var(--text-dim);
}
.date-val.overdue { color: var(--red); font-weight: 600; }
.person-val { font-size: 15px; color: var(--text); }
.type-val   { font-size: 15px; color: var(--text-dim); }
.value-val  {
  font-family: var(--f-mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--gold);
}

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .4px;
  border-radius: 4px;
  white-space: nowrap;
  text-transform: uppercase;
}
.badge-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Solid-fill badges — high contrast */
.b-done    { color:#061810; background:var(--green); }
.b-done    .badge-dot { background:#061810; }

.b-late    { color:#fff; background:var(--red); animation: flash 1.4s step-end infinite; }
.b-late    .badge-dot { background:#fff; animation: blink 1.4s step-end infinite; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.78} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.b-wip     { color:var(--accent); background:rgba(96,200,240,.12); border:1.5px solid var(--accent); }
.b-wip     .badge-dot { background:var(--accent); animation:pdot 2s ease-in-out infinite; }
@keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.25} }

.b-active  { color:#061810; background:var(--green); }
.b-active  .badge-dot { background:#061810; }

.b-warn    { color:#1a1000; background:var(--orange); }
.b-warn    .badge-dot { background:#1a1000; }

.b-expired { color:#fff; background:var(--red); }
.b-expired .badge-dot { background:#fff; }

.b-info    { color:var(--accent); background:rgba(96,200,240,.12); border:1.5px solid var(--accent); }
.b-info    .badge-dot { background:var(--accent); }

/* ── FOOTER ── */
.panel-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border-hi);
}
.page-info {
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.page-dots { display:flex; gap:5px; align-items:center; }
.dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--border-hi);
  transition:background .3s,transform .3s;
}
.dot.active {
  background:var(--accent);
  transform:scale(1.4);
  box-shadow:0 0 5px var(--accent);
}

/* ── STATES ── */
.empty-state, .loading-state {
  display:flex; align-items:center; justify-content:center;
  height:80px;
  color:var(--text-dim);
  font-family:var(--f-mono);
  font-size:13px;
  letter-spacing:2px;
  gap:10px;
}
.empty-state { border:1px dashed var(--border-hi); border-radius:4px; margin-top:8px; }

.ld span {
  display:inline-block;
  width:5px; height:5px;
  background:var(--accent);
  border-radius:50%;
  margin:0 2px;
  animation:ld 1.2s ease-in-out infinite;
}
.ld span:nth-child(2){animation-delay:.2s}
.ld span:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

/* ── REFRESH BAR ── */
.refresh-bar {
  position:absolute; bottom:0; left:0;
  height:3px;
  background:linear-gradient(90deg,var(--accent-dim),var(--accent));
}
.refresh-bar.animating { animation:shrink 30s linear forwards; }
@keyframes shrink{from{width:100%;opacity:.8}to{width:0%;opacity:.2}}
</style>
</head>

<body>

<div class="header">
  <div>
    <div class="header-logo">
      <div class="logo-box">T</div>
      TID CORP
    </div>
    <div class="header-sub">MONITORING SYSTEM v2.0</div>
  </div>
  <div class="header-center">
    <div class="header-title">PROJECT DASHBOARD</div>
    <div class="header-tagline">REAL-TIME · LIVE DATA</div>
  </div>
  <div class="header-right">
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-date"  id="date">--/--/----</div>
  </div>
</div>

<div class="container">

  <!-- TIẾN ĐỘ -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title"><div class="title-dot"></div>TIẾN ĐỘ DỰ ÁN</div>
      <div class="panel-badge" id="progress-count">— HẠNG MỤC</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:20%">DỰ ÁN</th>
          <th style="width:20%">HẠNG MỤC</th>
          <th style="width:12%">TIẾN ĐỘ</th>
          <th style="width:14%">DEADLINE</th>
          <th style="width:14%">NHÂN SỰ</th>
          <th style="width:20%">TRẠNG THÁI</th>
        </tr></thead>
        <tbody id="progress">
          <tr><td colspan="6"><div class="loading-state">ĐANG TẢI <span class="ld"><span></span><span></span><span></span></span></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="panel-footer">
      <div class="page-info" id="progressPage">TRANG 1 / 1</div>
      <div class="page-dots" id="progressDots"></div>
    </div>
    <div class="refresh-bar" id="refreshBar1"></div>
  </div>

  <!-- BẢO LÃNH -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title"><div class="title-dot"></div>THEO DÕI BẢO LÃNH</div>
      <div class="panel-badge" id="guarantee-count">— BẢO LÃNH</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:28%">DỰ ÁN</th>
          <th style="width:18%">LOẠI</th>
          <th style="width:18%">GIÁ TRỊ</th>
          <th style="width:18%">HẾT HẠN</th>
          <th style="width:18%">TRẠNG THÁI</th>
        </tr></thead>
        <tbody id="guarantee">
          <tr><td colspan="5"><div class="loading-state">ĐANG TẢI <span class="ld"><span></span><span></span><span></span></span></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="panel-footer">
      <div class="page-info" id="guaranteePage">TRANG 1 / 1</div>
      <div class="page-dots" id="guaranteeDots"></div>
    </div>
    <div class="refresh-bar" id="refreshBar2"></div>
  </div>

</div>

<script>
const PROGRESS_URL  = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";
const GUARANTEE_URL = "";
const PAGE_TIME     = 10000;
const REFRESH_TIME  = 30000;

let progressData  = [];
let guaranteeData = [];
let progressPage  = 0;
let guaranteePage = 0;

function tickClock() {
  const n = new Date(), p = v => String(v).padStart(2,"0");
  document.getElementById("clock").innerText = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById("date").innerText  = n.toLocaleDateString("vi-VN",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"}).toUpperCase();
}
setInterval(tickClock,1000); tickClock();

function parseGViz(t) { return JSON.parse(t.substring(t.indexOf("{"),t.lastIndexOf("}")+1)); }
function fmtDate(v)   { if(!v)return"—"; const d=new Date(v); return isNaN(d)?v:`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`; }
function fmtMoney(v)  { if(!v)return"—"; return typeof v==="number"?v.toLocaleString("vi-VN")+" đ":v; }
function overdue(v)   { return v && new Date(v)<new Date(); }

function rowsPerPage() {
  const w = document.querySelector(".table-wrap");
  return w ? Math.max(4, Math.floor((w.clientHeight - 44) / 45)) : 7;
}

async function fetchSheet(url) {
  if(!url) return [];
  const r = await fetch(url), t = await r.text();
  return (parseGViz(t).table.rows||[]).slice(4);
}

function renderDots(id,total,cur){
  const el=document.getElementById(id); el.innerHTML="";
  for(let i=0;i<Math.min(total,10);i++){
    const d=document.createElement("div");
    d.className="dot"+(i===cur?" active":"");
    el.appendChild(d);
  }
}

function badge(cls,label){
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${label}</span>`;
}

function renderProgress(){
  const el=document.getElementById("progress");
  const rows=rowsPerPage(), total=Math.ceil(progressData.length/rows)||1;
  const page=progressData.slice(progressPage*rows, progressPage*rows+rows);
  document.getElementById("progress-count").innerText=`${progressData.length} HẠNG MỤC`;

  if(!progressData.length){
    el.innerHTML=`<tr><td colspan="6"><div class="empty-state">KHÔNG CÓ DỮ LIỆU</div></td></tr>`;
  } else {
    el.innerHTML=page.map(r=>{
      const d=r.c;
      const project=d[1]?.v||"", item=d[2]?.v||"", person=d[3]?.v||"—";
      const deadlineRaw=d[7]?.v;
      let pct=Number(d[9]?.v||0); if(pct>0&&pct<=1)pct*=100; pct=Math.round(pct);
      let bdg="";
      if(item){ if(pct>=100) bdg=badge("b-done","HOÀN THÀNH"); else if(overdue(deadlineRaw)) bdg=badge("b-late","QUÁ HẠN"); else bdg=badge("b-wip","ĐANG THỰC HIỆN"); }
      return `<tr>
        <td><div class="project-name" title="${project}">${project}</div></td>
        <td><span class="item-val">${item}</span></td>
        <td>${item ? `<div class="pct-wrap"><span class="pct-num">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%"></div></div></div>` : ""}</td>
        <td><span class="date-val${overdue(deadlineRaw)?" overdue":""}">${fmtDate(deadlineRaw)}</span></td>
        <td><span class="person-val">${person}</span></td>
        <td>${bdg}</td>
      </tr>`;
    }).join("");
  }
  document.getElementById("progressPage").innerText=`TRANG ${progressPage+1} / ${total}`;
  renderDots("progressDots",total,progressPage);
}

function renderGuarantee(){
  const el=document.getElementById("guarantee");
  const rows=rowsPerPage(), total=Math.ceil(guaranteeData.length/rows)||1;
  const page=guaranteeData.slice(guaranteePage*rows, guaranteePage*rows+rows);
  document.getElementById("guarantee-count").innerText=`${guaranteeData.length} BẢO LÃNH`;

  if(!guaranteeData.length){
    el.innerHTML=`<tr><td colspan="5"><div class="empty-state">CHƯA CÓ DỮ LIỆU</div></td></tr>`;
  } else {
    el.innerHTML=page.map(r=>{
      const d=r.c;
      const project=d[0]?.v||"", type=d[1]?.v||"—", value=d[2]?.v, expiryRaw=d[3]?.v, statusRaw=d[4]?.v||"";
      let daysLeft=null; if(expiryRaw) daysLeft=Math.ceil((new Date(expiryRaw)-new Date())/86400000);
      let bdg;
      if(daysLeft!==null){
        if(daysLeft<0)       bdg=badge("b-expired","HẾT HẠN");
        else if(daysLeft<=30)bdg=badge("b-warn",   `SẮP HẾT (${daysLeft}N)`);
        else                 bdg=badge("b-active",  "CÒN HIỆU LỰC");
      } else { bdg=badge("b-info", statusRaw?statusRaw.toUpperCase():"HIỆU LỰC"); }
      return `<tr>
        <td><div class="project-name" title="${project}">${project}</div></td>
        <td><span class="type-val">${type}</span></td>
        <td><span class="value-val">${fmtMoney(value)}</span></td>
        <td><span class="date-val${(daysLeft!==null&&daysLeft<0)?" overdue":""}">${fmtDate(expiryRaw)}</span></td>
        <td>${bdg}</td>
      </tr>`;
    }).join("");
  }
  document.getElementById("guaranteePage").innerText=`TRANG ${guaranteePage+1} / ${total}`;
  renderDots("guaranteeDots",total,guaranteePage);
}

async function loadData(){
  progressData  = await fetchSheet(PROGRESS_URL).catch(()=>[]);
  guaranteeData = await fetchSheet(GUARANTEE_URL).catch(()=>[]);
  renderProgress(); renderGuarantee();
  ["refreshBar1","refreshBar2"].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("animating"); void el.offsetWidth; el.classList.add("animating");
  });
}

setInterval(()=>{
  const rows=rowsPerPage();
  progressPage =(progressPage +1)%(Math.ceil(progressData.length /rows)||1);
  guaranteePage=(guaranteePage+1)%(Math.ceil(guaranteeData.length/rows)||1);
  renderProgress(); renderGuarantee();
}, PAGE_TIME);

setInterval(loadData, REFRESH_TIME);
loadData();
</script>
</body>
</html>
