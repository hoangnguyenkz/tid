<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT DASHBOARD - TID CO.LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-header: #0d1428;
            --bg-thead: #111d38;
            --row-a: #0e1830;
            --row-b: #0b1326;
            --border: #1e3358;
            --border-hi: #2e4f88;
            --accent: #60c8f0;
            --gold: #ffc94d;
            --green: #3de08a;
            --red: #ff6b6b;
            --text: #d8eaf8;
            --text-bright: #ffffff;
            --f-sans: 'IBM Plex Sans', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--f-sans); }
        
        /* Desktop ẩn scrollbar nhưng cho phép trên mobile nếu nội dung dài */
        body { overflow: hidden; }
        @media (max-width: 768px) { body { overflow-y: auto; height: auto; } }

        .header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            height: 60px; padding: 0 20px; background: var(--bg-header); border-bottom: 2px solid var(--border-hi);
        }
        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: var(--text-bright); }
        .logo-box { width: 28px; height: 28px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .header-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-align: center; }
        .header-right { text-align: right; font-family: var(--f-mono); }
        .header-clock { font-size: 18px; color: var(--text-bright); font-weight: 600; }
        .header-date { font-size: 10px; color: var(--accent); }

        .container { display: flex; height: calc(100vh - 60px); padding: 12px; gap: 12px; }
        
        .col-left { flex: 0 0 65%; display: flex; flex-direction: column; border: 1px solid var(--border-hi); background: rgba(13,20,40,0.5); border-radius: 4px; padding: 15px; position: relative; }
        .col-right { flex: 0 0 calc(35% - 12px); display: flex; flex-direction: column; gap: 12px; }

        .panel-top-right { flex: 0 0 68%; display: flex; flex-direction: column; border: 1px solid var(--border-hi); background: rgba(13,20,40,0.5); border-radius: 4px; padding: 12px; overflow: hidden; }
        .panel-bottom-right { flex: 1; display: flex; gap: 12px; min-height: 0; }
        .sub-panel { flex: 1; border: 1px solid var(--border-hi); background: rgba(13,20,40,0.5); border-radius: 4px; padding: 10px; display: flex; flex-direction: column; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .header { grid-template-columns: 1fr 1fr; height: auto; padding: 10px; }
            .header-title { grid-column: span 2; order: 3; margin-top: 5px; font-size: 16px; letter-spacing: 1px; }
            .container { flex-direction: column; height: auto; overflow: visible; }
            .col-left, .col-right { flex: 1 0 auto; width: 100%; }
            .panel-bottom-right { flex-direction: column; }
            
            /* Ẩn bớt cột trên mobile để bảng không bị quá hẹp */
            .hide-mobile { display: none; }
            th, td { font-size: 11px !important; }
        }

        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid var(--border-hi); padding-bottom: 8px; }
        .panel-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; }
        .title-dot { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); }
        .badge-count { font-family: var(--f-mono); font-size: 11px; padding: 2px 8px; background: var(--gold); color: #000; border-radius: 2px; font-weight: 700; }

        .table-wrap { flex: 1; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--bg-thead); color: var(--accent); font-size: 10px; padding: 8px 4px; text-transform: uppercase; border-bottom: 1px solid var(--border-hi); }
        
        #p-table td { padding: 12px 4px; font-size: 12px; border-bottom: 1px solid var(--border); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #g-table td { padding: 8px 4px; font-size: 11px; border-bottom: 1px solid var(--border); text-align: center; }

        tbody tr:nth-child(odd) { background: var(--row-a); }
        tbody tr:nth-child(even) { background: var(--row-b); }
        
        .text-left { text-align: left !important; }
        .gold-bold { color: var(--gold); font-weight: 700; }
        .accent-text { color: var(--accent); }
        
        .bar-container { display: flex; align-items: center; gap: 4px; justify-content: center; }
        .bar-bg { width: 40px; height: 6px; background: #1a2a4a; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); }

        .st { font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: 700; }
        .st-done { background: var(--green); color: #000; }
        .st-wip { border: 1px solid var(--accent); color: var(--accent); }
        .st-late { background: var(--red); color: #fff; }

        .footer-info { display: flex; justify-content: space-between; font-size: 10px; color: var(--accent); font-family: var(--f-mono); padding-top: 10px; }
        .refresh-line { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0; }
        .refresh-line.animating { animation: run 30s linear forwards; }
        @keyframes run { from { width: 100%; } to { width: 0%; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo"><div class="logo-box">T</div> TID CO.LTD</div>
    <div class="header-title">PROJECT DASHBOARD</div>
    <div class="header-right">
        <div class="header-clock" id="clock">00:00:00</div>
        <div class="header-date" id="date">--/--/----</div>
    </div>
</div>

<div class="container">
    <div class="col-left">
        <div class="panel-header">
            <div class="panel-title"><div class="title-dot"></div> TIẾN ĐỘ DỰ ÁN</div>
            <div class="badge-count" id="p-count">0 MỤC</div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 35%;">DỰ ÁN</th>
                        <th style="width: 30%;" class="hide-mobile">KHÁCH HÀNG</th>
                        <th style="width: 25%;" class="hide-mobile">HẠNG MỤC</th>
                        <th style="width: 35%;">TIẾN ĐỘ</th>
                        <th style="width: 30%;">TRẠNG THÁI</th>
                    </tr>
                </thead>
                <tbody id="p-table"></tbody>
            </table>
        </div>
        <div class="footer-info">
            <div id="p-page">PAGE 1/1</div>
            <div id="p-sync">Đang cập nhật...</div>
        </div>
        <div class="refresh-line" id="line1"></div>
    </div>

    <div class="col-right">
        <div class="panel-top-right">
            <div class="panel-header">
                <div class="panel-title"><div class="title-dot"></div> BẢO LÃNH</div>
                <div id="g-total-badge" class="badge-count" style="background:var(--accent);">0</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50%;">DỰ ÁN</th>
                            <th style="width: 50%;">GIÁ TRỊ</th>
                        </tr>
                    </thead>
                    <tbody id="g-table"></tbody>
                </table>
            </div>
        </div>

        <div class="panel-bottom-right">
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 11px;">NHÂN SỰ (<span id="s-total">0</span>)</div></div>
                <div class="table-wrap"><table><tbody id="s-table"></tbody></table></div>
            </div>
            <div class="sub-panel">
                <div class="panel-header"><div class="panel-title" style="font-size: 11px;">KHÁCH HÀNG (<span id="c-total">0</span>)</div></div>
                <div class="table-wrap"><table><tbody id="c-table"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y";
    const URL_PROGRESS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1280059749`;
    const URL_GUARANTEE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Bao%20lanh`;

    let dataP = [], dataG = [], currentPage = 0;
    // Tự động điều chỉnh số dòng hiển thị dựa trên thiết bị
    const ROWS_PER_PAGE = window.innerWidth < 768 ? 8 : 16; 

    async function fetchData() {
        try {
            const [resP, resG] = await Promise.all([fetch(URL_PROGRESS), fetch(URL_GUARANTEE)]);
            const txtP = await resP.text();
            const txtG = await resG.text();
            
            dataP = JSON.parse(txtP.substring(txtP.indexOf("{"), txtP.lastIndexOf("}") + 1)).table.rows.slice(4).filter(r => r.c && r.c[1]?.v);
            dataG = JSON.parse(txtG.substring(txtG.indexOf("{"), txtG.lastIndexOf("}") + 1)).table.rows.filter(r => r.c && r.c[9]?.v);

            renderAll();
            startProgressLine();
            document.getElementById("p-sync").innerText = "Sync: " + new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function renderAll() {
        renderProgress();
        renderGuarantees();
        renderStats();
    }

    function renderProgress() {
        const el = document.getElementById("p-table");
        const totalPages = Math.ceil(dataP.length / ROWS_PER_PAGE);
        const start = currentPage * ROWS_PER_PAGE;
        const items = dataP.slice(start, start + ROWS_PER_PAGE);

        document.getElementById("p-count").innerText = `${dataP.length} MỤC`;
        document.getElementById("p-page").innerText = `${currentPage + 1}/${totalPages || 1}`;

        el.innerHTML = items.map(row => {
            const d = row.c;
            const pct = Math.round((d[9]?.v || 0) * (d[9]?.v <= 1 ? 100 : 1));
            const isLate = d[7]?.v && parseDate(d[7].v) < new Date() && pct < 100;
            return `<tr>
                <td class="text-left gold-bold">${d[1]?.v || "—"}</td>
                <td class="text-left hide-mobile">${d[4]?.v || "—"}</td>
                <td class="text-left hide-mobile">${d[2]?.v || "—"}</td>
                <td><div class="bar-container"><span style="width:28px; font-family:var(--f-mono); font-size:10px;">${pct}%</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div></td>
                <td><span class="st ${pct>=100?'st-done':(isLate?'st-late':'st-wip')}">${pct>=100?'OK':(isLate?'TRỄ':'LÀM')}</span></td>
            </tr>`;
        }).join("");
    }

    function renderGuarantees() {
        const el = document.getElementById("g-table");
        let totalVal = 0;

        el.innerHTML = dataG.slice(0, 10).map(row => {
            const d = row.c;
            let valNum = typeof d[12]?.v === 'number' ? d[12].v : 0;
            totalVal += valNum;
            return `<tr>
                <td class="text-left" style="color:#fff; font-weight:600;">${d[9]?.v || "—"}</td>
                <td class="gold-bold">${d[12]?.f || "0"}</td>
            </tr>`;
        }).join("");
        document.getElementById("g-total-badge").innerText = totalVal.toLocaleString('vi-VN');
    }

    function renderStats() {
        const staff = {}, cust = {};
        dataP.forEach(r => {
            const s = r.c[3]?.v, c = r.c[4]?.v;
            if(s && s.trim() && s !== "—") staff[s] = (staff[s] || 0) + 1;
            if(c && c.trim() && c !== "—") cust[c] = (cust[c] || 0) + 1;
        });
        const fill = (map, id, countId) => {
            const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0, 4);
            document.getElementById(countId).innerText = Object.keys(map).length;
            document.getElementById(id).innerHTML = sorted.map(([n, v]) => 
                `<tr><td class="text-left" style="font-size:10px; padding:6px;">${n}</td><td class="accent-text" style="font-weight:700; width:20px; text-align:right;">${v}</td></tr>`
            ).join("");
        };
        fill(staff, "s-table", "s-total");
        fill(cust, "c-table", "c-total");
    }

    function parseDate(v) {
        if(!v) return null;
        const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
        return m ? new Date(m[1], m[2], m[3]) : null;
    }

    function startProgressLine() {
        const l = document.getElementById("line1");
        l.classList.remove("animating");
        void l.offsetWidth;
        l.classList.add("animating");
    }

    setInterval(() => {
        const total = Math.ceil(dataP.length / ROWS_PER_PAGE);
        if(total > 1) { currentPage = (currentPage + 1) % total; renderProgress(); }
    }, 10000);

    setInterval(fetchData, 30000);
    setInterval(() => {
        const n = new Date();
        document.getElementById("clock").innerText = n.toLocaleTimeString("vi-VN", {hour12:false});
        document.getElementById("date").innerText = n.toLocaleDateString("vi-VN");
    }, 1000);
    window.onload = fetchData;
</script>
</body>
</html>
