<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME LINE PROJECT TID - MOBILE READY</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --header-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-accent: #f1c40f;
            --cyan: #00d4ff;
            --status-green: #2ecc71;
            --status-red: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            text-transform: uppercase;
        }

        /* Header linh hoạt */
        .controls {
            padding: 10px 15px;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid #333;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .controls { flex-direction: row; justify-content: space-between; height: 60px; }
        }

        .main-title { font-size: 1.2rem; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* Cấu trúc Grid thay đổi theo màn hình */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        @media (min-width: 1024px) {
            .dashboard-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; height: calc(100vh - 80px); }
        }

        .board-column {
            background: #151515;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .board-title-area {
            background: var(--header-bg);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .board-title { color: var(--text-accent); font-size: 0.9rem; font-weight: bold; }

        /* Chế độ hiển thị dòng dữ liệu */
        .data-row {
            display: grid;
            padding: 12px;
            border-bottom: 1px solid #222;
            gap: 5px;
        }

        /* Trên PC: Hiển thị dạng dòng ngang */
        @media (min-width: 768px) {
            .tiendo-row { grid-template-columns: 40px 1.5fr 1fr 100px 100px; }
            .data-header { font-weight: bold; color: var(--cyan); background: #1a1a1a; }
        }

        /* Trên Mobile: Hiển thị dạng Card */
        @media (max-width: 767px) {
            .tiendo-row { 
                grid-template-areas: 
                    "stt name name"
                    "cust cust status"
                    "item item percent"
                    "staff deadline deadline";
                grid-template-columns: 40px 1fr 100px;
            }
            .data-header { display: none; } /* Ẩn tiêu đề cột trên mobile */
            .col-project { grid-area: name; color: var(--text-accent); font-size: 1rem; }
            .col-customer { grid-area: cust; font-size: 0.8rem; color: #888; }
            .col-status { grid-area: status; }
            .col-percent { grid-area: percent; text-align: right; color: var(--status-green); font-weight: bold; }
            .col-deadline { grid-area: deadline; font-size: 0.8rem; text-align: right; }
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-align: center;
            border: 1px solid;
            display: inline-block;
        }

        /* Clock & Info */
        #clock-time { color: var(--cyan); font-weight: bold; font-size: 1.2rem; }
        #clock-date { font-size: 0.8rem; color: #666; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="main-title">PROJECT TID</div>
        <div id="clock-container">
            <span id="clock-time">--:--:--</span>
            <span id="clock-date">--/--/----</span>
        </div>
        <input type="file" id="uploadExcel" style="font-size: 10px;">
    </div>

    <div class="dashboard-grid">
        <!-- TIẾN ĐỘ DỰ ÁN -->
        <div class="board-column">
            <div class="board-title-area">
                <div class="board-title">TIẾN ĐỘ DỰ ÁN <span id="totalTiendo"></span></div>
            </div>
            <div class="board-content" id="tiendoList">
                <!-- Dữ liệu sẽ đổ vào đây -->
            </div>
        </div>

        <!-- BẢO LÃNH (Tự động xuống hàng trên mobile) -->
        <div class="board-column">
            <div class="board-title-area">
                <div class="board-title">BẢO LÃNH <span id="totalBaolanh"></span></div>
            </div>
            <div class="board-content" id="baolanhList"></div>
        </div>
    </div>

    <script>
        // Copy phần logic JavaScript xử lý file Excel của bạn vào đây.
        // Chỉnh sửa phần hiển thị trong innerHTML để phù hợp với Class mới:
        
        function renderTiendoMobile(data) {
            return data.map(r => `
                <div class="data-row tiendo-row">
                    <div style="color:#444">${r.stt}</div>
                    <div class="col-project">${r.name}</div>
                    <div class="col-customer">${r.cust}</div>
                    <div class="col-percent">${r.p}</div>
                    <div class="col-status">
                        <span class="status-badge" style="color:var(--status-green)">${r.s}</span>
                    </div>
                    <div class="col-deadline">📅 ${r.d}</div>
                </div>
            `).join('');
        }
        
        // Các hàm updateClock và đọc file giữ nguyên như bản trước.
    </script>
</body>
</html>
