<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROJECT DASHBOARD</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00e5ff;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    font-size: 28px;
    font-weight: bold;
    border-bottom: 2px solid #00e5ff;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 70px);
}

/* 2 KHỐI */
.section {
    width: 50%;
    padding: 20px;
    box-sizing: border-box;
}

.section:first-child {
    border-right: 2px solid #00e5ff;
}

/* TITLE */
h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 15px;
    color: #00e5ff;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 20px;
}

th {
    border-bottom: 2px solid #00e5ff;
    padding: 10px;
    text-align: center;
}

td {
    border-bottom: 1px solid #222;
    padding: 10px;
    text-align: center;
}

.project {
    color: #ffd600;
    font-weight: bold;
}

/* STATUS */
.late {
    color: red;
    font-weight: bold;
    animation: blink 1s infinite;
}

.done {
    color: #00ff00;
    font-weight: bold;
}

.doing {
    color: orange;
    font-weight: bold;
}

.debt-ok {
    color: #00ff00;
    font-weight: bold;
}

.debt-bad {
    color: red;
    font-weight: bold;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="header">
    <div>📊 PROJECT DASHBOARD</div>
    <div id="clock"></div>
</div>

<div class="container">

    <!-- TIẾN ĐỘ -->
    <div class="section">
        <h2>TIẾN ĐỘ DỰ ÁN</h2>
        <table>
            <thead>
                <tr>
                    <th>Dự án</th>
                    <th>Hạng mục</th>
                    <th>%</th>
                    <th>Deadline</th>
                    <th>Nhân sự</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="progress"></tbody>
        </table>
    </div>

    <!-- CÔNG NỢ -->
    <div class="section">
        <h2>CÔNG NỢ DỰ ÁN</h2>
        <table>
            <thead>
                <tr>
                    <th>Dự án</th>
                    <th>HĐ</th>
                    <th>Giá trị</th>
                    <th>Đã thu</th>
                    <th>Còn lại</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="debt"></tbody>
        </table>
    </div>

</div>

<script>
const PROGRESS_URL = "https://docs.google.com/spreadsheets/d/1Qefkd7Pev_QVd2ud3gcSB97JMdCPb5XBEkA-9Cfpg2Y/gviz/tq?tqx=out:json&gid=1280059749";
const DEBT_URL = "";

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString("vi-VN");
}, 1000);

/* PARSE */
function parseJSON(text) {
    return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
}

/* FETCH */
async function fetchSheet(url) {
    const res = await fetch(url);
    const text = await res.text();
    const json = parseJSON(text);
    return json.table.rows || [];
}

/* LOAD PROGRESS */
async function loadProgress() {
    const rows = await fetchSheet(PROGRESS_URL);
    const el = document.getElementById("progress");
    el.innerHTML = "";

    rows.forEach(r => {
        const d = r.c;

        let cls = "doing";
        let txt = "ĐANG LÀM";

        if (d[5]?.v === "late") {
            cls = "late";
            txt = "QUÁ HẠN";
        }

        if (d[5]?.v === "done") {
            cls = "done";
            txt = "HOÀN THÀNH";
        }

        el.innerHTML += `
        <tr>
            <td class="project">${d[0]?.v || ""}</td>
            <td>${d[1]?.v || ""}</td>
            <td>${d[2]?.v || 0}%</td>
            <td>${formatDate(d[3]?.v)}</td>
            <td>${d[4]?.v || ""}</td>
            <td class="${cls}">${txt}</td>
        </tr>`;
    });
}

function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("vi-VN");
}

/* INIT */
loadProgress();
setInterval(loadProgress, 30000);
</script>

</body>
</html>
